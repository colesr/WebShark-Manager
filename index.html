  function parseTags(s) {
    if (!s) return [];
    return s.split(",").map(t => t.trim()).filter(Boolean).slice(0, 8);
  }

  // -------------------------------------------------------------------------
  // routing (hash-based)
  // -------------------------------------------------------------------------
  function parseHash() {
    const h = location.hash.replace(/^#\/?/, "");
    if (!h) return { name: "home" };
    if (h === "reports") return { name: "reports" };
    if (h === "plan") return { name: "plan" };
    if (h === "schedule") return { name: "schedule" };
    const parts = h.split("/");
    if (parts[0] === "p" && parts[1]) {
      if (parts[2] === "proj" && parts[3]) return { name: "project", id: parts[3], portfolioId: parts[1] };
      return { name: "portfolio", id: parts[1] };
    }
    return { name: "home" };
  }
  function viewHref(v) {
    if (v.name === "home") return "#/";
    if (v.name === "reports") return "#/reports";
    if (v.name === "plan") return "#/plan";
    if (v.name === "schedule") return "#/schedule";
    if (v.name === "portfolio") return `#/p/${v.id}`;
    if (v.name === "project") {
      const p = projectById(v.id);
      const pf = p ? p.portfolioId : "_";

  // -------------------------------------------------------------------------
  // dependencies — cross-hierarchy references
  // -------------------------------------------------------------------------
  function resolveDep(dep) {
    if (!dep) return null;

  }

    const item = resolveDep(dep);

  function dependencyOptions(excludeKind, excludeId, alreadyHave) {
    const have = new Set((alreadyHave || []).map(d => `${d.kind}:${d.id}`));

    for (const pf of state.portfolios) {
      if (excludeKind === "portfolio" && pf.id === excludeId) continue;
      if (have.has(`portfolio:${pf.id}`)) continue;
      opts.push({ kind: "portfolio", id: pf.id, label: `Portfolio · ${pf.name}` });
    }
    for (const p of state.projects) {
      if (excludeKind === "project" && p.id === excludeId) continue;
      if (have.has(`project:${p.id}`)) continue;
      opts.push({ kind: "project", id: p.id, label: `Project · ${p.name}` });
    }
    for (const a of state.activities) {
      if (excludeKind === "activity" && a.id === excludeId) continue;
      if (have.has(`activity:${a.id}`)) continue;
      const proj = projectById(a.projectId);
      opts.push({ kind: "activity", id: a.id, label: `Task · ${a.name}${proj ? " (" + proj.name + ")" : ""}` });
    }
    return opts;
  }
  function navigateToDep(dep) {
    if (dep.kind === "portfolio") navigate({ name: "portfolio", id: dep.id });
    else if (dep.kind === "project") navigate({ name: "project", id: dep.id });
    else if (dep.kind === "activity") {
      const a = activityById(dep.id);
      if (a) navigate({ name: "project", id: a.projectId });
    }
  }
  function buildDepsDisplay(deps) {
    if (!deps || deps.length === 0) return null;
    const wrap = document.createElement("div");
    wrap.className = "deps-display";
    const lbl = document.createElement("span");
    lbl.className = "deps-label";
    lbl.textContent = "Depends on";
    wrap.appendChild(lbl);
    for (const dep of deps) {
      const resolved = resolveDep(dep);
      const chip = document.createElement("div");
      chip.className = "dep-chip";
      if (!resolved) chip.classList.add("dep-missing");
      else chip.classList.add("clickable");
      const kindBadge = document.createElement("span");
      kindBadge.className = "dep-kind";
      kindBadge.textContent = dep.kind === "activity" ? "task" : dep.kind;
      const nameSpan = document.createElement("span");
      nameSpan.className = "dep-name";
      nameSpan.textContent = depDisplayName(dep);
      chip.append(kindBadge, nameSpan);
      if (resolved) {
        chip.title = `Go to ${dep.kind === "activity" ? "task" : dep.kind}`;
        chip.addEventListener("click", (ev) => { ev.stopPropagation(); navigateToDep(dep); });
      }
      wrap.appendChild(chip);
    }
    return wrap;
  }
  // editor block — operates on a buffer; caller saves buffer on submit
  function buildDependencyEditor(elementKind, elementId, initialDeps, onChange) {
    const buffer = [...(initialDeps || [])];
    const wrap = document.createElement("div");
    wrap.className = "full";

    const heading = document.createElement("div");
    heading.style.fontSize = "0.78rem";
    heading.style.color = "var(--muted)";
    heading.style.marginBottom = "0.25rem";
    heading.textContent = "Dependencies";
    wrap.appendChild(heading);

    const list = document.createElement("div");
    list.className = "dep-list";
    wrap.appendChild(list);

    const adder = document.createElement("div");
    adder.className = "dep-adder";
    const sel = document.createElement("select");
    const addBtn = document.createElement("button");
    addBtn.type = "button";
    addBtn.textContent = "Add";
    adder.append(sel, addBtn);
    wrap.appendChild(adder);

    function refresh() {
      // list
      list.innerHTML = "";
      if (buffer.length === 0) {
        const empty = document.createElement("div");
        empty.className = "dep-empty";
        empty.textContent = "No dependencies.";
        list.appendChild(empty);
      } else {
        buffer.forEach((dep, i) => {
          const chip = document.createElement("div");
          chip.className = "dep-chip";
          if (!resolveDep(dep)) chip.classList.add("dep-missing");
          const kindBadge = document.createElement("span");
          kindBadge.className = "dep-kind";
          kindBadge.textContent = dep.kind === "activity" ? "task" : dep.kind;
          const nameSpan = document.createElement("span");
          nameSpan.className = "dep-name";
          nameSpan.textContent = depDisplayName(dep);
          const rm = document.createElement("button");
          rm.type = "button";
          rm.className = "dep-rm";
          rm.innerHTML = "&times;";
          rm.title = "Remove";
          rm.addEventListener("click", () => {
            buffer.splice(i, 1);
            onChange(buffer);
            refresh();
          });
          chip.append(kindBadge, nameSpan, rm);
          list.appendChild(chip);
        });
      }
      // adder select options (exclude already-added + self)
      sel.innerHTML = "";
      const ph = document.createElement("option");
      ph.value = ""; ph.textContent = "Add a dependency…";
      sel.appendChild(ph);
      const opts = dependencyOptions(elementKind, elementId, buffer);
      if (opts.length === 0) {
        ph.textContent = "No more elements available";
        sel.disabled = true;
        addBtn.disabled = true;
      } else {
        sel.disabled = false;
        addBtn.disabled = false;
        for (const o of opts) {
          const opt = document.createElement("option");
          opt.value = `${o.kind}:${o.id}`;
          opt.textContent = o.label;
          sel.appendChild(opt);
        }
      }
    }

    addBtn.addEventListener("click", () => {
      const v = sel.value;
      if (!v) return;
      const sep = v.indexOf(":");
      const kind = v.slice(0, sep);
      const id = v.slice(sep + 1);
      buffer.push({ kind, id });
      onChange(buffer);
      refresh();
    });

    refresh();
    return wrap;
  }

  // -------------------------------------------------------------------------
  // drag and drop — panel layout + element reordering (Sortable.js)
  // -------------------------------------------------------------------------
  function gripSvg() {
    return `<svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true"><circle cx="5" cy="3" r="1.3"/><circle cx="5" cy="8" r="1.3"/><circle cx="5" cy="13" r="1.3"/><circle cx="11" cy="3" r="1.3"/><circle cx="11" cy="8" r="1.3"/><circle cx="11" cy="13" r="1.3"/></svg>`;
  }
  function makeDragHandle(extraClass) {
    const handle = document.createElement("span");
    handle.className = "drag-handle " + (extraClass || "");
    handle.title = "Drag to reorder";
    handle.innerHTML = gripSvg();
    // a non-drag click on the handle shouldn't trigger the parent card's click
    handle.addEventListener("click", (e) => e.stopPropagation());
    return handle;
  }
  function ensurePanelLayout(viewName) {
    if (!state.panelLayouts[viewName]) {
      state.panelLayouts[viewName] = { order: [], minimized: {} };
    } else {
      const l = state.panelLayouts[viewName];
      if (!Array.isArray(l.order)) l.order = [];
      if (!l.minimized || typeof l.minimized !== "object") l.minimized = {};
    }
    return state.panelLayouts[viewName];
  }
  function isPanelMinimized(viewName, panelId) {
    const l = state.panelLayouts && state.panelLayouts[viewName];
    return !!(l && l.minimized && l.minimized[panelId]);
  }
  function togglePanelMinimized(viewName, panelId) {
    const layout = ensurePanelLayout(viewName);
    layout.minimized[panelId] = !layout.minimized[panelId];
    save();
  }
  function setPanelOrder(viewName, order) {
    const layout = ensurePanelLayout(viewName);
    layout.order = order;
    save();
  }
  function applyPanelLayout(viewName, container) {
    const layout = state.panelLayouts && state.panelLayouts[viewName];
    const sections = [...container.querySelectorAll(":scope > section[data-panel-id]")];
    if (!layout || !layout.order || layout.order.length === 0 || sections.length === 0) return;
    const inDom = new Set(sections.map(s => s.dataset.panelId));
    const finalOrder = [];
    for (const id of layout.order) if (inDom.has(id)) finalOrder.push(id);
    for (const s of sections) if (!finalOrder.includes(s.dataset.panelId)) finalOrder.push(s.dataset.panelId);
    for (const id of finalOrder) {
      const sec = container.querySelector(`:scope > section[data-panel-id="${id}"]`);
      if (sec) container.appendChild(sec);
    }
  }
  function decoratePanels(viewName, container) {
    const sections = container.querySelectorAll(":scope > section[data-panel-id]");
    for (const sec of sections) {
      const panelId = sec.dataset.panelId;
      if (sec.querySelector(":scope > .section-head > .panel-header-controls")) continue;

      // find or wrap h2 in section-head
      let head = sec.querySelector(":scope > .section-head");
      if (!head) {
        const h2 = sec.querySelector(":scope > h2");
        if (!h2) continue;
        head = document.createElement("div");
        head.className = "section-head";
        sec.insertBefore(head, h2);
        head.appendChild(h2);
      }

      const ctrls = document.createElement("div");
      ctrls.className = "panel-header-controls";

      const minimized = isPanelMinimized(viewName, panelId);
      const minBtn = document.createElement("button");
      minBtn.type = "button";
      minBtn.className = "panel-min-btn";
      minBtn.innerHTML = minimized ? "+" : "−";
      minBtn.title = minimized ? "Expand panel" : "Minimize panel";
      minBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        togglePanelMinimized(viewName, panelId);
        render();
      });

      const handle = document.createElement("span");
      handle.className = "drag-handle panel-handle";
      handle.title = "Drag to reorder panel";
      handle.innerHTML = gripSvg();
      handle.addEventListener("click", (e) => e.stopPropagation());

      ctrls.append(minBtn, handle);
      head.appendChild(ctrls);

      if (minimized) sec.classList.add("panel-minimized");
    }
  }
  function initPanelSortable(viewName, container) {
    if (!window.Sortable) return;
    if (!container.querySelector(":scope > section[data-panel-id]")) return;
    Sortable.create(container, {
      draggable: "section[data-panel-id]",
      handle: ".panel-handle",
      animation: 160,
      ghostClass: "sortable-ghost",
      chosenClass: "sortable-chosen",
      dragClass: "sortable-drag",
      onEnd: () => {
        const order = [...container.querySelectorAll(":scope > section[data-panel-id]")]
          .map(s => s.dataset.panelId);
        setPanelOrder(viewName, order);
      },
    });
  }
  function reorderInGroup(arr, predicate, newGroupOrder) {
    const positions = [];
    arr.forEach((item, i) => { if (predicate(item)) positions.push(i); });
    const result = [...arr];
    newGroupOrder.forEach((item, k) => {
      if (positions[k] != null && item) result[positions[k]] = item;
    });
    return result;
  }
  function initElementSortables(container) {
    if (!window.Sortable) return;
    const lists = container.querySelectorAll("[data-sortable-list]");
    for (const list of lists) {
      const key = list.dataset.sortableList;
      Sortable.create(list, {
        handle: ".element-handle",
        animation: 160,
        ghostClass: "sortable-ghost",
        chosenClass: "sortable-chosen",
        dragClass: "sortable-drag",
        onEnd: () => {
          if (key === "portfolios") {
            const newIds = [...list.querySelectorAll("[data-portfolio-id]")].map(el => el.dataset.portfolioId);
            state.portfolios.sort((a, b) => newIds.indexOf(a.id) - newIds.indexOf(b.id));
            save();
          } else if (key.startsWith("projects:")) {
            const portfolioId = key.slice("projects:".length);
            const newIds = [...list.querySelectorAll("[data-project-id]")].map(el => el.dataset.projectId);
            const newProjects = newIds.map(id => projectById(id)).filter(Boolean);
            state.projects = reorderInGroup(state.projects, p => p.portfolioId === portfolioId, newProjects);
            save();
          } else if (key.startsWith("activities:")) {
            const projectId = key.slice("activities:".length);
            const newIds = [...list.querySelectorAll("[data-activity-id]")].map(el => el.dataset.activityId);
            const newActivities = newIds.map(id => activityById(id)).filter(Boolean);
            state.activities = reorderInGroup(state.activities, a => a.projectId === projectId, newActivities);
            save();
          }
        },
      });
    }
  }
  function applyDragAndDrop(viewName, container) {
    decoratePanels(viewName, container);
    applyPanelLayout(viewName, container);
  }
  function initSortablesAfterAttach(viewName, container) {
    if (!window.Sortable) return;
    initPanelSortable(viewName, container);
    initElementSortables(container);
  }

  // -------------------------------------------------------------------------
  // rendering
  // -------------------------------------------------------------------------
  // navigation depth — drives the direction of the view-transition slide
  function viewDepth(v) {
    if (!v) return 0;
    if (v.name === "home") return 0;
    if (v.name === "project") return 2;
    return 1; // portfolio, reports, plan, schedule
  }

  function render() {
    renderCrumbs();
    renderRunningBar();

    // resolve view, falling back to home if id missing
    if (view.name === "portfolio" && !portfolioById(view.id)) view = { name: "home" };
    if (view.name === "project") {
      const p = projectById(view.id);
      if (!p) view = { name: "home" };
      else view.portfolioId = p.portfolioId;
    }

    const root = $("view");
    const next = document.createElement("div");
    next.className = "view";
    // directional transition based on how deep we're navigating;
    // only animate the entrance on a real view change, not on in-place refreshes
    const viewKey = view.name + ":" + (view.id || "");
    const sameView = render._lastKey === viewKey;
    const depth = viewDepth(view);
    if (sameView) {
      next.classList.add("view-refresh");
    } else if (render._lastDepth != null) {
      if (depth > render._lastDepth) next.classList.add("view-forward");
      else if (depth < render._lastDepth) next.classList.add("view-back");
    }
    render._lastDepth = depth;
    render._lastKey = viewKey;
    if (view.name === "home") renderHome(next);
    else if (view.name === "reports") renderReportsView(next);
    else if (view.name === "plan") renderPlanView(next);
    else if (view.name === "schedule") renderScheduleView(next);
    else if (view.name === "portfolio") renderPortfolioView(next, view.id);
    else if (view.name === "project") renderProjectView(next, view.id);
    applyDragAndDrop(view.name, next);
    swap(root, next, () => initSortablesAfterAttach(view.name, next), !sameView);

    // toggle header link states
    const rl = $("reportsLink");
    if (rl) rl.classList.toggle("active", view.name === "reports");
    const pl = $("planLink");
    if (pl) pl.classList.toggle("active", view.name === "plan");
    const sl = $("scheduleLink");
    if (sl) sl.classList.toggle("active", view.name === "schedule");

    // clear highlight set after this paint; scroll to any new row first
    requestAnimationFrame(() => {
      scrollToHighlighted();
      highlightIds.clear();
    });
  }

  function swap(root, next, onDone, animate) {
    const old = root.firstElementChild;
    if (!old || animate === false) { root.replaceChildren(next); if (onDone) onDone(); return; }
    old.classList.add("leaving");
    let replaced = false;
    const finalize = () => {
      if (replaced) return;
      replaced = true;
      old.removeEventListener("animationend", finalize);
      root.replaceChildren(next);
      if (onDone) onDone();
    };
    old.addEventListener("animationend", finalize);
    setTimeout(finalize, 200);
  }

  function renderCrumbs() {
    const el = $("crumbs");
    el.innerHTML = "";
    const parts = [];
    if (view.name === "home") {
      parts.push({ label: "All", current: true });
    } else if (view.name === "reports") {
      parts.push({ label: "All", href: "#/" });
      parts.push({ label: "Reports", current: true });
    } else if (view.name === "plan") {
      parts.push({ label: "All", href: "#/" });
      parts.push({ label: "Plan", current: true });
    } else if (view.name === "schedule") {
      parts.push({ label: "All", href: "#/" });
      parts.push({ label: "Schedule", current: true });
    } else if (view.name === "portfolio") {
      parts.push({ label: "All", href: "#/" });
      const pf = portfolioById(view.id);
      parts.push({ label: pf ? pf.name : "?", current: true });
    } else if (view.name === "project") {
      const proj = projectById(view.id);
      const pf = proj ? portfolioById(proj.portfolioId) : null;
      parts.push({ label: "All", href: "#/" });
      if (pf) parts.push({ label: pf.name, href: `#/p/${pf.id}` });
      parts.push({ label: proj ? proj.name : "?", current: true });
    }
    parts.forEach((p, i) => {
      if (i > 0) {
        const sep = document.createElement("span");
        sep.className = "sep";
        sep.textContent = "›";
        el.appendChild(sep);
      }
      if (p.href) {
        const a = document.createElement("a");
        a.href = p.href; a.textContent = p.label;
        el.appendChild(a);
      } else {
        const s = document.createElement("span");
        s.className = "current";
        s.textContent = p.label;
        el.appendChild(s);
      }
    });
  }

  function renderRunningBar() {
    const el = $("runningBar");
    el.innerHTML = "";
    const r = getRunning();
    if (!r) return;
    const a = activityById(r.activityId);
    const proj = a ? projectById(a.projectId) : null;
    const pf = proj ? portfolioById(proj.portfolioId) : null;

    const bar = document.createElement("div");
    bar.className = "running-bar";

    const dot = document.createElement("span");
    dot.className = "pulse-dot";
    if (a) dot.style.background = a.color;

    const label = document.createElement("div");
    label.className = "label";
    if (a && proj) {
      label.innerHTML = `<span>${escapeHtml(a.name)}</span> <span class="sub">· ${escapeHtml(proj.name)}${pf ? " · " + escapeHtml(pf.name) : ""}</span>`;
      label.style.cursor = "pointer";
      label.addEventListener("click", () => navigate({ name: "project", id: proj.id }));
    } else {
      label.textContent = "Running…";
    }

    const live = document.createElement("span");
    live.className = "live";
    live.dataset.live = "1";
    live.dataset.entryId = r.id;
    live.textContent = fmtDuration(Date.now() - new Date(r.start).getTime());

    const stop = document.createElement("button");
    stop.className = "stop-btn";
    stop.textContent = "Stop";
    stop.addEventListener("click", stopRunning);

    bar.append(dot, label, live, stop);
    el.appendChild(bar);
  }

  // -------- Home view (portfolios)
  function openScheduleEditor(eventId, initialDate) {

    }

    const ev = eventId ? scheduleEventById(eventId) : null;

    refLabel.textContent = "Link to task";

    noneOpt.value = "";
    noneOpt.textContent = "None";

    for (const a of state.activities) {
      const opt = document.createElement("option");
      opt.value = a.id;
      const project = projectById(a.projectId);
      opt.textContent = `${a.name}${project ? " — " + project.name : ""}`;
      if (ev && ev.ref && ev.ref.kind === "activity" && ev.ref.id === a.id) opt.selected = true;
      refSelect.appendChild(opt);
    }
    refLabel.appendChild(refSelect);

    const error = document.createElement("div");
    error.className = "err";

    function refreshTimeInputs() {
      const disabled = allDayInput.checked;
      startInput.disabled = disabled;
      endInput.disabled = disabled;
      startInput.style.opacity = disabled ? "0.6" : "1";
      endInput.style.opacity = disabled ? "0.6" : "1";
    }

    refreshTimeInputs();

    const actions = document.createElement("div");
    actions.className = "sched-form-actions";

    cancelBtn.type = "button";
    cancelBtn.textContent = "Cancel";
    const deleteBtn = document.createElement("button");
    deleteBtn.type = "button";
    deleteBtn.className = "danger";
    deleteBtn.textContent = "Delete";
    if (!ev) deleteBtn.style.display = "none";

    saveBtn.addEventListener("click", () => {
      const title = titleInput.value.trim() || "Event";
      const dateStr = dateInput.value;
      if (!dateStr) { error.textContent = "Pick a date."; return; }
      const allDay = allDayInput.checked;
      let start = allDay ? "00:00" : startInput.value;
      let end = allDay ? "23:59" : endInput.value;
      if (!allDay && (!start || !end)) { error.textContent = "Pick both start and end times."; return; }
      const startIso = combineDateTime(dateStr, start);
      const endIso = combineDateTime(dateStr, end);

          start: startIso,
          end: endIso,
          allDay,
          notes: notesInput.value.trim(),

      state.events = state.events.filter(item => item.id !== ev.id);

  function renderScheduleTimeGrid(root, cursor, mode) {
    const days = mode === "day" ? [cursor] : scheduleWeekDays(cursor);
    const todayKey = startOfDay(new Date()).getTime();
    const alldayRow = document.createElement("div");
    alldayRow.className = "sched-allday-row " + mode;
    const labelCell = document.createElement("div");
    labelCell.className = "sched-allday-label";
    labelCell.textContent = "All day";
    alldayRow.appendChild(labelCell);
    days.forEach((day) => {
      const cell = document.createElement("div");
      cell.className = "sched-allday-cell";
      if (startOfDay(day).getTime() === todayKey) cell.classList.add("today");
      const events = scheduleEventsForDay(day).filter(ev => ev.allDay);
      events.forEach((ev) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "sched-event all-day-chip";
        chip.style.background = scheduleEventColor(ev);
        chip.textContent = ev.title;
        chip.title = `${ev.title} — All day`;
        chip.addEventListener("click", (e) => { e.stopPropagation(); openScheduleEditor(ev.id, day); });
        cell.appendChild(chip);
      });
      alldayRow.appendChild(cell);
    });
    root.appendChild(alldayRow);

    const grid = document.createElement("div");
    grid.className = "sched-time-grid " + mode;
    const corner = document.createElement("div");
    corner.className = "sched-corner";
    grid.appendChild(corner);
    days.forEach((day) => {
      const head = document.createElement("div");
      head.className = "sched-day-head" + (startOfDay(day).getTime() === todayKey ? " today" : "");
      const dow = day.toLocaleDateString(undefined, { weekday: "short" });
      head.innerHTML = `<span>${escapeHtml(dow)}</span><span class="dnum">${day.getDate()}</span>`;
      grid.appendChild(head);
    });

    // when in day view, render half-hour rows for finer labels
    const slots = scheduleState.view === "day" ? 24 * 2 : 24;
    for (let s = 0; s < slots; s += 1) {
      const isHalf = scheduleState.view === "day" && (s % 2 === 1);
      const label = document.createElement("div");
      label.className = isHalf ? "sched-half-label" : "sched-hour-label";
      if (isHalf) {
        const hr = Math.floor(s / 2);
        label.textContent = `${hr}:30`;
      } else {
        const hr = Math.floor(s / (scheduleState.view === "day" ? 2 : 1));
        label.textContent = `${hr}:00`;
      }
      grid.appendChild(label);
      days.forEach(() => {
        const col = document.createElement("div");
        col.className = "sched-day-col";
        grid.appendChild(col);
      });
    }

    const dayCols = Array.from(grid.querySelectorAll(".sched-day-col"));

    // replace placeholder day columns with actual columns for event rendering
    for (let i = 0; i < days.length; i += 1) {
      const day = days[i];
      const dayStart = startOfDay(day).getTime();
      const dayEnd = dayStart + MS_DAY;
      const dayCol = dayCols[i];
      dayCol.addEventListener("click", () => openScheduleEditor(null, day));
      const events = scheduleEventsInRange(dayStart, dayEnd).filter(ev => !ev.allDay);
      events.forEach((ev) => {
        const evStart = Math.max(new Date(ev.start).getTime(), dayStart);
        const evEnd = Math.min(new Date(ev.end).getTime(), dayEnd);
        const top = ((evStart - dayStart) / MS_HOUR) * 48;
        const height = Math.max(22, ((evEnd - evStart) / MS_HOUR) * 48);
        const block = document.createElement("button");
        block.type = "button";
        block.className = "sched-event";
        block.style.top = `${top}px`;
        block.style.height = `${height}px`;
        block.style.background = scheduleEventColor(ev);
        block.innerHTML = `<span class="ev-title">${escapeHtml(ev.title)}</span><span class="ev-time">${ev.allDay ? "All day" : fmtClock(ev.start) + " – " + fmtClock(ev.end)}</span>`;
        block.addEventListener("click", (e) => { e.stopPropagation(); openScheduleEditor(ev.id, day); });
        dayCol.appendChild(block);
      });
      const now = Date.now();
      if (now >= dayStart && now < dayEnd) {
        const nowLine = document.createElement("div");
        nowLine.className = "sched-now-line";
        nowLine.style.top = `${((now - dayStart) / MS_HOUR) * 48}px`;
        dayCol.appendChild(nowLine);
      }
    }

    root.appendChild(grid);
  }

  function renderScheduleMonth(root, cursor) {
    const firstOfMonth = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    const firstDay = startOfWeek(firstOfMonth);
    const cells = Array.from({ length: 42 }, (_, index) => {
      const d = new Date(firstDay);
      d.setDate(firstDay.getDate() + index);
      return d;
    });

    const monthGrid = document.createElement("div");
    monthGrid.className = "sched-month";
    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const sundayStart = (state.settings && state.settings.weekStart) === "sunday";
    const orderedDayNames = sundayStart ? dayNames : ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    orderedDayNames.forEach((name) => {
      const head = document.createElement("div");
      head.className = "mhead";
      head.textContent = name;
      monthGrid.appendChild(head);
    });

    const todayKey = startOfDay(new Date()).getTime();
    cells.forEach((day) => {
      const cell = document.createElement("div");
      cell.className = "mcell";
      if (day.getMonth() !== cursor.getMonth()) cell.classList.add("out");
      if (startOfDay(day).getTime() === todayKey) cell.classList.add("today");
      const label = document.createElement("div");
      label.className = "mday";
      label.textContent = String(day.getDate());
      cell.appendChild(label);
      const events = scheduleEventsForDay(day).slice(0, 3);
      cell.addEventListener("click", () => openScheduleEditor(null, day));
      events.forEach((ev) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "mev";
        btn.style.background = scheduleEventColor(ev);
        btn.textContent = ev.title;
        btn.title = `${ev.title} • ${fmtClock(ev.start)} – ${fmtClock(ev.end)}`;
        btn.addEventListener("click", (e) => { e.stopPropagation(); openScheduleEditor(ev.id, day); });
        cell.appendChild(btn);
      });
      const total = scheduleEventsForDay(day).length;
      if (total > 3) {
        const more = document.createElement("div");
        more.className = "more";
        more.textContent = `+${total - 3} more`;
        cell.appendChild(more);
      }
      monthGrid.appendChild(cell);
    });
    root.appendChild(monthGrid);
  }

  function buildProjectCard(proj, idx) {
    const acts = activitiesOfProject(proj.id);
    const actIds = new Set(acts.map(a => a.id));
    const weekStart = startOfWeek(new Date()).getTime();
    const weekEnd = weekStart + 7 * MS_DAY;
    const todayMs = totalForFilterOnDay(e => actIds.has(e.activityId), new Date());
    const weekMs = totalForFilterInRange(e => actIds.has(e.activityId), weekStart, weekEnd);
    const totalMs = totalForFilterInRange(e => actIds.has(e.activityId), 0, Date.now() + MS_DAY);

    const card = document.createElement("button");
    card.type = "button";
    card.className = "card";
    card.dataset.projectId = proj.id;
    if (isProjectRunning(proj.id)) card.classList.add("running");
    if (highlightIds.has(proj.id)) card.classList.add("new-row");
    card.style.animationDelay = (idx * 30) + "ms";
    card.addEventListener("click", () => navigate({ name: "project", id: proj.id }));

    const top = document.createElement("div");
    top.className = "card-top";
    const handle = makeDragHandle("element-handle");
    const dot = document.createElement("span");
    dot.className = "dot"; dot.style.background = proj.color;
    const title = document.createElement("span");
    title.className = "title";
    title.textContent = proj.name;
    const right = document.createElement("span");
    right.className = "right";
    right.textContent = fmtHours(weekMs) + " / wk";
    top.append(handle, dot, title, right);
    card.appendChild(top);

    const sub = document.createElement("div");
    sub.className = "sub";
    const st = STATUS_BY[proj.status] || STATUS_BY.active;
    const badge = document.createElement("span");
    badge.className = "badge " + st.cls;
    badge.innerHTML = `<span class="badge-dot"></span>${st.label}`;
    sub.appendChild(badge);

    if (proj.deadline) {
      const d = daysUntil(proj.deadline);
      const dEl = document.createElement("span");
      if (d < 0) dEl.className = "due-overdue";
      else if (d <= 3) dEl.className = "due-soon";
      dEl.textContent = d < 0
        ? `${Math.abs(d)}d overdue`
        : d === 0 ? "due today" : d === 1 ? "due tomorrow" : `due in ${d}d`;
      sub.appendChild(dEl);
    }
    if (proj.estimatedHours != null) {
      const t = document.createElement("span");
      t.textContent = `${fmtHours(totalMs)} / ${proj.estimatedHours}h`;
      sub.appendChild(t);
    }
    if (todayMs > 0) {
      const t = document.createElement("span");
      t.textContent = `${fmtHours(todayMs)} today`;
      sub.appendChild(t);
    }
    card.appendChild(sub);

    if (proj.estimatedHours != null && proj.estimatedHours > 0) {
      const totalH = totalMs / MS_HOUR;
      const pct = Math.min(100, Math.round((totalH / proj.estimatedHours) * 100));
      const mp = document.createElement("div");
      mp.className = "mini-progress";
      const inner = document.createElement("div");
      inner.style.width = pct + "%";
      if (totalH > proj.estimatedHours) inner.style.background = "var(--warn)";
      mp.appendChild(inner);
      card.appendChild(mp);
    }
    return card;
  }

      else if (d <= 3) dEl.className = "due-soon";
      dEl.textContent = `Due ${fmtDateShort(proj.deadline)}` +
        (d < 0 ? ` · ${Math.abs(d)}d overdue` : d === 0 ? " · today" : ` · in ${d}d`);
      meta.appendChild(dEl);
    }
    const t = document.createElement("span");
    t.textContent = proj.estimatedHours != null
      ? `${fmtHours(totalMs)} of ${proj.estimatedHours}h`
      : `${fmtHours(totalMs)} total`;
    meta.appendChild(t);
    hero.appendChild(meta);

    if (proj.description) {
      const d = document.createElement("div");
      d.className = "desc";
      d.textContent = proj.description;
      hero.appendChild(d);
    } else {
      const d = document.createElement("div");
      d.className = "desc empty-desc";
      d.textContent = "Add a description…";
      d.addEventListener("click", () => openProjectMetaEditor(proj.id, hero));
      hero.appendChild(d);
    }

    if (proj.estimatedHours != null && proj.estimatedHours > 0) {
      const totalH = totalMs / MS_HOUR;
      const pct = Math.min(100, Math.round((totalH / proj.estimatedHours) * 100));
      const wrap = document.createElement("div");
      wrap.className = "progress-wrap";
      wrap.innerHTML = `
        <div class="progress-meta">
          <span>${fmtHours(totalMs)} of ${proj.estimatedHours}h</span>
          <span>${pct}%</span>
        </div>`;
      const bar = document.createElement("div");
      bar.className = "progress" + (totalH > proj.estimatedHours ? " over" : "");
      const inner = document.createElement("div");
      requestAnimationFrame(() => { inner.style.width = pct + "%"; });
      bar.appendChild(inner);
      wrap.appendChild(bar);
      hero.appendChild(wrap);
    }

    const projDeps = buildDepsDisplay(proj.dependencies);
    if (projDeps) hero.appendChild(projDeps);

    const projGallery = buildImageGallery("project", proj.id, proj.images, { editable: true });
    if (projGallery) hero.appendChild(projGallery);

    root.appendChild(hero);

    // Tasks
    const actSec = document.createElement("section");
    actSec.dataset.panelId = "project-activities";
    const actHead = document.createElement("div");
    actHead.className = "section-head";
    actHead.innerHTML = `<h2>Tasks</h2>`;
    actSec.appendChild(actHead);

    const actList = document.createElement("div");
    actList.dataset.sortableList = "activities:" + proj.id;
    if (acts.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No tasks yet — add one to start tracking time on this project.";
      actSec.appendChild(empty);
    } else {
      const running = getRunning();
      acts.forEach((a, i) => {
        actList.appendChild(buildActivityRow(a, running, i));
        if (editingTaskId === a.id) actList.appendChild(buildTaskEditForm(a));
        else if (expandedTaskId === a.id) actList.appendChild(buildTaskDetail(a));
      });
      actSec.appendChild(actList);
    }
    const actAdder = inlineNameAdder("New task name…", "Add", (name) => {
      const id = addActivity(proj.id, name);
      if (id) render();
    });
    actSec.appendChild(actAdder);
    root.appendChild(actSec);

    // Today's entries (this project)
    const entSec = document.createElement("section");
    entSec.dataset.panelId = "project-today-entries";
    const entHead = document.createElement("div");
    entHead.className = "section-head";
    entHead.innerHTML = `<h2>Today's entries</h2>`;
    entSec.appendChild(entHead);

    const entList = document.createElement("div");
    const todays = entriesOnDay(new Date(), e => actIds.has(e.activityId));
    if (todays.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No entries today yet.";
      entSec.appendChild(empty);
    } else {
      todays.forEach((e, i) => entList.appendChild(buildEntryRow(e, i)));
      entSec.appendChild(entList);
    }
    const addBtn = document.createElement("button");
    addBtn.className = "subtle";
    addBtn.textContent = "+ Add manual entry";
    addBtn.addEventListener("click", () => {
      if (acts.length === 0) { alert("Add a task first."); return; }
      const editor = buildEntryEditor({
        activities: acts,
        activityId: acts[0].id,
        dateStr: isoToDateInput(new Date().toISOString()),
        startTime: "09:00",
        endTime: "10:00",
        tags: "",
        onCancel: () => render(),
        onSave: (vals) => addManualEntry(vals),
      });
      addBtn.replaceWith(editor);
    });
    entSec.appendChild(addBtn);
    root.appendChild(entSec);

    // Weekly chart by task (within project)
    if (acts.length > 0) {
      const chartSec = document.createElement("section");
      chartSec.dataset.panelId = "project-week-chart";
      const h = document.createElement("h2");
      h.textContent = "This week, by task";
      chartSec.appendChild(h);
      renderWeekChartByActivity(chartSec, acts);
      root.appendChild(chartSec);
    }
  }

  function toggleTaskExpanded(id) {
    if (editingTaskId === id) return; // don't collapse mid-edit
    expandedTaskId = expandedTaskId === id ? null : id;
    editingTaskId = null;
    render();
  }

  function setTaskPriority(id, value) {
    updateActivity(id, { priority: PRIORITY_BY[value] ? value : "none" });
    render();
  }

  // small priority pill; returns null for "none"
  function priorityBadge(value) {
    const p = PRIORITY_BY[value];
    if (!p || p.value === "none") return null;
    const span = document.createElement("span");
    span.className = "priority-badge " + p.cls;
    span.innerHTML = `<span class="pri-flag"></span>${p.label}`;
    span.title = `Priority: ${p.label}`;
    return span;
  }

  function buildActivityRow(a, running, idx) {
    const row = document.createElement("div");
    row.className = "activity";
    row.dataset.activityId = a.id;
    if (highlightIds.has(a.id)) row.classList.add("new-row");
    if (a.done) row.classList.add("done");
    row.style.animationDelay = (idx * 30) + "ms";

    const isRunning = running && running.activityId === a.id;
    if (isRunning) row.classList.add("running");

    const handle = makeDragHandle("element-handle");

    const dot = document.createElement("span");
    dot.className = "dot"; dot.style.background = a.color;
    dot.style.cursor = "pointer";
    dot.title = "Change color";
    dot.addEventListener("click", (e) => { e.stopPropagation();
      showColorPopover(dot, ACTIVITY_PALETTE, a.color, (c) => {
        dot.style.background = c; updateActivity(a.id, { color: c });
      });
    });

    const isExpanded = expandedTaskId === a.id || editingTaskId === a.id;
    if (isExpanded) row.classList.add("expanded");

    const center = document.createElement("div");
    center.className = "activity-center is-toggle";
    center.title = isExpanded ? "Click to collapse" : "Click for details";
    center.addEventListener("click", () => toggleTaskExpanded(a.id));

    const nameRow = document.createElement("div");
    nameRow.className = "name-row";
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = a.name;
    nameRow.appendChild(name);
    const pri = priorityBadge(a.priority);
    if (pri) nameRow.appendChild(pri);
    center.appendChild(nameRow);

    if (a.notes) {
      const notes = document.createElement("div");
      notes.className = "activity-notes";
      notes.textContent = a.notes;
      notes.title = a.notes;
      center.appendChild(notes);
    }

    const actDeps = buildDepsDisplay(a.dependencies);
    if (actDeps) center.appendChild(actDeps);

    if (a.images && a.images.length) {
      const g = buildImageGallery("activity", a.id, a.images, { editable: false });
      if (g) { g.classList.add("gallery-compact"); center.appendChild(g); }
    }

    const today = document.createElement("div");
    today.className = "today is-toggle";
    today.dataset.activityId = a.id;
    today.title = "Click for details";
    today.textContent = fmtDuration(totalForFilterOnDay(e => e.activityId === a.id, new Date()));
    today.addEventListener("click", () => toggleTaskExpanded(a.id));

    const actions = document.createElement("div");
    actions.className = "actions";

    const completeBtn = document.createElement("button");
    completeBtn.className = "icon-btn complete-btn" + (a.done ? " is-done" : "");
    completeBtn.title = a.done ? "Mark as not complete" : "Mark complete";
    completeBtn.setAttribute("aria-label", completeBtn.title);
    completeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;
    completeBtn.addEventListener("click", () => toggleActivityDone(a.id));

    const toggle = document.createElement("button");
    if (a.done) {
      toggle.className = "subtle";
      toggle.textContent = "Done";
      toggle.disabled = true;
    } else if (isRunning) {
      toggle.className = "stop";
      toggle.textContent = "Stop";
      toggle.addEventListener("click", stopRunning);
    } else {
      toggle.className = "primary";
      toggle.textContent = "Start";
      toggle.addEventListener("click", () => startActivity(a.id));
    }

    const del = document.createElement("button");
    del.className = "icon-btn danger";
    del.title = "Delete task";
    del.innerHTML = "&times;";
    del.style.fontSize = "1.1rem";
    del.addEventListener("click", () => deleteActivity(a.id));

    actions.append(completeBtn, toggle, del);
    row.append(handle, dot, center, today, actions);

    if (justCompletedIds.has(a.id)) {
      justCompletedIds.delete(a.id);
      requestAnimationFrame(() => playCompleteBurst(row));
    }
    return row;
  }

  // a minimalist, satisfying completion flourish over a row/element
  function playCompleteBurst(el) {
    if (!el) return;
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    void el.offsetWidth; // restart any prior animation
    el.classList.add("just-done");
    const burst = document.createElement("span");
    burst.className = "complete-burst";
    burst.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;
    el.appendChild(burst);
    setTimeout(() => burst.remove(), 900);
    setTimeout(() => el.classList.remove("just-done"), 720);
  }

  // application logging
  function logEvent(action, details) {
    try {
      const entry = { ts: new Date().toISOString(), action: action, details: details || {} };
      if (!Array.isArray(state.appLogs)) state.appLogs = [];
      state.appLogs.push(entry);
      // keep logs reasonably bounded (e.g., 5k entries)
      if (state.appLogs.length > 5000) state.appLogs.shift();
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    } catch (e) { console.error('logEvent failed', e); }
  }

  function sparkleSvg() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z"/><path d="M18.5 14.5l.7 1.9 1.9.7-1.9.7-.7 1.9-.7-1.9-1.9-.7 1.9-.7z"/></svg>`;
  }

  // a "Summarize with the guru" button for any entity hero/row
  function makeSummarizeButton(kind, id, opts = {}) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "icon-btn ai-summarize" + (opts.compact ? " compact" : "");
    btn.title = "Summarize with the Planning Guru";
    btn.setAttribute("aria-label", btn.title);
    btn.innerHTML = sparkleSvg() + (opts.compact ? "" : "<span>Summary</span>");
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      guruSummarizeEntity(kind, id);
    });
    return btn;
  }

  // centered celebration for completing a larger entity (e.g. a project)
  function celebrateComplete(message) {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (!reduce) {
      const o = document.createElement("div");
      o.className = "celebrate-overlay";
      o.innerHTML = `<span class="celebrate-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg></span>`;
      document.body.appendChild(o);
      setTimeout(() => o.remove(), 1000);
    }
    if (message) toast(message);
  }

  // read-style detail panel shown when a task row is expanded
  function buildTaskDetail(a) {
    const proj = projectById(a.projectId);
    const now = Date.now();
    const weekStart = startOfWeek(new Date()).getTime();
    const totalMs = totalForFilterInRange(e => e.activityId === a.id, 0, now + MS_DAY);
    const weekMs = totalForFilterInRange(e => e.activityId === a.id, weekStart, weekStart + 7 * MS_DAY);
    const todayMs = totalForFilterOnDay(e => e.activityId === a.id, new Date());
    const entryCount = state.entries.filter(e => e.activityId === a.id).length;

    const panel = document.createElement("div");
    panel.className = "task-detail";

    // quick priority selector
    const priField = document.createElement("div");
    priField.className = "td-field";
    const priCap = document.createElement("div");
    priCap.className = "td-label";
    priCap.textContent = "Priority";
    const priChips = document.createElement("div");
    priChips.className = "pri-chips";
    for (const p of PRIORITIES) {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "pri-chip " + p.cls + (a.priority === p.value ? " active" : "");
      chip.textContent = p.label;
      chip.addEventListener("click", () => setTaskPriority(a.id, p.value));
      priChips.appendChild(chip);
    }
    priField.append(priCap, priChips);
    panel.appendChild(priField);

    // metadata grid
    const grid = document.createElement("div");
    grid.className = "td-grid";
    const addMeta = (label, value) => {
      const cell = document.createElement("div");
      cell.className = "td-cell";
      cell.innerHTML = `<div class="td-label">${escapeHtml(label)}</div><div class="td-value">${escapeHtml(value)}</div>`;
      grid.appendChild(cell);
    };
    addMeta("Status", a.done ? "Complete" : "In progress");
    addMeta("Project", proj ? proj.name : "—");
    addMeta("Total logged", fmtHours(totalMs));
    addMeta("This week", fmtHours(weekMs));
    addMeta("Today", fmtDuration(todayMs));
    addMeta("Entries", String(entryCount));
    panel.appendChild(grid);

    // notes
    const notesField = document.createElement("div");
    notesField.className = "td-field";
    notesField.innerHTML = `<div class="td-label">Notes</div>`;
    const notesVal = document.createElement("div");
    notesVal.className = "td-notes" + (a.notes ? "" : " empty");
    notesVal.textContent = a.notes || "No notes yet.";
    notesField.appendChild(notesVal);
    panel.appendChild(notesField);

    // dependencies
    const deps = buildDepsDisplay(a.dependencies);
    if (deps) {
      const depField = document.createElement("div");
      depField.className = "td-field";
      depField.innerHTML = `<div class="td-label">Dependencies</div>`;
      depField.appendChild(deps);
      panel.appendChild(depField);
    }

    // photos (read-only here; edit to add/remove)
    if (a.images && a.images.length) {
      const imgField = document.createElement("div");
      imgField.className = "td-field";
      imgField.innerHTML = `<div class="td-label">Photos</div>`;
      imgField.appendChild(buildImageGallery("activity", a.id, a.images, { editable: false }));
      panel.appendChild(imgField);
    }

    // actions: Summary + Edit (the two buttons revealed on click)
    const acts = document.createElement("div");
    acts.className = "td-actions";
    const sumBtn = makeSummarizeButton("activity", a.id);
    const editBtn = document.createElement("button");
    editBtn.className = "icon-btn td-edit";
    editBtn.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg><span>Edit</span>`;
    editBtn.title = "Edit this task";
    editBtn.addEventListener("click", () => { editingTaskId = a.id; expandedTaskId = a.id; render(); });
    acts.append(sumBtn, editBtn);
    panel.appendChild(acts);

    return panel;
  }

  // editable form for a task (name, priority, notes, dependencies, photos)
  function buildTaskEditForm(a) {
    const form = document.createElement("div");
    form.className = "meta-form task-edit";

    const nameL = document.createElement("label");
    nameL.textContent = "Name";
    const nameI = document.createElement("input");
    nameI.type = "text"; nameI.value = a.name;
    nameL.appendChild(nameI);

    // color picker for activity
    let actColor = a.color || ACTIVITY_PALETTE[0];
    const colorAL = document.createElement("label");
    colorAL.textContent = "Color";
    const colorPickerA = colorSwatches(ACTIVITY_PALETTE, actColor, (c) => { actColor = c; });
    colorAL.appendChild(colorPickerA);

    const priL = document.createElement("label");
    priL.textContent = "Priority";
    const priI = document.createElement("select");
    for (const p of PRIORITIES) {
      const o = document.createElement("option");
      o.value = p.value; o.textContent = p.label;
      if (p.value === (a.priority || "none")) o.selected = true;
      priI.appendChild(o);
    }
    priL.appendChild(priI);

    const notesL = document.createElement("label");
    notesL.className = "full";
    notesL.textContent = "Notes";
    const notesI = document.createElement("textarea");
    notesI.value = a.notes || "";
    notesI.placeholder = "Context, links, what counts toward this task…";
    notesL.appendChild(notesI);

    let depsBuffer = [...(a.dependencies || [])];
    const depsEditor = buildDependencyEditor("activity", a.id, depsBuffer, (next) => { depsBuffer = next; });

    const imgL = document.createElement("div");
    imgL.className = "full meta-field";
    const imgCap = document.createElement("span");
    imgCap.className = "meta-cap";
    imgCap.textContent = "Photos";
    imgL.appendChild(imgCap);
    imgL.appendChild(buildImageGallery("activity", a.id, a.images, { editable: true }));

    const rowActs = document.createElement("div");
    rowActs.className = "row-actions";
    const saveBtn = document.createElement("button");
    saveBtn.className = "primary"; saveBtn.textContent = "Save";
    saveBtn.addEventListener("click", () => {
      updateActivity(a.id, {
        name: (nameI.value || "").trim() || a.name,
        color: actColor,
        priority: priI.value,
        notes: notesI.value,
        dependencies: depsBuffer,
      });
      editingTaskId = null;
      expandedTaskId = a.id;
      render();
    });
    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "Cancel";
    cancelBtn.addEventListener("click", () => { editingTaskId = null; render(); });
    rowActs.append(saveBtn, cancelBtn);

    form.append(nameL, colorAL, priL, notesL, depsEditor, imgL, rowActs);
    return form;
  }

  function buildEntryRow(e, idx) {
    const a = activityById(e.activityId);
    const proj = a ? projectById(a.projectId) : null;

    const row = document.createElement("div");
    row.className = "entry";
    row.dataset.entryId = e.id;
    if (highlightIds.has(e.id)) row.classList.add("new-row");
    row.style.animationDelay = (idx * 25) + "ms";

    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = a ? a.color : "#ccc";

    const center = document.createElement("div");
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = a ? a.name : "(deleted task)";
    const meta = document.createElement("div");
    meta.className = "meta";
    const endLabel = e.end ? fmtClock(e.end) : "now";
    meta.textContent = `${fmtClock(e.start)} – ${endLabel}`;
    center.append(name, meta);
    if (e.tags && e.tags.length) {
      const tags = document.createElement("div");
      tags.className = "tags";
      for (const t of e.tags) {
        const chip = document.createElement("span");
        chip.className = "tag-chip";
        chip.textContent = "#" + t;
        tags.appendChild(chip);
      }
      center.appendChild(tags);
    }

    const dur = document.createElement("div");
    dur.className = "dur";
    if (e.end === null) dur.dataset.live = "1";
    dur.dataset.entryId = e.id;
    const ms = e.end ? (new Date(e.end) - new Date(e.start)) : (Date.now() - new Date(e.start).getTime());
    dur.textContent = fmtDuration(ms);

    const actions = document.createElement("div");
    actions.className = "actions";
    if (e.end !== null) {
      const editBtn = document.createElement("button");
      editBtn.className = "icon-btn";
      editBtn.textContent = "Edit";
      editBtn.addEventListener("click", () => openEditEntry(e.id, proj));
      actions.appendChild(editBtn);
    }
    const delBtn = document.createElement("button");
    delBtn.className = "icon-btn danger";
    delBtn.title = "Delete entry";
    delBtn.innerHTML = "&times;";
    delBtn.style.fontSize = "1.1rem";
    delBtn.addEventListener("click", () => {
      if (confirm("Delete this entry?")) deleteEntry(e.id);
    });
    actions.appendChild(delBtn);

    row.append(dot, center, dur, actions);
    return row;
  }

  function openEditEntry(id, project) {
    const e = state.entries.find(x => x.id === id);
    if (!e || e.end === null) return;
    const row = document.querySelector(`.entry[data-entry-id="${id}"]`);
    if (!row) return;
    const acts = project ? activitiesOfProject(project.id) : state.activities;
    const editor = buildEntryEditor({
      activities: acts,
      activityId: e.activityId,
      dateStr: isoToDateInput(e.start),
      startTime: fmtClock(e.start),
      endTime: fmtClock(e.end),
      tags: (e.tags || []).join(", "),
      onCancel: () => render(),
      onSave: ({ activityId, dateStr, startTime, endTime, tags }) => {
        const start = combineDateTime(dateStr, startTime);
        const end = combineDateTime(dateStr, endTime);
        return updateEntry(id, { activityId, start, end, tags: parseTags(tags) });
      },
    });
    row.replaceWith(editor);
  }

  function buildEntryEditor({ activities, activityId, dateStr, startTime, endTime, tags, onSave, onCancel }) {
    const wrap = document.createElement("div");
    wrap.className = "entry-edit";

    const actSel = document.createElement("select");
    for (const a of activities) {
      const opt = document.createElement("option");
      opt.value = a.id; opt.textContent = a.name;
      if (a.id === activityId) opt.selected = true;
      actSel.appendChild(opt);
    }
    const dateInp = document.createElement("input");
    dateInp.type = "date"; dateInp.value = dateStr;

    const timeWrap = document.createElement("div");
    timeWrap.style.display = "flex";
    timeWrap.style.gap = "0.35rem";
    timeWrap.style.alignItems = "center";
    const startInp = document.createElement("input");
    startInp.type = "time"; startInp.value = startTime;
    const dash = document.createElement("span");
    dash.textContent = "–"; dash.style.color = "var(--muted)";
    const endInp = document.createElement("input");
    endInp.type = "time"; endInp.value = endTime;
    timeWrap.append(startInp, dash, endInp);

    const actions = document.createElement("div");
    actions.className = "row-actions";
    const saveBtn = document.createElement("button");
    saveBtn.className = "primary"; saveBtn.textContent = "Save";
    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "Cancel";

    const tagsInp = document.createElement("input");
    tagsInp.type = "text";
    tagsInp.className = "tags-input";
    tagsInp.value = tags || "";
    tagsInp.placeholder = "tags, comma-separated (e.g. Meetings, Deep Work)";

    const err = document.createElement("div");
    err.className = "err";

    saveBtn.addEventListener("click", () => {
      const res = onSave({
        activityId: actSel.value,
        dateStr: dateInp.value,
        startTime: startInp.value,
        endTime: endInp.value,
        tags: tagsInp.value,
      });

  function drawWeekChart(parent, items) {
    // axis
    const header = document.createElement("div");
    header.className = "week-grid";

    const axis = document.createElement("div");
    axis.className = "axis";
    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const todayMs = startOfDay(new Date()).getTime();
    const ds = weekDays();
    ds.forEach((d, i) => {
      const cell = document.createElement("div");
      cell.textContent = dayNames[d.getDay()];
      if (d.getTime() === todayMs) cell.classList.add("today-cell");
      axis.appendChild(cell);

    const sp2 = document.createElement("div");
    sp2.className = "week-label";
    sp2.textContent = "Week";
    header.append(sp1, axis, sp2);
    parent.appendChild(header);

    let max = 1;
    for (const it of items) for (const v of it.dayMs) if (v > max) max = v;

    items.forEach((it, idx) => {
      const row = document.createElement("div");
      row.className = "week-row";

        bar.style.background = it.color;

  function escapeHtml(s) {

  // -------------------------------------------------------------------------
  // image attachments — client-side compress to data URLs, stored inline
  // -------------------------------------------------------------------------
  const IMG_MAX_DIM = 1280;     // longest edge, px
  const IMG_QUALITY = 0.82;     // JPEG quality
  const IMG_MAX_PER_ENTITY = 12;

  function entityByKind(kind, id) {
    if (kind === "portfolio") return portfolioById(id);
    if (kind === "project")   return projectById(id);
    if (kind === "activity")  return activityById(id);
    return null;
  }

  // resize + re-encode a single image File to a compressed data URL
  function compressImageFile(file) {
    return new Promise((resolve, reject) => {
      if (!file || !/^image\//.test(file.type)) {
        reject(new Error("Not an image file."));
        return;
      }
      const reader = new FileReader();
      reader.onerror = () => reject(new Error("Couldn't read the file."));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error("Couldn't decode the image."));
        img.onload = () => {
          let { width, height } = img;
          const scale = Math.min(1, IMG_MAX_DIM / Math.max(width, height));
          width = Math.max(1, Math.round(width * scale));
          height = Math.max(1, Math.round(height * scale));
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          // PNGs with transparency would go black on JPEG — keep small PNGs as-is
          const isPng = /png/i.test(file.type);
          const out = isPng && file.size < 250000
            ? canvas.toDataURL("image/png")
            : canvas.toDataURL("image/jpeg", IMG_QUALITY);
          resolve(out);
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  async function addImagesToEntity(kind, id, fileList) {
    const ent = entityByKind(kind, id);
    if (!ent) return;
    if (!Array.isArray(ent.images)) ent.images = [];
    const files = Array.from(fileList || []).filter(f => /^image\//.test(f.type));
    if (files.length === 0) return;
    const room = IMG_MAX_PER_ENTITY - ent.images.length;
    if (room <= 0) { toast(`Up to ${IMG_MAX_PER_ENTITY} photos here.`); return; }
    const slice = files.slice(0, room);
    let added = 0;
    for (const f of slice) {
      try {
        const dataUrl = await compressImageFile(f);
        ent.images.push(dataUrl);
        added++;
      } catch (err) {
        console.error("Image add failed:", err);
      }
    }
    if (added) {
      save();
      render();
      toast(added === 1 ? "Photo added" : `${added} photos added`);
    } else {
      toast("Couldn't add those files");
    }
  }

  function removeEntityImage(kind, id, index) {
    const ent = entityByKind(kind, id);
    if (!ent || !Array.isArray(ent.images)) return;
    ent.images.splice(index, 1);
    save();
    render();
  }

  // generic file attachments (any MIME type) stored inline as data URLs
  async function addFilesToEntity(kind, id, fileList) {
    const ent = entityByKind(kind, id);
    if (!ent) return;
    if (!Array.isArray(ent.files)) ent.files = [];
    const files = Array.from(fileList || []);

    for (const f of files) {
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = () => reject(new Error('read error'));
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(f);
        });
        ent.files.push({ id: uid(), name: f.name, type: f.type || 'application/octet-stream', size: f.size, data: dataUrl });
        added++;
      } catch (e) { console.error('file add error', e); }
    }
    if (added) { save(); render(); toast(added === 1 ? 'File added' : `${added} files added`); }
  }

  // fullscreen image viewer with prev/next
  function openLightbox(images, startIndex) {
    images = Array.isArray(images) ? images : [images];
    let idx = startIndex || 0;
    const overlay = document.createElement("div");
    overlay.className = "lightbox";
    const img = document.createElement("img");
    img.className = "lightbox-img";
    const show = () => { img.src = images[idx]; };
    show();
    overlay.appendChild(img);

    if (images.length > 1) {
      const counter = document.createElement("div");
      counter.className = "lightbox-counter";
      const upd = () => { counter.textContent = `${idx + 1} / ${images.length}`; };
      upd();
      overlay.appendChild(counter);
      const mk = (cls, txt, delta) => {
        const b = document.createElement("button");
        b.className = "lightbox-nav " + cls;
        b.innerHTML = txt;
        b.addEventListener("click", (e) => {
          e.stopPropagation();
          idx = (idx + delta + images.length) % images.length;
          show(); upd();
        });
        return b;
      };
      overlay.appendChild(mk("prev", "&#8249;", -1));
      overlay.appendChild(mk("next", "&#8250;", 1));
    }

    const close = () => {
      overlay.classList.add("closing");
      document.removeEventListener("keydown", onKey);
      setTimeout(() => overlay.remove(), 180);
    };
    const onKey = (e) => {
      if (e.key === "Escape") close();
      else if (e.key === "ArrowRight" && images.length > 1) { idx = (idx + 1) % images.length; show(); }
      else if (e.key === "ArrowLeft" && images.length > 1) { idx = (idx - 1 + images.length) % images.length; show(); }
    };
    overlay.addEventListener("click", close);
    document.addEventListener("keydown", onKey);
    document.body.appendChild(overlay);
  }

  // -------------------------------------------------------------------------
  // reports view
  // -------------------------------------------------------------------------
  const reportsState = { range: "7d", portfolioId: "" };

  function rangeBounds(key) {
    const now = new Date();
    const dayEnd = startOfDay(now).getTime() + MS_DAY;
    if (key === "7d") {
      const from = startOfDay(new Date(now.getTime() - 6 * MS_DAY)).getTime();
      return { from, to: dayEnd, days: 7, label: "Last 7 days" };
    }
    if (key === "30d") {
      const from = startOfDay(new Date(now.getTime() - 29 * MS_DAY)).getTime();
      return { from, to: dayEnd, days: 30, label: "Last 30 days" };
    }
    if (key === "month") {
      const from = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
      const days = Math.max(1, Math.ceil((dayEnd - from) / MS_DAY));
      return { from, to: dayEnd, days, label: now.toLocaleDateString(undefined, { month: "long", year: "numeric" }) };
    }
    // all time
    let minStart = dayEnd - MS_DAY;
    for (const e of state.entries) {
      const t = new Date(e.start).getTime();
      if (t < minStart) minStart = t;
    }
    const from = startOfDay(new Date(minStart)).getTime();
    const days = Math.max(1, Math.ceil((dayEnd - from) / MS_DAY));
    return { from, to: dayEnd, days, label: "All time" };
  }

  function reportEntryFilter() {
    const pid = reportsState.portfolioId;
    if (!pid) return () => true;
    return (e) => isActivityInPortfolio(e.activityId, pid);
  }

  function entryDurationClipped(e, fromMs, toMs) {
    const s = new Date(e.start).getTime();
    const en = e.end ? new Date(e.end).getTime() : Date.now();
    const cS = Math.max(s, fromMs);
    const cE = Math.min(en, toMs);
    return cE > cS ? cE - cS : 0;
  }

  function renderReportsView(root) {
    if (reportsState.portfolioId && !portfolioById(reportsState.portfolioId)) reportsState.portfolioId = "";
    const bounds = rangeBounds(reportsState.range);
    const filt = reportEntryFilter();
    const totalMs = totalForFilterInRange(filt, bounds.from, bounds.to);
    const entries = state.entries.filter(e => {
      if (!filt(e)) return false;
      const s = new Date(e.start).getTime();
      return s >= bounds.from && s < bounds.to;
    });
    const dayKeys = new Set(entries.map(e => startOfDay(new Date(e.start)).toDateString()));

    // hero
    const hero = document.createElement("div");
    hero.className = "hero";

  function appendStatCard(parent, label, value, sub) {
    const c = document.createElement("div");
    c.className = "stat-card";
    const l = document.createElement("div"); l.className = "label"; l.textContent = label;
    const v = document.createElement("div"); v.className = "value"; v.textContent = value;
    const s = document.createElement("div"); s.className = "sub"; s.textContent = sub || "";
    c.append(l, v, s);
    parent.appendChild(c);
  }

  function renderHorizontalBars(parent, items) {
    const list = document.createElement("div");
    list.className = "hbar-list";
    items.forEach((it, idx) => {
      const row = document.createElement("div");
      row.className = "hbar";
      row.style.animationDelay = (idx * 30) + "ms";
      if (it.onClick) { row.style.cursor = "pointer"; row.addEventListener("click", it.onClick); }
      const dot = document.createElement("span");
      dot.className = "dot"; dot.style.background = it.color;
      const middle = document.createElement("div");
      const lbl = document.createElement("div");
      lbl.className = "label"; lbl.textContent = it.label;
      const wrap = document.createElement("div");
      wrap.className = "bar-wrap";
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.background = it.color;
      requestAnimationFrame(() => { bar.style.width = it.pct + "%"; });
      wrap.appendChild(bar);
      middle.append(lbl, wrap);
      const val = document.createElement("div");
      val.className = "value"; val.textContent = it.value;
      row.append(dot, middle, val);
      list.appendChild(row);
    });
    parent.appendChild(list);
  }

  function renderDailyChart(parent, bounds, filt) {
    const days = [];
    for (let t = bounds.from; t < bounds.to; t += MS_DAY) {
      const dStart = t;
      const dEnd = Math.min(t + MS_DAY, bounds.to);
      const ms = totalForFilterInRange(filt, dStart, dEnd);
      days.push({ date: new Date(dStart), ms });
    }
    let max = 1;
    for (const d of days) if (d.ms > max) max = d.ms;

    const chart = document.createElement("div");
    chart.className = "daily-chart";
    chart.style.setProperty("--cols", days.length);
    const todayKey = startOfDay(new Date()).toDateString();
    days.forEach((d) => {
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.title = `${d.date.toLocaleDateString(undefined, { month: "short", day: "numeric" })} · ${fmtHours(d.ms)}`;
      if (d.date.toDateString() === todayKey) bar.classList.add("today-bar");
      if (d.ms <= 0) {
        bar.classList.add("zero");
      } else {
        const pct = Math.max(6, Math.round((d.ms / max) * 100));
        requestAnimationFrame(() => { bar.style.height = pct + "%"; });
      }
      chart.appendChild(bar);
    });
    parent.appendChild(chart);

    const axis = document.createElement("div");
    axis.className = "daily-axis";
    if (days.length > 0) {
      const left = document.createElement("span");
      left.textContent = days[0].date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      const right = document.createElement("span");
      right.textContent = days[days.length - 1].date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      axis.append(left, right);
    }
    parent.appendChild(axis);
  }

  function renderStatusDonut(parent, projects) {
    const counts = { planning: 0, active: 0, "on-hold": 0, done: 0 };
    for (const p of projects) {
      const k = p.status || "active";
      counts[k] = (counts[k] || 0) + 1;
    }
    const total = projects.length;
    const colorOf = { planning: "#9ca3af", active: "#16a34a", "on-hold": "#ca8a04", done: "#6b7280" };

    const row = document.createElement("div");
    row.className = "donut-row";

    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("class", "donut");
    svg.setAttribute("viewBox", "0 0 100 100");
    const cx = 50, cy = 50, r = 40;
    const circ = 2 * Math.PI * r;
    const track = document.createElementNS(ns, "circle");
    track.setAttribute("class", "track");
    track.setAttribute("cx", cx); track.setAttribute("cy", cy); track.setAttribute("r", r);
    svg.appendChild(track);

    let offset = 0;
    for (const s of STATUSES) {
      const c = counts[s.value] || 0;
      if (c === 0 || total === 0) continue;
      const frac = c / total;
      const slice = document.createElementNS(ns, "circle");
      slice.setAttribute("class", "slice");
      slice.setAttribute("cx", cx); slice.setAttribute("cy", cy); slice.setAttribute("r", r);
      slice.setAttribute("stroke", colorOf[s.value]);
      slice.setAttribute("stroke-dasharray", `0 ${circ}`);
      slice.setAttribute("stroke-dashoffset", -offset);
      svg.appendChild(slice);
      const targetDash = `${frac * circ} ${circ}`;
      requestAnimationFrame(() => slice.setAttribute("stroke-dasharray", targetDash));
      offset += frac * circ;
    }
    row.appendChild(svg);

    const legend = document.createElement("div");
    legend.className = "donut-legend";
    for (const s of STATUSES) {
      const c = counts[s.value] || 0;
      const item = document.createElement("div");
      item.className = "item";
      const sw = document.createElement("span");
      sw.className = "swatch"; sw.style.background = colorOf[s.value];
      const lbl = document.createElement("span");
      lbl.textContent = `${s.label} · ${c}`;
      const pct = document.createElement("span");
      pct.className = "pct";
      pct.textContent = total > 0 ? `${Math.round((c / total) * 100)}%` : "0%";
      item.append(sw, lbl, pct);
      legend.appendChild(item);
    }
    row.appendChild(legend);
    parent.appendChild(row);
  }
