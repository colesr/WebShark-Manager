  function download(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  function toIcsDateTime(iso, allDay) {
    const d = new Date(iso);
    const pad2 = (n) => String(n).padStart(2, "0");
    if (allDay) {
      return `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}`;
    }
    return `${d.getUTCFullYear()}${pad2(d.getUTCMonth()+1)}${pad2(d.getUTCDate())}T${pad2(d.getUTCHours())}${pad2(d.getUTCMinutes())}${pad2(d.getUTCSeconds())}Z`;
  }
  function generateIcsForEvents(events) {
    const lines = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//WebShark Manager//EN",
    ];
    const now = new Date();
    for (const ev of events) {
      const uid = ev.id || (Math.random().toString(36).slice(2));
      const dtstamp = toIcsDateTime(now.toISOString(), false);
      const dtstart = toIcsDateTime(ev.start, !!ev.allDay);
      const dtend = toIcsDateTime(ev.end, !!ev.allDay);
      lines.push("BEGIN:VEVENT");
      lines.push(`UID:${uid}`);
      lines.push(`DTSTAMP:${dtstamp}`);
      if (ev.allDay) {
        lines.push(`DTSTART;VALUE=DATE:${dtstart}`);
        lines.push(`DTEND;VALUE=DATE:${dtend}`);
      } else {
        lines.push(`DTSTART:${dtstart}`);
        lines.push(`DTEND:${dtend}`);
      }
      lines.push(`SUMMARY:${(ev.title || '').replace(/\n/g, ' ' )}`);
      if (ev.notes) lines.push(`DESCRIPTION:${(ev.notes || '').replace(/\n/g, ' ')}`);
      lines.push("END:VEVENT");
    }
    lines.push("END:VCALENDAR");
    return lines.join("\r\n");
  }
  function googleEventEditUrl(ev) {
    const start = toIcsDateTime(ev.start, !!ev.allDay);
    const end = toIcsDateTime(ev.end, !!ev.allDay);
    const params = new URLSearchParams();
    params.set('text', ev.title || 'Event');
    params.set('dates', `${start}/${end}`);
    if (ev.notes) params.set('details', ev.notes);
    return `https://calendar.google.com/calendar/u/0/r/eventedit?${params.toString()}`;
  }
  function scheduleExportIcsForView(cursor, view) {
    let from = startOfDay(cursor).getTime();
    let to = from + MS_DAY;
    if (view === 'week') {
      const days = scheduleWeekDays(cursor);
      from = startOfDay(days[0]).getTime();
      to = startOfDay(days[days.length-1]).getTime() + MS_DAY;
    } else if (view === 'month') {
      const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
      const last = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0);
      from = startOfDay(first).getTime();
      to = startOfDay(last).getTime() + MS_DAY;
    }
    const evs = scheduleEventsInRange(from, to);
    const ics = generateIcsForEvents(evs);
    const stamp = dateStampForFile();
    download(new Blob([ics], { type: 'text/calendar' }), `webshark-schedule-${stamp}.ics`);
    logEvent('exportIcs', { view, from: new Date(from).toISOString(), to: new Date(to).toISOString(), count: evs.length });
    toast(`Exported ${evs.length} event(s) to .ics`);
  }

  // Improved ICS parser — unfolds folded lines, parses params (TZID, VALUE), supports RRULE expansion
  function parseIcs(text) {
    if (!text) return [];
    // unfold folded lines (lines that start with space or tab continue previous)
    const unfolded = text.replace(/\r?\n[ \t]/g, '');
    const rawLines = unfolded.split(/\r?\n/).map(l => l.trim());
    const events = [];
    let inEvent = false; let buf = [];
    for (const l of rawLines) {
      if (l === 'BEGIN:VEVENT') { inEvent = true; buf = []; continue; }
      if (l === 'END:VEVENT') { inEvent = false; events.push(buf.slice()); buf = []; continue; }
      if (inEvent) buf.push(l);
    }

    const vevents = events.map(lines => {
      const obj = { raw: lines, props: {} };
      for (const ln of lines) {
        const colonIdx = ln.indexOf(':');
        if (colonIdx === -1) continue;
        const left = ln.slice(0, colonIdx);
        const val = ln.slice(colonIdx + 1);
        const [keyPart, ...rest] = left.split(';');
        const key = keyPart.toUpperCase();
        const params = {};
        if (rest.length) {
          for (const p of rest) {
            const [pn, pv] = p.split('='); if (!pn) continue; params[pn.toUpperCase()] = pv || true;
          }
        }
        obj.props[key] = obj.props[key] || [];
        obj.props[key].push({ value: val, params });
      }
      return obj;
    });

    // expand VEVENTs into flat event objects (handle RRULE basic expansion)
    const out = [];
    for (const v of vevents) {
      const dtstarts = v.props['DTSTART'] || [];
      const dtends = v.props['DTEND'] || [];
      const summaries = v.props['SUMMARY'] || [];
      const descs = v.props['DESCRIPTION'] || [];
      const rrules = v.props['RRULE'] || [];

      const title = summaries[0] ? summaries[0].value : (descs[0] ? descs[0].value.split('\n')[0] : 'Event');
      const notes = descs[0] ? descs[0].value : '';

      // for each DTSTART (usually one), create a base event
      for (const dt of dtstarts) {
        const startRaw = dt.value;
        const startParams = dt.params || {};
        const endRaw = (dtends[0] && dtends[0].value) || null;
        const endParams = (dtends[0] && dtends[0].params) || {};
        const allDay = !!(startParams.VALUE === 'DATE' || /^\d{8}$/.test(startRaw));
        const base = {
          summary: title,
          description: notes,
          allDay,
          startRaw, startParams,
          endRaw, endParams,
        };

        if (rrules.length > 0) {
          // parse RRULE string (first one)
          const r = parseRRule(rrules[0].value);
          const instances = expandRecurrence(base, r, 365);
          for (const inst of instances) out.push(inst);
        } else {
          out.push({ summary: title, description: notes, allDay, start: convertIcsToIso(startRaw, allDay, startParams), end: convertIcsToIso(endRaw, allDay, endParams) });
        }
      }
    }
    return out;
  }

  function parseRRule(val) {
    // returns simple object of key->value (handles multiple tokens)
    const parts = (val || '').split(';'); const o = {};
    for (const p of parts) { const [k, v] = p.split('='); if (!k) continue; o[k.toUpperCase()] = v || true; }
    return o;
  }

  function expandRecurrence(base, rule, maxDays=365) {
    // base: { startRaw, startParams, endRaw, endParams, allDay, summary, description }
    // rule: parsed RRULE object (FREQ, INTERVAL, UNTIL, COUNT, BYDAY)
    const instances = [];
    try {
      const freq = (rule.FREQ || 'DAILY').toUpperCase();
      const interval = Number(rule.INTERVAL || 1);
      const count = rule.COUNT ? Number(rule.COUNT) : null;
      const until = rule.UNTIL ? convertIcsToIso(rule.UNTIL, false, {}) : null;
      const byday = rule.BYDAY ? rule.BYDAY.split(',') : null;

      let cur = new Date(convertIcsToIso(base.startRaw, base.allDay, base.startParams));
      const startMs = cur.getTime();
      const limitMs = startMs + (maxDays * MS_DAY);
      let produced = 0;

      while (true) {
        if (count && produced >= count) break;
        if (until && new Date(cur) > new Date(until)) break;
        if (cur.getTime() > limitMs) break;

        // if BYDAY present for weekly, include only matching weekdays
        if (byday && freq === 'WEEKLY') {
          // BYDAY tokens like MO,TU,... map to 1-7 (Mon-Sun)
          const dayNames = { MO:1, TU:2, WE:3, TH:4, FR:5, SA:6, SU:0 };
          const curDay = cur.getDay();
          if (byday.some(d => dayNames[d] === curDay)) {
            const ev = { summary: base.summary, description: base.description, allDay: base.allDay, start: convertIcsToIso(formatIcsDtFromDate(cur, base.startRaw), base.allDay, base.startParams), end: base.endRaw ? convertIcsToIso(formatIcsDtFromDate(cur, base.endRaw), base.allDay, base.endParams) : null };
            instances.push(ev); produced++;
          }
        } else {
          const ev = { summary: base.summary, description: base.description, allDay: base.allDay, start: convertIcsToIso(formatIcsDtFromDate(cur, base.startRaw), base.allDay, base.startParams), end: base.endRaw ? convertIcsToIso(formatIcsDtFromDate(cur, base.endRaw), base.allDay, base.endParams) : null };
          instances.push(ev); produced++;
        }

        // advance
        if (freq === 'DAILY') cur.setDate(cur.getDate() + interval);
        else if (freq === 'WEEKLY') cur.setDate(cur.getDate() + (7 * interval));
        else if (freq === 'MONTHLY') cur.setMonth(cur.getMonth() + interval);
        else cur.setDate(cur.getDate() + interval);
      }
    } catch (e) { console.error('expandRecurrence error', e); }
    return instances;
  }

  function formatIcsDtFromDate(dt, rawTemplate) {

    if (hasZ) return `${y}${mo}${d}T${hh}${mi}${ss}Z`;
    return `${y}${mo}${d}T${hh}${mi}${ss}`;
  }

  function parseIcsDate(token) {

  function convertIcsToIso(val, allDay, params) {
    // params can include TZID or VALUE

  function filterLogs(filters) {

      if (!l) return false;
      if (filters.action && l.action !== filters.action) return false;
      if (filters.q) {
        const q = filters.q.toLowerCase();
        if (!(String(l.action).toLowerCase().includes(q) || JSON.stringify(l.details || {}).toLowerCase().includes(q))) return false;
      }
      if (filters.from) {
        const fromMs = new Date(filters.from + 'T00:00:00').getTime();
        if (new Date(l.ts).getTime() < fromMs) return false;
      }
      if (filters.to) {
        const toMs = new Date(filters.to + 'T23:59:59').getTime();
        if (new Date(l.ts).getTime() > toMs) return false;
      }
      return true;
    });

      if (!l || !l.ts) continue;
      if (new Date(l.ts).getTime() < cutoff) moved.push(l); else keep.push(l);
    }

      const pfMs = totalForFilterInRange(e => allActIdsInPf.has(e.activityId), 0, Date.now() + MS_DAY);
      rows.push({
        level: 0, kind: "portfolio", name: pf.name,
        status: "", deadline: "",
        estimatedHours: "", actualHours: (pfMs / MS_HOUR).toFixed(2),
        notes: pf.notes || "", dependencies: depStr(pf.dependencies),
      });
      for (const pBlock of pfBlock.projects) {
        const p = pBlock.p;
        const actIds = new Set(activitiesOfProject(p.id).map(a => a.id));
        const actualMs = totalForFilterInRange(e => actIds.has(e.activityId), 0, Date.now() + MS_DAY);
        rows.push({
          level: 1, kind: "project", name: p.name,
          status: (STATUS_BY[p.status] || STATUS_BY.active).label,
          deadline: p.deadline ? isoToDateInput(p.deadline) : "",

          actualHours: (actualMs / MS_HOUR).toFixed(2),
          notes: p.description || "", dependencies: depStr(p.dependencies),
        });
        for (const a of pBlock.activities) {
          const actMs = totalForFilterInRange(e => e.activityId === a.id, 0, Date.now() + MS_DAY);
          rows.push({
            level: 2, kind: "task", name: a.name,
            status: "", deadline: "",
            estimatedHours: "", actualHours: (actMs / MS_HOUR).toFixed(2),

          });

      }

  function renderPlanTimeline(parent, projects) {
    const now = Date.now();
    const dates = projects.map(p => new Date(p.deadline).getTime());
    let minT = Math.min(now, ...dates);
    let maxT = Math.max(now, ...dates);
    const span = Math.max(MS_DAY, maxT - minT);
    const padding = span * 0.08;
    minT -= padding; maxT += padding;
    const range = maxT - minT;

    const sortedProjects = [...projects].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

    for (const p of sortedProjects) {
      const tlRow = document.createElement("div");
      tlRow.className = "timeline-row";

      const label = document.createElement("div");
      label.className = "timeline-label";
      label.textContent = p.name;
      label.title = p.name;
      label.addEventListener("click", () => navigate({ name: "project", id: p.id }));

      const barWrap = document.createElement("div");
      barWrap.className = "timeline-bar-wrap";

      const nowPct = ((now - minT) / range) * 100;
      if (nowPct >= 0 && nowPct <= 100) {
        const nowMark = document.createElement("div");
        nowMark.className = "timeline-now";
        nowMark.style.left = nowPct + "%";
        nowMark.title = "Today";
        barWrap.appendChild(nowMark);
      }

      const dlT = new Date(p.deadline).getTime();
      const dlPct = ((dlT - minT) / range) * 100;
      const d = daysUntil(p.deadline);
      const mark = document.createElement("div");
      mark.className = "timeline-marker " + (d < 0 ? "overdue" : d <= 3 ? "due-soon" : "normal");
      mark.style.left = dlPct + "%";
      mark.title = `${p.name} — ${fmtDateShort(p.deadline)}`;
      barWrap.appendChild(mark);

      tlRow.append(label, barWrap);
      parent.appendChild(tlRow);
    }

    const axis = document.createElement("div");
    axis.className = "timeline-axis";
    const spacer = document.createElement("div");
    const dates2 = document.createElement("div");
    dates2.className = "axis-dates";
    const left = document.createElement("span");
    left.textContent = new Date(minT).toLocaleDateString(undefined, { month: "short", day: "numeric" });
    const right = document.createElement("span");
    right.textContent = new Date(maxT).toLocaleDateString(undefined, { month: "short", day: "numeric" });
    dates2.append(left, right);
    axis.append(spacer, dates2);
    parent.appendChild(axis);
  }

  function exportPlanCsv() {
    const rows = flatPlanRows();
    if (rows.length === 0) { toast("Nothing to export"); return; }
    const headers = ["Level", "Kind", "Name", "Status", "Deadline", "Estimated Hours", "Actual Hours", "Notes", "Dependencies"];
    const lines = [headers];
    for (const r of rows) {
      const indent = "  ".repeat(r.level);
      lines.push([r.level, r.kind, indent + r.name, r.status, r.deadline, r.estimatedHours, r.actualHours, r.notes, r.dependencies]);
    }
    const text = lines.map(row => row.map(csvQuote).join(",")).join("\n");
    download(new Blob(["﻿" + text], { type: "text/csv;charset=utf-8" }), `timeplanner-plan-${dateStampForFile()}.csv`);
    toast(`Exported plan CSV (${rows.length} rows)`);
  }

  function exportPlanXls() {
    const rows = flatPlanRows();
    if (rows.length === 0) { toast("Nothing to export"); return; }
    const headers = ["Level", "Kind", "Name", "Status", "Deadline", "Estimated Hours", "Actual Hours", "Notes", "Dependencies"];
    const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
    const headRow = `<tr>${headers.map(h => `<th style="background:#f3f4f6;border:1px solid #ccc;padding:4px 8px;text-align:left">${esc(h)}</th>`).join("")}</tr>`;
    const bodyRows = rows.map(r => {
      const indent = "&nbsp;".repeat(r.level * 4);
      const cells = [String(r.level), r.kind, indent + esc(r.name), esc(r.status), esc(r.deadline), esc(r.estimatedHours), esc(r.actualHours), esc(r.notes), esc(r.dependencies)];
      return `<tr>${cells.map(c => `<td style="border:1px solid #ddd;padding:4px 8px;vertical-align:top">${c}</td>`).join("")}</tr>`;
    }).join("");
    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><title>TimePlanner Plan</title></head>
<body><table style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:13px">${headRow}${bodyRows}</table></body></html>`;
    download(new Blob(["﻿" + html], { type: "application/vnd.ms-excel;charset=utf-8" }), `timeplanner-plan-${dateStampForFile()}.xls`);
    toast(`Exported plan XLS (${rows.length} rows)`);
  }

  function toast(message, opts = {}) {
    let container = document.querySelector(".toasts");
    if (!container) {
      container = document.createElement("div");
      container.className = "toasts";
      document.body.appendChild(container);
    }
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = message;
    container.appendChild(t);
    const dur = opts.duration || 2200;
    setTimeout(() => {
      t.classList.add("out");
      setTimeout(() => t.remove(), 200);
    }, dur);
  }

  const CHAT_KEY = "timeplanner.chat.v1";

  function loadChatHistory() {
    try {
      const raw = localStorage.getItem(CHAT_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr.slice(-50) : [];
    } catch { return []; }
  }
  function saveChatHistory() {
    try { localStorage.setItem(CHAT_KEY, JSON.stringify(chatHistory.slice(-50))); } catch {}
  }

  function openChat() {
    const panel = ensureChatPanel();
    panel.classList.remove("closing");
    panel.style.display = "";
    chatOpen = true;
    const ai = document.getElementById("aiLink");
    if (ai) ai.classList.add("open");
    const body = document.getElementById("chatBody");
    if (body) body.scrollTop = body.scrollHeight;
    setTimeout(() => document.getElementById("chatInput")?.focus(), 60);

  function closeChat() {
    const panel = document.getElementById("chatPanel");
    if (!panel) { chatOpen = false; return; }
    panel.classList.add("closing");
    document.getElementById("typingIndicator")?.remove();
    setTimeout(() => {
      panel.style.display = "none";
      panel.classList.remove("closing");
    }, 180);
    chatOpen = false;
    const ai = document.getElementById("aiLink");
    if (ai) ai.classList.remove("open");
  }
  function toggleChat() { chatOpen ? closeChat() : openChat(); }

  function sendUserMessage(text) {
    if (!text) return;
    appendChatMessage("user", text, true);
    chatHistory.push({ role: "user", text, ts: Date.now() });
    saveChatHistory();
    showTyping();
    setTimeout(() => {
      hideTyping();
      const reply = guruRespond(text);
      appendChatMessage("guru", reply, true, { trigger: text });
      chatHistory.push({ role: "guru", text: reply, ts: Date.now(), trigger: text });
      saveChatHistory();
    }, 380 + Math.random() * 280);
  }

  function refineGuru(direction, triggerText, prevReply) {
    showTyping();
    setTimeout(() => {
      hideTyping();
      const reply = direction === "up"
        ? expandGuruResponse(triggerText, prevReply)
        : alternativeGuruResponse(triggerText, prevReply);
      appendChatMessage("guru", reply, true, { trigger: triggerText });
      chatHistory.push({ role: "guru", text: reply, ts: Date.now(), trigger: triggerText });
      saveChatHistory();
    }, 300 + Math.random() * 220);
  }

  function expandGuruResponse(q, prev) {
    const t = (q || "").toLowerCase();
    const lead = "More on this:\n\n";
    if (/focus|priorit|first|next/.test(t))       return lead + planningWisdom();
    if (/plan|week|schedule|allocate/.test(t))    return lead + estimationWisdom();
    if (/risk|behind|overload|stuck/.test(t))     return lead + deadlineWisdom();
    if (/how am i|doing|status|progress/.test(t)) return lead + findRisks();
    if (/overwhelm|stress|too much/.test(t))      return lead + suggestPriorities();
    if (/estimat|hours|how long/.test(t))         return lead + deadlineWisdom();
    if (/deadline|due/.test(t))                   return lead + estimationWisdom();
    if (/activit/.test(t))                        return lead + portfolioWisdom();
    if (/portfolio|group/.test(t))                return lead + activitiesWisdom();
    return lead + diagnose();
  }

  function alternativeGuruResponse(q, prev) {
    const t = (q || "").toLowerCase();
    const lead = "Another angle:\n\n";
    if (/focus|priorit|first|next/.test(t))       return lead + planWeek();
    if (/plan|week|schedule|allocate/.test(t))    return lead + suggestPriorities();
    if (/risk|behind|overload|stuck/.test(t))     return lead + overwhelmedAdvice();
    if (/how am i|doing|status|progress/.test(t)) return lead + findRisks();
    if (/overwhelm|stress|too much/.test(t))      return lead + diagnose();
    if (/estimat|hours|how long/.test(t))         return lead + planningWisdom();
    if (/deadline|due/.test(t))                   return lead + planningWisdom();
    if (/activit/.test(t))                        return lead + planningWisdom();
    if (/portfolio|group/.test(t))                return lead + planningWisdom();
    // generic fallback — rotate wisdom variants
    const variants = [planningWisdom(), estimationWisdom(), deadlineWisdom(), activitiesWisdom(), portfolioWisdom()];
    return lead + variants[Math.floor(Math.random() * variants.length)];
  }

  function appendChatMessage(role, text, animate, opts) {
    opts = opts || {};
    const body = document.getElementById("chatBody");
    if (!body) return;
    const row = document.createElement("div");
    row.className = "chat-msg " + role;
    if (!animate) row.style.animation = "none";
    if (role === "guru") {
      const av = document.createElement("span");
      av.className = "msg-avatar";
      av.innerHTML = guruAvatarSvg();
      row.appendChild(av);
    }
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = formatGuruMessage(text);
    if (role === "guru" && opts.trigger) {
      const ctrls = document.createElement("div");
      ctrls.className = "msg-refine";
      const up = document.createElement("button");
      up.type = "button"; up.className = "refine-btn";
      up.textContent = "▲"; up.title = "More on this";
      up.addEventListener("click", () => refineGuru("up", opts.trigger, text));
      const down = document.createElement("button");
      down.type = "button"; down.className = "refine-btn";
      down.textContent = "▼"; down.title = "Try a different angle";
      down.addEventListener("click", () => refineGuru("down", opts.trigger, text));
      ctrls.append(up, down);
      bubble.appendChild(ctrls);
    }
    row.appendChild(bubble);
    body.appendChild(row);
    body.scrollTop = body.scrollHeight;
  }
  function showTyping() {
    const body = document.getElementById("chatBody");
    if (!body) return;
    const row = document.createElement("div");
    row.className = "chat-msg guru";
    row.id = "typingIndicator";
    row.innerHTML = `<span class="msg-avatar">${guruAvatarSvg()}</span>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    body.appendChild(row);
    body.scrollTop = body.scrollHeight;
  }
  function hideTyping() { document.getElementById("typingIndicator")?.remove(); }

  function formatGuruMessage(text) {
    let h = escapeHtml(text);
    h = h.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    // bullet lines starting with "- " or "• "
    const lines = h.split("\n");
    let inList = false, out = [];
    for (const line of lines) {
      const m = line.match(/^\s*(?:[-•])\s+(.*)$/);
      if (m) {
        if (!inList) { out.push("<ul>"); inList = true; }
        out.push(`<li>${m[1]}</li>`);
      } else {
        if (inList) { out.push("</ul>"); inList = false; }
        out.push(line);
      }
    }
    if (inList) out.push("</ul>");
    h = out.join("\n").replace(/\n+/g, "<br>");
    h = h.replace(/<br><ul>/g, "<ul>").replace(/<\/ul><br>/g, "</ul>");
    return h;
  }

  // ----- guru engine ------------------------------------------------------

  function greetingMessage() {
    return [
      "Hi! I'm your planning guru. I read your portfolios, projects, and time entries to give specific, data-grounded advice.",
      "",
      "Try one of the chips below, or ask me things like:",
      "- What should I focus on?",
      "- Plan my week",
      "- How am I doing?",
      "- What's at risk?",
      "- How do I plan a new project?",
    ].join("\n");
  }

  function guruRespond(text) {
    const t = (text || "").toLowerCase().trim();
    if (!t) return "What would you like help with?";

    // greetings
    if (/^(hi|hey|hello|yo|sup|howdy)\b/.test(t) || /^good (morning|afternoon|evening)\b/.test(t)) {
      return greetingMessage();
    }
    if (/\b(thanks|thank you|ty|cool|nice|awesome|got it|sweet)\b/.test(t)) {
      return "Anytime. Let me know when you want to plan, prioritize, or review.";
    }
    if (/\b(help|menu|what can you|capabilities|commands)\b/.test(t)) {
      return greetingMessage();
    }

    // entity summary — "summarize X" / "overview of X" / "tell me about X"
    if (/\b(summ?ar(y|ise|ize)|overview|recap|tell me about|break ?down|what's in)\b/.test(t)) {
      const match = findEntityByText(t);
      if (match) return summarizeEntity(match.kind, match.id);
    }

    // search requests: "search for X" / "find X" etc.
    if (/\b(search for|search|find|lookup|show me)\b/.test(t)) {
      const q = t.replace(/^(search for|search|find|lookup|show me)\s*/, '').trim();
      if (!q) return "What would you like me to search for?";
      const results = searchAllContent(q, 12);
      if (!results || results.length === 0) return `No matches found for "${q}".`;
      const lines = results.map(r => `- ${r.kind}: ${r.title}${r.snippet ? ' — ' + (r.snippet.slice(0,120)) : ''}`);
      return `Search results for "${q}":\n\n` + lines.join('\n');
    }

    // intent routing — order matters: more specific keywords first
    if (/\b(at risk|risk|risks|behind|overcommit|overload|trouble|stuck|red flag|concern)\b/.test(t)) return findRisks();
    if (/\b(plan|allocate|schedule|distribute|week|weekly|days? a week|hours? a day)\b/.test(t)) {
      if (/\b(week|weekly|days? a week|hours? a day|allocate|distribute|schedule)\b/.test(t)) return planWeek();
      // "plan a project" / "how do i plan" → wisdom
      if (/\bproject\b/.test(t) || /\bhow (do|should) i plan\b/.test(t)) return planningWisdom();
      return planWeek();
    }
    if (/\b(focus|priorit|important|most important|first|where (to|should) (i )?start|what (should|do) i (do|work)|next)\b/.test(t)) {
      return suggestPriorities();
    }
    if (/\b(how am i|doing|review|summary|status|progress|recap|this week|last week)\b/.test(t)) {
      return diagnose();
    }
    if (/\boverwhelm|too much|stress|panic|burn(ed|t)? out\b/.test(t)) {
      return overwhelmedAdvice();
    }
    if (/\b(new project|start a project|create a project|add a project)\b/.test(t) || /\bhow (do|should) i (plan|set up)\b/.test(t)) {
      return planningWisdom();
    }
    if (/\b(estimat|how many hours|how long)\b/.test(t)) {
      return estimationWisdom();
    }
    if (/\b(deadline|due date)\b/.test(t)) {
      return deadlineWisdom();
    }
    if (/\b(activit(y|ies)|tasks?|track what)\b/.test(t)) {
      return activitiesWisdom();
    }
    if (/\b(portfolio|portfolios|group)\b/.test(t)) {
      return portfolioWisdom();
    }

    // fallback: give them their snapshot + nudge
    return diagnose() + "\n\nIf you want something more specific, try **\"what should I focus on?\"**, **\"plan my week\"**, or **\"what's at risk?\"**.";
  }

  // ----- guru analyses (data-grounded) -----

  function activeProjects() { return state.projects.filter(p => (p.status || "active") === "active"); }
  function projectActivityIds(p) { return new Set(activitiesOfProject(p.id).map(a => a.id)); }
  function projectTotalHours(p) {
    const ids = projectActivityIds(p);
    return totalForFilterInRange(e => ids.has(e.activityId), 0, Date.now() + MS_DAY) / MS_HOUR;
  }
  function projectHoursInRange(p, fromMs, toMs) {
    const ids = projectActivityIds(p);
    return totalForFilterInRange(e => ids.has(e.activityId), fromMs, toMs) / MS_HOUR;
  }

  function suggestPriorities() {
    const active = activeProjects();
    if (state.projects.length === 0) {
      return "You don't have any projects yet. Start by creating a **portfolio** (e.g. \"Work\" or \"Personal\"), then add a project inside it with a clear name, a deadline, and an estimated hours value. I'll give you real priority advice as soon as data is there.";
    }
    if (active.length === 0) {
      return "Nothing is marked **Active** right now. Open a project, click **Edit**, and set its status to Active for the things you actually want to work on this week. Then ask me again.";
    }

    const now = Date.now();
    const scored = active.map(p => {
      const totalH = projectTotalHours(p);
      const last7H = projectHoursInRange(p, now - 7 * MS_DAY, now + MS_DAY);
      let urgency = 0;
      const reasons = [];
      if (p.deadline) {
        const d = daysUntil(p.deadline);
        if (d < 0)        { urgency += 100; reasons.push(`overdue by ${Math.abs(d)}d`); }
        else if (d === 0) { urgency += 75;  reasons.push("due today"); }
        else if (d <= 3)  { urgency += 50;  reasons.push(`due in ${d}d`); }
        else if (d <= 7)  { urgency += 25;  reasons.push(`due in ${d}d`); }
      }
      if (p.estimatedHours != null && p.estimatedHours > 0) {
        const remaining = p.estimatedHours - totalH;
        if (remaining < 0) {
          urgency += 8;
          reasons.push(`already ${(-remaining).toFixed(1)}h over estimate`);
        } else if (p.deadline) {
          const d = Math.max(1, daysUntil(p.deadline) + 1);
          const pace = remaining / d;
          if (pace > 5)      { urgency += 35; reasons.push(`needs ~${pace.toFixed(1)}h/day to finish in time`); }
          else if (pace > 3) { urgency += 20; reasons.push(`~${pace.toFixed(1)}h/day pace required`); }
        }
      }
      if (last7H === 0) { urgency += 6; reasons.push("no time logged in 7 days"); }
      return { p, urgency, reasons, totalH, last7H };
    }).sort((a, b) => b.urgency - a.urgency);

    const top = scored.slice(0, 3);
    if (top.every(s => s.urgency === 0)) {
      return "Everything is on pace — no project is over its estimate, behind a deadline, or being neglected.\n\nPick whichever feels most energizing right now. Momentum matters more than perfect ordering once the fundamentals are healthy.";
    }
    const lines = ["Here's what I'd focus on, in order:", ""];
    top.forEach((s, i) => {
      const why = s.reasons.length ? ` — ${s.reasons.join("; ")}` : "";
      lines.push(`${i + 1}. **${s.p.name}**${why}`);
    });
    lines.push("");
    lines.push("Want me to draft a **week plan** that hits these?");
    return lines.join("\n");
  }

  function planWeek() {
    const active = activeProjects().filter(p => p.estimatedHours != null && p.estimatedHours > 0 && p.deadline);
    if (active.length === 0) {
      const missing = activeProjects().length === 0
        ? "set a project to **Active** first"
        : "give your active projects both an **estimated hours** value and a **deadline** (Edit on the project hero)";
      return `To draft a week plan I need projects with hours and dates to anchor against. Right now I can't — ${missing}.`;
    }

    const now = Date.now();
    const items = active.map(p => {
      const totalH = projectTotalHours(p);
      const remaining = Math.max(0, p.estimatedHours - totalH);
      const daysLeft = Math.max(1, daysUntil(p.deadline) + 1);
      const weekDaysToUse = Math.min(daysLeft, 7);
      const perDay = remaining / daysLeft;
      const weekTotal = perDay * weekDaysToUse;
      return { p, remaining, daysLeft, perDay, weekTotal };
    }).sort((a, b) => b.perDay - a.perDay);

    const sumPerDay = items.reduce((s, i) => s + i.perDay, 0);
    const sumWeek = items.reduce((s, i) => s + i.weekTotal, 0);

    const lines = ["Here's a target allocation based on your estimates and deadlines:", ""];
    items.forEach(i => {
      lines.push(`- **${i.p.name}** — ~${i.perDay.toFixed(1)}h/day (${i.remaining.toFixed(1)}h left over ${i.daysLeft}d)`);
    });
    lines.push("");
    lines.push(`**Daily total:** ~${sumPerDay.toFixed(1)}h · **This week:** ~${sumWeek.toFixed(1)}h`);
    if (sumPerDay > 6.5) {
      lines.push("");
      lines.push("That's a heavy daily load. Realistic options:");
      lines.push("- Push one deadline out by a few days");
      lines.push("- Move a lower-impact project to **On hold**");
      lines.push("- Trim scope on the project with the largest remaining hours");
    } else if (sumPerDay < 1) {
      lines.push("");
      lines.push("This is light — you have room to add a stretch goal or take a recovery week.");
    }
    return lines.join("\n");
  }

  function findRisks() {
    const active = activeProjects();
    if (active.length === 0) {
      return "Nothing is marked **Active**, so there's nothing at risk by definition. If something actually is at risk, set its status to Active so I can track it.";
    }
    const risks = [];
    const now = Date.now();
    for (const p of active) {
      const totalH = projectTotalHours(p);
      const last7H = projectHoursInRange(p, now - 7 * MS_DAY, now + MS_DAY);
      if (p.deadline) {
        const d = daysUntil(p.deadline);
        if (d < 0)        risks.push(`**${p.name}** — overdue by ${Math.abs(d)} day${Math.abs(d) === 1 ? "" : "s"}`);
        else if (d <= 3)  risks.push(`**${p.name}** — due in ${d === 0 ? "0 days (today)" : d + " day" + (d === 1 ? "" : "s")}`);
      }
      if (p.estimatedHours != null && p.estimatedHours > 0) {
        if (totalH > p.estimatedHours * 1.1) {
          risks.push(`**${p.name}** — ${totalH.toFixed(1)}h spent vs ${p.estimatedHours}h estimate (over by ${(totalH - p.estimatedHours).toFixed(1)}h)`);
        }
        if (p.deadline) {
          const remaining = p.estimatedHours - totalH;
          const d = Math.max(1, daysUntil(p.deadline) + 1);
          if (remaining > 0 && remaining / d > 5) {
            risks.push(`**${p.name}** — needs ${(remaining/d).toFixed(1)}h/day to finish on time`);
          }
        }
      }
      if (last7H === 0 && (p.deadline ? daysUntil(p.deadline) > 0 : true)) {
        risks.push(`**${p.name}** — no time logged in the last 7 days`);
      }
    }
    if (risks.length === 0) {
      return "Nothing is flashing red. All your active projects are within their estimates, ahead of their deadlines, and getting attention.\n\nGood place to be — keep going.";
    }
    // dedupe while preserving order
    const seen = new Set();
    const unique = risks.filter(r => seen.has(r) ? false : (seen.add(r), true));
    return ["Here's what I'd watch:", "", ...unique.map(r => `- ${r}`)].join("\n");
  }

  function diagnose() {
    if (state.entries.length === 0) {
      return state.projects.length === 0
        ? "No projects yet. Once you've created a portfolio + project and tracked a session, I can give you a real progress report."
        : "Projects exist but no time has been tracked yet. Start a timer on any task and come back — I'll have something to say.";
    }
    const now = Date.now();
    const last7Ms = totalForFilterInRange(() => true, now - 7 * MS_DAY, now);
    const prev7Ms = totalForFilterInRange(() => true, now - 14 * MS_DAY, now - 7 * MS_DAY);
    const dayKeys = new Set();
    for (const e of state.entries) {
      const t = new Date(e.start).getTime();
      if (t >= now - 7 * MS_DAY && t < now) dayKeys.add(startOfDay(new Date(e.start)).toDateString());
    }
    let trendText = "";
    if (prev7Ms > 0) {
      const delta = ((last7Ms - prev7Ms) / prev7Ms) * 100;
      if (delta >= 5)       trendText = ` — up ${Math.round(delta)}% from the week before`;
      else if (delta <= -5) trendText = ` — down ${Math.round(Math.abs(delta))}% from the week before`;
    } else if (last7Ms > 0) {
      trendText = " — first week of tracked time";
    }

    // top project last 7d
    const projMs = new Map();
    for (const e of state.entries) {
      const a = activityById(e.activityId);
      if (!a) continue;
      const ms = entryDurationClipped(e, now - 7 * MS_DAY, now);
      if (ms > 0) projMs.set(a.projectId, (projMs.get(a.projectId) || 0) + ms);
    }
    let topProj = null, topProjMs = 0;
    for (const [pid, ms] of projMs.entries()) {
      if (ms > topProjMs) { topProjMs = ms; topProj = projectById(pid); }
    }

    const statusCounts = { planning: 0, active: 0, "on-hold": 0, done: 0 };
    for (const p of state.projects) statusCounts[p.status || "active"]++;

    const lines = [];
    lines.push(`Over the last **7 days**: **${fmtHours(last7Ms)}** across **${dayKeys.size} active day${dayKeys.size === 1 ? "" : "s"}**${trendText}.`);
    if (topProj) {
      const pct = last7Ms > 0 ? Math.round((topProjMs / last7Ms) * 100) : 0;
      lines.push("");
      lines.push(`Biggest focus was **${topProj.name}** (${fmtHours(topProjMs)}, ${pct}% of the week).`);
    }
    const statusParts = STATUSES.map(s => `${statusCounts[s.value]} ${s.label}`).filter(p => !p.startsWith("0 ")).join(" · ");
    if (statusParts) {
      lines.push("");
      lines.push(`Pipeline: ${statusParts}.`);
    }
    return lines.join("\n");
  }

  // ----- guru entity summaries (scan everything inside, surface highlights) -----

  function guruSummarizeEntity(kind, id) {
    const ent = entityByKind(kind, id);
    if (!ent) return;
    const kindLabel = kind === "activity" ? "task" : kind;
    openChat();
    const ask = `Summarize the ${kindLabel} "${ent.name}"`;
    appendChatMessage("user", ask, true);
    chatHistory.push({ role: "user", text: ask, ts: Date.now() });
    saveChatHistory();
    showTyping();
    setTimeout(() => {
      hideTyping();
      const reply = summarizeEntity(kind, id);
      appendChatMessage("guru", reply, true);
      chatHistory.push({ role: "guru", text: reply, ts: Date.now() });
      saveChatHistory();
    }, 460 + Math.random() * 320);
  }

  function summarizeEntity(kind, id) {
    if (kind === "portfolio") return summarizePortfolio(id);
    if (kind === "project")   return summarizeProject(id);
    if (kind === "activity")  return summarizeTask(id);
    return "I couldn't find that to summarize.";
  }

  // find the entity whose name appears in the user's text; prefer the longest match
  function findEntityByText(t) {
    const candidates = [];
    for (const p of state.portfolios) candidates.push({ kind: "portfolio", id: p.id, name: (p.name || "").toLowerCase() });
    for (const p of state.projects)   candidates.push({ kind: "project", id: p.id, name: (p.name || "").toLowerCase() });
    for (const a of state.activities) candidates.push({ kind: "activity", id: a.id, name: (a.name || "").toLowerCase() });
    let best = null;
    for (const c of candidates) {
      if (c.name.length >= 2 && t.includes(c.name)) {
        if (!best || c.name.length > best.name.length) best = c;
      }
    }
    return best;
  }

  // search across portfolios, projects, activities, events, entries, and logs
  function searchAllContent(q, max = 12) {
    q = (q || '').toLowerCase().trim();
    if (!q) return [];
    const out = [];
    for (const p of state.portfolios) {
      if (p.name.toLowerCase().includes(q) || (p.notes || '').toLowerCase().includes(q)) out.push({ kind: 'portfolio', id: p.id, title: p.name, snippet: p.notes || '' });
    }
    for (const p of state.projects) {
      if (p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q)) out.push({ kind: 'project', id: p.id, title: p.name, snippet: p.description || '' });
    }
    for (const a of state.activities) {
      if (a.name.toLowerCase().includes(q) || (a.notes || '').toLowerCase().includes(q)) out.push({ kind: 'activity', id: a.id, title: a.name, snippet: a.notes || '' });
    }
    for (const ev of state.events || []) {
      if ((ev.title||'').toLowerCase().includes(q) || (ev.notes||'').toLowerCase().includes(q)) out.push({ kind: 'event', id: ev.id, title: ev.title, snippet: ev.notes || '' });
    }
    for (const e of state.entries || []) {
      const tags = (e.tags || []).join(' ');
      if ((e.notes||'').toLowerCase().includes(q) || tags.toLowerCase().includes(q)) out.push({ kind: 'entry', id: e.id, title: `Entry ${e.id}`, snippet: e.notes || '' });
    }
    // logs
    for (const l of state.appLogs || []) {
      if ((l.action||'').toLowerCase().includes(q) || JSON.stringify(l.details || {}).toLowerCase().includes(q)) out.push({ kind: 'log', id: l.ts, title: l.action, snippet: JSON.stringify(l.details || {}) });
    }
    return out.slice(0, max);
  }

  function lastLoggedLabel(entries) {
    if (!entries.length) return null;
    let latest = 0;
    for (const e of entries) {
      const t = new Date(e.end || e.start).getTime();
      if (t > latest) latest = t;
    }
    const days = Math.floor((startOfDay(new Date()).getTime() - startOfDay(new Date(latest)).getTime()) / MS_DAY);
    if (days <= 0) return "today";
    if (days === 1) return "yesterday";
    if (days < 7) return `${days} days ago`;
    return fmtDateShort(new Date(latest).toISOString());
  }

  function deadlineLabel(deadline) {
    if (!deadline) return null;
    const d = daysUntil(deadline);
    if (d < 0)  return `overdue by ${Math.abs(d)} day${Math.abs(d) === 1 ? "" : "s"} (was ${fmtDateShort(deadline)})`;
    if (d === 0) return "due today";
    if (d === 1) return "due tomorrow";
    return `due in ${d} days (${fmtDateShort(deadline)})`;
  }

  function summarizePortfolio(id) {
    const pf = portfolioById(id);
    if (!pf) return "That portfolio no longer exists.";
    const projs = projectsOfPortfolio(id);
    const now = Date.now();
    const weekStart = startOfWeek(new Date()).getTime();
    const projIds = new Set(projs.map(p => p.id));
    const acts = state.activities.filter(a => projIds.has(a.projectId));
    const actIds = new Set(acts.map(a => a.id));
    const entries = state.entries.filter(e => actIds.has(e.activityId));
    const totalMs = totalForFilterInRange(e => actIds.has(e.activityId), 0, now + MS_DAY);
    const weekMs = totalForFilterInRange(e => actIds.has(e.activityId), weekStart, weekStart + 7 * MS_DAY);
    const doneTasks = acts.filter(a => a.done).length;
    const imgCount = (pf.images || []).length
      + projs.reduce((s, p) => s + (p.images || []).length, 0)
      + acts.reduce((s, a) => s + (a.images || []).length, 0);

    if (projs.length === 0) {
      return `**${pf.name}** is empty — no projects yet.\n\nAdd a project inside it with a clear name, a deadline, and an estimated hours value, and I'll be able to track and summarize progress here.`;
    }

    const statusCounts = { planning: 0, active: 0, "on-hold": 0, done: 0 };
    for (const p of projs) statusCounts[p.status || "active"]++;

    // top project by total time
    let topProj = null, topMs = 0;
    for (const p of projs) {
      const ids = new Set(activitiesOfProject(p.id).map(a => a.id));
      const ms = totalForFilterInRange(e => ids.has(e.activityId), 0, now + MS_DAY);
      if (ms > topMs) { topMs = ms; topProj = p; }
    }

    const lines = [];
    lines.push(`Here's the rundown on **${pf.name}**.`);
    lines.push("");
    lines.push("**The shape of it**");
    const statusParts = STATUSES.map(s => `${statusCounts[s.value]} ${s.label.toLowerCase()}`).filter(x => !x.startsWith("0 ")).join(", ");
    lines.push(`- ${projs.length} project${projs.length === 1 ? "" : "s"} (${statusParts || "no status set"}) · ${acts.length} task${acts.length === 1 ? "" : "s"}${doneTasks ? `, ${doneTasks} complete` : ""}`);
    lines.push(`- **${fmtHours(totalMs)}** logged all-time · **${fmtHours(weekMs)}** this week`);
    if (topProj && topMs > 0) {
      const pct = totalMs > 0 ? Math.round((topMs / totalMs) * 100) : 0;
      lines.push(`- Most of your time here went to **${topProj.name}** (${fmtHours(topMs)}, ${pct}%)`);
    }
    const last = lastLoggedLabel(entries);
    if (last) lines.push(`- Last tracked ${last}`);
    if (imgCount) lines.push(`- ${imgCount} photo${imgCount === 1 ? "" : "s"} attached across this portfolio`);
    if (pf.notes) lines.push(`- Notes on file: "${pf.notes.length > 80 ? pf.notes.slice(0, 78) + "…" : pf.notes}"`);

    // highlights — deadlines + risks
    const watch = [];
    for (const p of projs) {
      if ((p.status || "active") === "done") continue;
      const ids = new Set(activitiesOfProject(p.id).map(a => a.id));
      const tMs = totalForFilterInRange(e => ids.has(e.activityId), 0, now + MS_DAY);
      const tH = tMs / MS_HOUR;
      if (p.deadline) {
        const d = daysUntil(p.deadline);
        if (d < 0) watch.push(`**${p.name}** is ${deadlineLabel(p.deadline)}`);
        else if (d <= 3) watch.push(`**${p.name}** is ${deadlineLabel(p.deadline)}`);
      }
      if (p.estimatedHours != null && p.estimatedHours > 0 && tH > p.estimatedHours * 1.1) {
        watch.push(`**${p.name}** is over its estimate (${tH.toFixed(1)}h vs ${p.estimatedHours}h)`);
      }
    }
    if (watch.length) {
      lines.push("");
      lines.push("**Worth your attention**");
      const seen = new Set();
      for (const w of watch.filter(w => seen.has(w) ? false : (seen.add(w), true)).slice(0, 5)) lines.push(`- ${w}`);
    } else {
      lines.push("");
      lines.push("**Nothing's on fire** — no overdue deadlines or blown estimates in here right now.");
    }
    lines.push("");
    lines.push("Want me to **plan your week** around these or tell you **what to focus on**?");
    return lines.join("\n");
  }

  function summarizeProject(id) {
    const p = projectById(id);
    if (!p) return "That project no longer exists.";
    const pf = portfolioById(p.portfolioId);
    const acts = activitiesOfProject(p.id);
    const actIds = new Set(acts.map(a => a.id));
    const now = Date.now();
    const weekStart = startOfWeek(new Date()).getTime();
    const entries = state.entries.filter(e => actIds.has(e.activityId));
    const totalMs = totalForFilterInRange(e => actIds.has(e.activityId), 0, now + MS_DAY);
    const weekMs = totalForFilterInRange(e => actIds.has(e.activityId), weekStart, weekStart + 7 * MS_DAY);
    const totalH = totalMs / MS_HOUR;
    const doneTasks = acts.filter(a => a.done).length;
    const st = STATUS_BY[p.status] || STATUS_BY.active;
    const imgCount = (p.images || []).length + acts.reduce((s, a) => s + (a.images || []).length, 0);

    const lines = [];
    lines.push(`Here's where **${p.name}** stands${pf ? ` (in ${pf.name})` : ""}.`);
    lines.push("");
    lines.push("**Status**");
    lines.push(`- ${st.label}${p.deadline ? ` · ${deadlineLabel(p.deadline)}` : " · no deadline set"}`);
    if (p.estimatedHours != null && p.estimatedHours > 0) {
      const pct = Math.round((totalH / p.estimatedHours) * 100);
      const over = totalH > p.estimatedHours;
      lines.push(`- **${fmtHours(totalMs)} of ${p.estimatedHours}h** (${pct}%)${over ? ` — over by ${(totalH - p.estimatedHours).toFixed(1)}h` : ` — ${(p.estimatedHours - totalH).toFixed(1)}h left`}`);
    } else {
      lines.push(`- **${fmtHours(totalMs)}** logged all-time (no estimate set)`);
    }
    lines.push(`- **${fmtHours(weekMs)}** this week · ${entries.length} entr${entries.length === 1 ? "y" : "ies"} total`);

    lines.push("");
    if (acts.length === 0) {
      lines.push("**Tasks** — none yet. Break this project into 2–5 tasks so I can see where the time goes.");
    } else {
      lines.push(`**Tasks (${acts.length}${doneTasks ? `, ${doneTasks} complete` : ""})**`);
      const ranked = acts.map(a => ({
        a,
        ms: totalForFilterInRange(e => e.activityId === a.id, 0, now + MS_DAY),
      })).sort((x, y) => y.ms - x.ms).slice(0, 5);
      for (const r of ranked) {
        const mark = r.a.done ? "✓ " : "";
        lines.push(`- ${mark}**${r.a.name}** — ${fmtHours(r.ms)}`);
      }
    }

    const last = lastLoggedLabel(entries);
    const extra = [];
    if (last) extra.push(`last tracked ${last}`);
    if (imgCount) extra.push(`${imgCount} photo${imgCount === 1 ? "" : "s"} attached`);
    if (p.description) extra.push(`described as "${p.description.length > 70 ? p.description.slice(0, 68) + "…" : p.description}"`);
    if (extra.length) {
      lines.push("");
      lines.push("**Highlights:** " + extra.join(" · ") + ".");
    }

    // risk read
    const risks = [];
    if (p.status !== "done") {
      if (p.deadline && daysUntil(p.deadline) < 0) risks.push("the deadline has already passed");
      if (p.estimatedHours != null && p.estimatedHours > 0 && totalH > p.estimatedHours * 1.1) risks.push("you're over the hours estimate");
      if (p.deadline && p.estimatedHours != null && p.estimatedHours > 0) {
        const remaining = p.estimatedHours - totalH;
        const d = Math.max(1, daysUntil(p.deadline) + 1);
        if (remaining > 0 && remaining / d > 5) risks.push(`it needs ~${(remaining / d).toFixed(1)}h/day to land on time`);
      }
      if (entries.length === 0) risks.push("no time has been tracked yet");
    }
    lines.push("");
    if (risks.length) lines.push("**Watch out:** " + risks.join("; ") + ".");
    else lines.push(p.status === "done" ? "Marked **done** — nicely closed out." : "**Looking healthy** — on pace, within estimate, getting attention.");
    return lines.join("\n");
  }

  function summarizeTask(id) {
    const a = activityById(id);
    if (!a) return "That task no longer exists.";
    const proj = projectById(a.projectId);
    const pf = proj ? portfolioById(proj.portfolioId) : null;
    const now = Date.now();
    const weekStart = startOfWeek(new Date()).getTime();
    const entries = state.entries.filter(e => e.activityId === id);
    const totalMs = totalForFilterInRange(e => e.activityId === id, 0, now + MS_DAY);
    const weekMs = totalForFilterInRange(e => e.activityId === id, weekStart, weekStart + 7 * MS_DAY);
    const todayMs = totalForFilterOnDay(e => e.activityId === id, new Date());
    const imgCount = (a.images || []).length;

    const where = [proj && proj.name, pf && pf.name].filter(Boolean).join(" · ");
    const lines = [];
    lines.push(`Quick read on the task **${a.name}**${where ? ` (${where})` : ""}.`);
    lines.push("");
    lines.push(`- Status: ${a.done ? "**complete** ✓" : "in progress"}`);
    lines.push(`- **${fmtHours(totalMs)}** logged across **${entries.length} entr${entries.length === 1 ? "y" : "ies"}**`);
    if (weekMs > 0 || todayMs > 0) lines.push(`- ${fmtHours(weekMs)} this week${todayMs > 0 ? ` · ${fmtHours(todayMs)} today` : ""}`);
    const last = lastLoggedLabel(entries);
    if (last) lines.push(`- Last worked ${last}`);
    if (entries.length > 1) {
      const avg = totalMs / entries.length;
      lines.push(`- Sessions average ${fmtHours(avg)} each`);
    }
    if (imgCount) lines.push(`- ${imgCount} photo${imgCount === 1 ? "" : "s"} attached`);
    if (a.notes) lines.push(`- Notes: "${a.notes.length > 90 ? a.notes.slice(0, 88) + "…" : a.notes}"`);
    if (a.dependencies && a.dependencies.length) lines.push(`- Has ${a.dependencies.length} dependenc${a.dependencies.length === 1 ? "y" : "ies"}`);

    lines.push("");
    if (entries.length === 0 && !a.done) {
      lines.push("No time tracked yet — start the timer when you begin, and this fills out fast.");
    } else if (a.done) {
      lines.push("This one's wrapped up. Nice.");
    } else {
      lines.push("Steady progress. Keep the sessions going.");
    }
    return lines.join("\n");
  }

  // -------------------------------------------------------------------------

  // -------------------------------------------------------------------------
  const THEME_KEY = "timeplanner.theme";
  function sunIconSvg() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;
  }
  function moonIconSvg() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
  function resolveTheme(theme) {
    if (theme === "system") {
      return (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    return theme === "dark" ? "dark" : "light";
  }
  function applyTheme(theme) {
    const resolved = resolveTheme(theme);
    document.documentElement.setAttribute("data-theme", resolved);
    const btn = document.getElementById("themeToggle");
    if (btn) {
      btn.innerHTML = resolved === "dark" ? sunIconSvg() : moonIconSvg();
      btn.title = resolved === "dark" ? "Switch to light mode" : "Switch to dark mode";
    }
    // mirror a concrete value for the flash-free <head> IIFE; clear it for
    // "system" so the page keeps following the OS preference on reload
    try {
      if (theme === "system") localStorage.removeItem(THEME_KEY);
      else localStorage.setItem(THEME_KEY, resolved);
    } catch (e) {}
  }
  // header toggle flips light <-> dark and records the explicit choice
  function toggleTheme() {
    const resolved = document.documentElement.getAttribute("data-theme") || "light";
    const next = resolved === "dark" ? "light" : "dark";
    state.settings.theme = next;
    applyTheme(next);
    save();
  }
  const themeToggleBtn = document.getElementById("themeToggle");
  if (themeToggleBtn) themeToggleBtn.addEventListener("click", toggleTheme);

  // follow system changes only while the user's preference is "system"
  if (window.matchMedia) {
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const onChange = () => {
      if (!state.settings || state.settings.theme !== "system") return;
      applyTheme("system");
    };
    if (mq.addEventListener) mq.addEventListener("change", onChange);
    else if (mq.addListener) mq.addListener(onChange);
  }

  // -------------------------------------------------------------------------

  function applySettings(s) {
    s = s || (state && state.settings) || DEFAULT_SETTINGS;
    const root = document.documentElement;
    // accent — leave the default blue to CSS so dark mode keeps its lighter shade
    const choice = ACCENT_CHOICES.find(c => c.accent === s.accent);
    if (!choice || choice.accent === DEFAULT_SETTINGS.accent) {
      root.style.removeProperty("--accent");
      root.style.removeProperty("--accent-hover");
      root.style.removeProperty("--accent-soft");
    } else {
      root.style.setProperty("--accent", choice.accent);
      root.style.setProperty("--accent-hover", choice.hover);
      root.style.setProperty("--accent-soft", choice.soft);
    }
    root.setAttribute("data-density", s.density === "compact" ? "compact" : "comfortable");
    root.setAttribute("data-font", s.fontFamily || "system");
    root.setAttribute("data-scale", s.uiScale || "medium");
    root.setAttribute("data-motion", s.reduceMotion ? "reduced" : "full");
    root.setAttribute("data-pulse", s.activePulse === false ? "off" : "on");
    applyTheme(s.theme || "system");

  // simple color swatches picker for portfolio/project/activity color
  function colorSwatches(palette, current, onPick) {

    function renderSwatches(sel) {

  function syncRelAgo(iso) {
    if (!iso) return "";
    const ms = Date.now() - new Date(iso).getTime();
    if (isNaN(ms)) return "";
    if (ms < 0) return "just now";
    const min = Math.floor(ms / MS_MIN);
    if (min < 1) return "just now";
    if (min < 60) return `${min} min ago`;
    const hr = Math.floor(ms / MS_HOUR);
    if (hr < 24) return `${hr}h ago`;

    const nm = (x) => (x && typeof x.name === "string" && x.name.trim()) ? x.name.trim() : "(untitled)";

    for (const [id, c] of cMap) {

      else if (JSON.stringify(lMap.get(id)) !== JSON.stringify(c)) changed.push(nm(c));

  async function cloudPull() {
    if (!sb || !currentUser) return;
    cloudPulling = true;
    startLoading();
    try {
      const { data, error } = await sb.from("user_state")
        .select("state, updated_at").eq("user_id", currentUser.id).maybeSingle();
      if (error) throw error;
      if (data && data.state) {
        const localHasData = state.portfolios.length || state.projects.length || state.entries.length ||
          (state.events && state.events.length);
        const differs = !statesEquivalent(state, data.state);
        if (localHasData && differs) {
          const choice = await showSyncConflict(state, data.state, data.updated_at);
          if (choice === "dismiss") {
            setSyncStatus("", "Not synced — sync conflict unresolved");
            return;
          }
          if (choice === "local") {
            await sb.from("user_state").upsert({
              user_id: currentUser.id,
              state,
              updated_at: new Date().toISOString(),
            });
            setSyncStatus("synced", "Synced");
            toast("Pushed local data to the cloud");
            return;
          }
          // choice === "cloud" falls through to replace local with cloud
        }
        state = backfillState(data.state);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        try { localStorage.setItem(PREFS_KEY, JSON.stringify(state.settings)); } catch (e) {}
        applySettings(state.settings);
        render();
        setSyncStatus("synced", "Synced");
        toast("Loaded your saved data");
      } else {
        // first sign-in on this account — seed cloud with whatever's local
        await sb.from("user_state").upsert({
          user_id: currentUser.id,
          state,
          updated_at: new Date().toISOString(),
        });
        setSyncStatus("synced", "Synced");
        toast("Saved your data to the cloud");
      }
    } catch (err) {
      console.error("Cloud pull failed:", err);
      setSyncStatus("error", "Sync failed");
      toast("Couldn't load saved data");
    } finally {
      cloudPulling = false;
      stopLoading();
    }
  }

  async function signIn() {
    if (!sb) {
      alert("Cloud sync isn't configured.\n\nEdit index.html and set SUPABASE_URL and SUPABASE_ANON_KEY near the top of the script.");
      return;
    }
    startLoading();
    logEvent('signInAttempt', {});
    try {
      const { error } = await sb.auth.signInWithOAuth({
      provider: "github",
      // strip any hash (#/plan, #/p/<id>, …) — OAuth appends #access_token=… and a
      // pre-existing hash mangles the fragment so the session can't be parsed back.
      options: { redirectTo: window.location.origin + window.location.pathname },
      });
      if (error) { logEvent('signInError', { err: error.message }); alert("Sign-in failed: " + error.message); }
    } finally { stopLoading(); }
  }

  async function signOut() {
    if (!sb) return;
    if (!confirm("Sign out? Your data is saved in the cloud and will be restored when you sign back in.")) return;
    await sb.auth.signOut();
    logEvent('signOut', {});
  }

  // Clear the app back to empty when the session ends (explicit logout OR token
  // expiry). Data lives in the cloud, so this only wipes the local copy + view.
  function resetToSignedOut() {
    clearTimeout(cloudPushTimer);          // cancel any pending debounced push
    cloudPulling = false;
    // wipe data but keep current device appearance prefs so the UI doesn't flip
    state = { portfolios: [], projects: [], activities: [], entries: [],
              panelLayouts: {}, settings: state.settings };
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    view = { name: "home" };
    location.hash = "";                    // back to the empty/home route
    setSyncStatus("", "");
    render();
    renderAuthUI();
  }

  function renderAuthUI() {
    const btn = document.getElementById("authLink");
    if (!btn) return;
    if (currentUser) {
      const email = currentUser.email || "Signed in";
      btn.textContent = email.length > 20 ? email.slice(0, 18) + "…" : email;
      btn.title = "Account & settings";
      btn.classList.add("active");
    } else {
      btn.textContent = cloudEnabled ? "Sign in" : "Sign in (setup needed)";
      btn.title = "Account & settings";
      btn.classList.remove("active");
    }
    // clicking the name opens a small dropdown (Settings + sign in/out)
    btn.onclick = (e) => { e.stopPropagation(); toggleUserMenu(); };
  }

  if (sb) {
    sb.auth.getSession().then(({ data }) => {
      currentUser = data.session ? data.session.user : null;
      renderAuthUI();
      if (currentUser) cloudPull();
    });
    sb.auth.onAuthStateChange((_evt, session) => {
      const wasUser = currentUser;
      currentUser = session ? session.user : null;
      renderAuthUI();
      if (currentUser && !wasUser) cloudPull();
      else if (!currentUser && wasUser) resetToSignedOut();
    });
  }

  // -------------------------------------------------------------------------
  // initial paint
  // -------------------------------------------------------------------------
  applySettings(state.settings);
  // honor the user's default landing view on a cold open (no deep link)
  if (!location.hash || location.hash === "#" || location.hash === "#/") {
    const lv = state.settings.landingView;
    if (lv === "plan" || lv === "reports" || lv === "schedule") {
      location.hash = "#/" + lv;
      view = parseHash();
    }
  }
  render();
  renderAuthUI();
})();
</script>
</body>
</html>
