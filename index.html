<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WebShark Manager.AI</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --card-hover: #fcfcfd;
    --border: #ececec;
    --border-strong: #d4d4d4;
    --text: #1a1a1a;
    --muted: #6b7280;
    --subtle: #f3f4f6;
    --accent: #2563eb;
    --accent-soft: #eff6ff;
    --accent-hover: #1d4ed8;
    --danger: #b91c1c;
    --danger-soft: #fef2f2;
    --warn: #ca8a04;
    --ok: #16a34a;
    --planning: #9ca3af;
    --active: #16a34a;
    --hold: #ca8a04;
    --done: #6b7280;
    --radius: 8px;
    --radius-lg: 12px;
    --t-fast: 140ms;
    --t-base: 220ms;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.25rem 1.25rem 4rem;
  }

  /* header */
  header.app { margin-bottom: 1.25rem; }
  .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.4rem;
  }
  .brand {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    transition: opacity var(--t-fast) var(--ease);
  }
  .brand:hover { opacity: 0.65; }
  .header-right {
    display: flex; align-items: baseline; gap: 0.85rem;
  }
  .header-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.18rem 0.6rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    transition: color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  .header-link:hover { color: var(--text); background: var(--subtle); border-color: var(--border-strong); }
  .header-link:active { transform: scale(0.96); }
  .header-link.active {
    color: var(--accent);
    border-color: #dbeafe;
    background: var(--accent-soft);
  }
  .date {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .crumbs {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.35rem;
    color: var(--muted);
    font-size: 0.88rem;
    min-height: 1.5rem;
  }
  .crumbs a {
    color: var(--muted);
    text-decoration: none;
    border-radius: 4px;
    padding: 0.1rem 0.35rem;
    margin: 0 -0.35rem;
    transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
  }
  .crumbs a:hover { color: var(--text); background: var(--subtle); }
  .crumbs .sep { color: var(--border-strong); }
  .crumbs .current { color: var(--text); font-weight: 500; }

  /* running bar */
  .running-bar {
    margin-top: 0.75rem;
    background: var(--accent-soft);
    border: 1px solid #dbeafe;
    border-radius: var(--radius);
    padding: 0.55rem 0.75rem 0.55rem 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
    font-size: 0.9rem;
    animation: fadeUp var(--t-base) var(--ease);
  }
  .running-bar .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: pulseRing 1.6s ease-out infinite;
  }
  .running-bar .label { flex: 1; color: var(--text); }
  .running-bar .label .sub { color: var(--muted); }
  .running-bar .live {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: var(--accent);
  }
  .running-bar .stop-btn {
    background: #fff;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.85rem;
    transition: background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .running-bar .stop-btn:hover { background: #dbeafe; }
  .running-bar .stop-btn:active { transform: scale(0.97); }

  /* main view container */
  main { position: relative; }
  .view {
    animation: fadeUp var(--t-base) var(--ease);
  }
  /* directional slide based on navigation depth */
  .view.view-forward { animation: viewSlideR var(--t-base) var(--ease); }
  .view.view-back    { animation: viewSlideL var(--t-base) var(--ease); }
  .view.leaving { animation: fadeDown var(--t-fast) var(--ease) forwards; }
  /* staggered entrance for each top-level block within a view */
  .view > * { animation: sectionRise 400ms var(--ease) both; }
  .view > *:nth-child(1) { animation-delay: 30ms; }
  .view > *:nth-child(2) { animation-delay: 80ms; }
  .view > *:nth-child(3) { animation-delay: 130ms; }
  .view > *:nth-child(4) { animation-delay: 180ms; }
  .view > *:nth-child(5) { animation-delay: 230ms; }
  .view > *:nth-child(6) { animation-delay: 280ms; }
  .view > *:nth-child(n+7) { animation-delay: 320ms; }
  /* in-place refresh (e.g. after adding a task) — no entrance replay */
  .view.view-refresh { animation: none; }
  .view.view-refresh > * { animation: none; }

  /* sections */
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.15rem 0.9rem;
    margin-bottom: 1.1rem;
    transition: border-color var(--t-fast) var(--ease);
  }
  section h2 {
    margin: 0 0 0.85rem;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
    margin: 0 0 0.85rem;
  }
  .section-head h2 { margin: 0; }
  .section-head .head-meta {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .empty {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 0.4rem 0 0.6rem;
  }

  /* hero (portfolio / project header) */
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.25rem 1.1rem;
    margin-bottom: 1.1rem;
    animation: fadeUp var(--t-base) var(--ease);
  }
  /* plan view modes */
  .plan-view-compact .plan-notes, .plan-view-compact .plan-deps, .plan-view-compact .plan-meta { display: none; }
  .plan-view-moderate .plan-notes { display: none; }
  .plan-view-detail .plan-notes, .plan-view-detail .plan-deps, .plan-view-detail .plan-meta { display: block; }
  .hero-top {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    margin-bottom: 0.5rem;
  }
  .hero .dot-lg {
    width: 14px; height: 14px;
    border-radius: 50%;
    margin-top: 0.45rem;
    flex-shrink: 0;
  }
  .hero h1 {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    flex: 1;
    cursor: pointer;
    border-radius: 4px;
    padding: 0.05rem 0.3rem;
    margin-left: -0.3rem;
    transition: background var(--t-fast) var(--ease);
  }
  .hero h1:hover { background: var(--subtle); }
  .hero .hero-actions { display: flex; gap: 0.25rem; }
  .hero .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem 1rem;
    margin-top: 0.35rem;
    color: var(--muted);
    font-size: 0.88rem;
    align-items: center;
  }
  .hero .desc {
    margin-top: 0.7rem;
    color: var(--text);
    font-size: 0.92rem;
    white-space: pre-wrap;
    line-height: 1.55;
  }
  .hero .desc.empty-desc {
    color: var(--muted);
    font-style: italic;
    cursor: pointer;
  }
  .hero .progress-wrap {
    margin-top: 0.85rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
    font-variant-numeric: tabular-nums;
  }
  .progress {
    background: var(--subtle);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 0;
    transition: width 600ms var(--ease), background var(--t-base) var(--ease);
  }
  .progress.over > div { background: var(--warn); }

  /* status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.74rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1.3;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
  }
  .badge .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge.s-planning { color: #6b7280; }
  .badge.s-active   { color: var(--ok); border-color: #dcfce7; background: #f0fdf4; }
  .badge.s-hold     { color: var(--warn); border-color: #fef3c7; background: #fffbeb; }
  .badge.s-done     { color: #6b7280; background: var(--subtle); border-color: var(--border); }
  .due-soon { color: var(--warn); }
  .due-overdue { color: var(--danger); }

  /* generic cards (portfolios, projects) */
  .card-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 0.95rem;
    cursor: pointer;
    transition: transform var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease);
    animation: fadeUp var(--t-base) var(--ease) both;
    text-align: left;
    display: block;
    width: 100%;
    font: inherit;
    color: inherit;
  }
  .card:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    background: var(--card-hover);
  }
  .card:active { transform: translateY(0); }
  .card.new-row { animation: flashIn 1200ms var(--ease); }
  .card-top {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .card .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card .title {
    flex: 1;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .right {
    color: var(--muted);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  .card .sub {
    margin-top: 0.4rem;
    color: var(--muted);
    font-size: 0.83rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.85rem;
    align-items: center;
  }
  .card .mini-progress {
    margin-top: 0.55rem;
    height: 4px;
    background: var(--subtle);
    border-radius: 999px;
    overflow: hidden;
  }
  .card .mini-progress > div {
    height: 100%; width: 0;
    background: var(--accent);
    border-radius: 999px;
    transition: width 600ms var(--ease);
  }

  /* activities (project view) */
  .activity {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .activity:first-child { border-top: none; }
  .activity.new-row { animation: flashIn 1200ms var(--ease); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .activity .name {
    flex: 1; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer; border-radius: 4px;
    padding: 0.1rem 0.3rem; margin: 0 -0.3rem;
    transition: background var(--t-fast) var(--ease);
  }
  .activity .name:hover { background: var(--subtle); }
  .activity .today {
    font-variant-numeric: tabular-nums;
    color: var(--muted); font-size: 0.9rem;
    transition: color var(--t-fast) var(--ease);
  }
  .activity.running .today { color: var(--accent); font-weight: 500; }
  .activity.running .dot,
  .card.running .dot,
  .dot-lg.running {
    box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.5);
    animation: pulseRing 1.6s ease-out infinite;
  }
  /* the active-work pulse can be turned off in settings */
  :root[data-pulse="off"] .activity.running .dot,
  :root[data-pulse="off"] .card.running .dot,
  :root[data-pulse="off"] .dot-lg.running {
    animation: none;
    box-shadow: none;
  }
  .activity .actions { display: flex; gap: 0.35rem; align-items: center; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0.25rem 0.4rem;
    border-radius: 6px;
    font: inherit;
    font-size: 0.85rem;
    transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .icon-btn:hover { color: var(--text); background: var(--subtle); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn.danger:hover { color: var(--danger); background: var(--danger-soft); }

  .add-row {
    display: flex; gap: 0.5rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .add-row input { flex: 1; }

  input[type="text"], input[type="time"], input[type="date"], input[type="number"], textarea, select {
    font: inherit; color: var(--text); background: #fff;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.45rem 0.65rem; outline: none;
    transition: border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
  }
  textarea { width: 100%; resize: vertical; min-height: 70px; font-family: inherit; }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  button {
    font: inherit; cursor: pointer; border-radius: 6px;
    padding: 0.45rem 0.85rem;
    border: 1px solid var(--border); background: #fff; color: var(--text);
    transition: background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  button:hover { background: var(--subtle); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.stop {
    background: #fff; color: var(--accent); border-color: var(--accent);
  }
  button.stop:hover { background: var(--accent-soft); }
  button.subtle {
    background: none; border: 1px dashed var(--border);
    color: var(--muted); width: 100%; margin-top: 0.5rem;
  }
  button.subtle:hover { color: var(--text); border-color: var(--muted); background: var(--subtle); }

  /* entries */
  .entry {
    display: grid;
    grid-template-columns: 12px 1fr auto auto;
    gap: 0.75rem; align-items: center;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    font-size: 0.92rem;
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .entry:first-child { border-top: none; }
  .entry.new-row { animation: flashIn 1200ms var(--ease); }
  .entry .meta { color: var(--muted); font-variant-numeric: tabular-nums; }
  .entry .dur { font-variant-numeric: tabular-nums; font-weight: 500; }
  .entry .name { font-weight: 500; }
  .entry .tags {
    margin-top: 0.15rem;
    display: flex; flex-wrap: wrap; gap: 0.3rem;
  }
  .tag-chip {
    font-size: 0.72rem;
    padding: 0.05rem 0.45rem;
    border-radius: 999px;
    background: var(--subtle);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .entry-edit {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 0.5rem; align-items: center;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-fast) var(--ease);
  }
  .entry-edit:first-child { border-top: none; }
  .entry-edit .row-actions { display: flex; gap: 0.35rem; }
  .entry-edit .tags-input {
    grid-column: 1 / -1;
  }
  .err {
    color: var(--danger);
    font-size: 0.82rem;
    padding: 0.35rem 0 0;
    animation: fadeUp var(--t-fast) var(--ease);
  }

  /* week chart */
  .week-row {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 0.75rem; align-items: center;
    padding: 0.7rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .week-row:first-child { border-top: none; }
  .week-row .name { font-weight: 500; }
  .week-row .bars {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px; align-items: end;
    height: 44px;
    margin-top: 4px;
  }
  .week-row .bar-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    height: 100%;
  }
  .week-row .bar {
    width: 100%;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-height: 0;
    opacity: 0.85;
    transition: height 600ms var(--ease);
  }
  .week-row .bar.zero { background: var(--border); height: 2px !important; opacity: 1; }
  .week-row .total {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: var(--text);
    align-self: start;
    padding-top: 2px;
  }
  .week-grid {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 0.75rem; align-items: end;
    padding: 0.25rem 0 0.5rem;
  }
  .week-grid .axis {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
  }
  .week-grid .axis .today-cell {
    color: var(--text); font-weight: 600;
  }
  .week-grid .week-label {
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* project meta edit form */
  .meta-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.65rem 0.75rem;
    margin-top: 0.6rem;
    animation: fadeUp var(--t-fast) var(--ease);
  }
  .meta-form label {
    display: flex; flex-direction: column; gap: 0.2rem;
    font-size: 0.78rem; color: var(--muted);
  }
  .meta-form .full { grid-column: 1 / -1; }
  .meta-form .meta-field { display: flex; flex-direction: column; gap: 0.2rem; }
  .meta-form .meta-cap { font-size: 0.78rem; color: var(--muted); }
  .meta-form .row-actions {
    grid-column: 1 / -1;
    display: flex; gap: 0.4rem;
    margin-top: 0.2rem;
  }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes fadeDown {
    from { opacity: 1; transform: none; }
    to   { opacity: 0; transform: translateY(-4px); }
  }
  @keyframes sectionRise {
    from { opacity: 0; transform: translateY(9px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes viewSlideR {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes viewSlideL {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
  }
  @keyframes flashIn {
    0%   { background-color: rgba(37, 99, 235, 0.10); }
    100% { background-color: transparent; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* reports — stat cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.55rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem 0.85rem;
    animation: fadeUp var(--t-base) var(--ease) both;
    transition: transform var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }
  .stat-card:hover { transform: translateY(-1px); border-color: var(--border-strong); }
  .stat-card .label {
    font-size: 0.66rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .stat-card .value {
    font-size: 1.35rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    margin-top: 0.15rem;
    letter-spacing: -0.01em;
  }
  .stat-card .sub {
    font-size: 0.74rem;
    color: var(--muted);
    margin-top: 0.05rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* reports — horizontal bars */
  .hbar-list { display: flex; flex-direction: column; gap: 0.55rem; }
  .hbar {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    gap: 0.65rem;
    align-items: center;
    animation: fadeUp var(--t-base) var(--ease) both;
    border-radius: 6px;
    padding: 0.15rem;
    margin: -0.15rem;
    transition: background var(--t-fast) var(--ease);
  }
  .hbar:hover { background: var(--subtle); }
  .hbar .label {
    font-size: 0.88rem;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hbar .bar-wrap {
    height: 6px;
    background: var(--subtle);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 0.3rem;
  }
  .hbar .bar {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 0;
    transition: width 600ms var(--ease);
  }
  .hbar .value {
    font-size: 0.82rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* reports — donut */
  .donut-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1.1rem;
    align-items: center;
  }
  .donut {
    width: 92px; height: 92px;
    transform: rotate(-90deg);
  }
  .donut circle.track {
    fill: none;
    stroke: var(--subtle);
    stroke-width: 14;
  }
  .donut circle.slice {
    fill: none;
    stroke-width: 14;
    stroke-linecap: butt;
    transition: stroke-dasharray 600ms var(--ease);
  }
  .donut-legend {
    display: grid;
    gap: 0.32rem;
  }
  .donut-legend .item {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    gap: 0.5rem;
    font-size: 0.86rem;
    align-items: center;
  }
  .donut-legend .swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
  }
  .donut-legend .pct {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 0.8rem;
  }

  /* reports — daily chart */
  .daily-chart {
    display: grid;
    grid-template-columns: repeat(var(--cols, 30), 1fr);
    gap: 3px;
    align-items: end;
    height: 84px;
    margin-top: 0.3rem;
  }
  .daily-chart .bar {
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    min-height: 0;
    opacity: 0.88;
    transition: height 600ms var(--ease), opacity var(--t-fast) var(--ease);
    height: 0;
  }
  .daily-chart .bar:hover { opacity: 1; }
  .daily-chart .bar.zero {
    background: var(--border);
    height: 2px;
    opacity: 1;
  }
  .daily-chart .bar.today-bar {
    box-shadow: 0 -2px 0 0 var(--accent) inset;
  }
  .daily-axis {
    display: flex; justify-content: space-between;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* reports — range chips */
  .range-row {
    display: flex; flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.7rem;
  }
  .chip-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.25rem 0.75rem;
    font: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--muted);
    transition: color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  .chip-btn:hover { color: var(--text); background: var(--subtle); }
  .chip-btn:active { transform: scale(0.96); }
  .chip-btn.active {
    color: var(--accent);
    border-color: #dbeafe;
    background: var(--accent-soft);
    font-weight: 500;
  }

  /* reports — filter row */
  .filter-row {
    display: flex; align-items: center;
    gap: 0.5rem;
    margin-top: 0.65rem;
    flex-wrap: wrap;
  }
  .filter-row .lbl {
    font-size: 0.82rem;
    color: var(--muted);
  }

  /* reports — export buttons */
  .export-row {
    display: flex; flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.2rem;
  }
  .file-btn {
    display: inline-flex;
    align-items: center;
    font: inherit;
    cursor: pointer;
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.45rem 0.85rem;
    transition: background var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease);
  }
  .file-btn:hover { background: var(--subtle); }
  .file-btn:active { transform: scale(0.97); }

  /* tag cloud */
  .cloud {
    display: flex; flex-wrap: wrap;
    gap: 0.35rem;
  }
  .cloud .chip {
    font-size: 0.8rem;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    background: var(--subtle);
    border: 1px solid var(--border);
    color: var(--text);
    font-variant-numeric: tabular-nums;
    animation: fadeUp var(--t-base) var(--ease) both;
  }

  /* toasts */
  .toasts {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    display: flex;
    flex-direction: column-reverse;
    gap: 0.45rem;
    z-index: 300;
    pointer-events: none;
    max-width: calc(100% - 2rem);
  }
  .toast {
    pointer-events: auto;
    background: #1f2937;
    color: #fff;
    padding: 0.55rem 0.85rem;
    border-radius: 8px;
    font-size: 0.86rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    animation: toastIn 220ms var(--ease);
    max-width: 320px;
  }
  .toast.out { animation: toastOut 180ms var(--ease) forwards; }
  @keyframes toastIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes toastOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(6px); } }

  /* AI button */
  .ai-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.18rem 0.7rem 0.18rem 0.55rem;
    font: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  .ai-link:hover { background: var(--subtle); border-color: var(--border-strong); }
  .ai-link:active { transform: scale(0.96); }
  .ai-link.open {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: #dbeafe;
  }
  .ai-link .ai-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: aiPulseRing 2.4s ease-out infinite;
    flex-shrink: 0;
  }
  @keyframes aiPulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45); }
    60%  { box-shadow: 0 0 0 5px rgba(37, 99, 235, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
  }

  /* chat panel */
  .chat-panel {
    position: fixed;
    right: 1rem;
    bottom: 1rem;
    width: 360px;
    max-width: calc(100vw - 1.5rem);
    height: 540px;
    max-height: calc(100vh - 2rem);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
    z-index: 200;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    overflow: hidden;
    animation: chatIn 240ms var(--ease);
  }
  .chat-panel.closing { animation: chatOut 180ms var(--ease) forwards; }
  @keyframes chatIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes chatOut {
    from { opacity: 1; transform: none; }
    to   { opacity: 0; transform: translateY(8px) scale(0.98); }
  }

  .chat-header {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.7rem 0.85rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .chat-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .chat-avatar svg { width: 22px; height: 22px; display: block; }
  .chat-title-block { flex: 1; min-width: 0; }
  .chat-title { font-weight: 600; font-size: 0.94rem; line-height: 1.2; }
  .chat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
  .chat-close {
    background: none; border: none;
    font-size: 1.4rem;
    line-height: 1;
    color: var(--muted);
    cursor: pointer;
    padding: 0.1rem 0.4rem;
    border-radius: 6px;
    transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .chat-close:hover { background: var(--subtle); color: var(--text); }
  .chat-close:active { transform: scale(0.92); }

  .chat-body {
    overflow-y: auto;
    padding: 0.85rem;
    display: flex; flex-direction: column;
    gap: 0.55rem;
    background: var(--bg);
    scroll-behavior: smooth;
  }
  .chat-msg {
    display: flex;
    align-items: flex-end;
    gap: 0.45rem;
    animation: fadeUp var(--t-base) var(--ease);
  }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg .msg-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .chat-msg .msg-avatar svg { width: 14px; height: 14px; display: block; }
  .chat-msg .bubble {
    background: #fff;
    border: 1px solid var(--border);
    padding: 0.55rem 0.7rem;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    font-size: 0.88rem;
    line-height: 1.5;
    max-width: 78%;
    word-wrap: break-word;
  }
  .chat-msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 4px;
  }
  .chat-msg .bubble strong { font-weight: 600; }
  .chat-msg .bubble a {
    color: inherit;
    text-decoration: underline;
    text-decoration-color: rgba(37, 99, 235, 0.4);
    text-underline-offset: 2px;
  }
  .chat-msg .bubble ul { margin: 0.3rem 0 0; padding-left: 1.1rem; }
  .chat-msg .bubble li { margin: 0.1rem 0; }

  .typing {
    display: inline-flex; gap: 4px;
    align-items: center;
    padding: 0.05rem 0.1rem;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: typingDot 1.1s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes typingDot {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30%           { opacity: 1; transform: translateY(-2px); }
  }

  .chat-suggestions {
    display: flex; flex-wrap: wrap; gap: 0.3rem;
    padding: 0.5rem 0.85rem 0.1rem;
    background: var(--card);
    border-top: 1px solid var(--border);
  }
  .chat-suggestions .chip-btn {
    font-size: 0.78rem;
    padding: 0.2rem 0.6rem;
  }

  .chat-input {
    display: flex; gap: 0.4rem;
    padding: 0.65rem 0.85rem 0.85rem;
    background: var(--card);
  }
  .chat-input input { flex: 1; }
  .chat-input button { white-space: nowrap; }

  @media (max-width: 480px) {
    .chat-panel {
      width: calc(100vw - 1rem);
      right: 0.5rem;
      bottom: 0.5rem;
      height: min(540px, calc(100vh - 4rem));
    }
  }

  /* keyboard hint */
  .kbd {
    display: inline-block;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 4px;
    padding: 0 0.3rem;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    line-height: 1.4;
  }

  @media (max-width: 600px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .donut-row { grid-template-columns: 1fr; justify-items: center; }
  }
  @media (max-width: 480px) {
    .wrap { padding: 1.5rem 1rem 3rem; }
    .activity { flex-wrap: wrap; }
    .activity .actions { width: 100%; justify-content: flex-end; }
    .entry { grid-template-columns: 12px 1fr auto; }
    .entry .dur { grid-column: 2 / 3; }
    .entry-edit { grid-template-columns: 1fr 1fr; }
    .meta-form { grid-template-columns: 1fr; }
    .hero h1 { font-size: 1.2rem; }
    .brand-row { flex-direction: column; align-items: flex-start; gap: 0.35rem; }
    .header-right { align-items: center; }
  }

  /* brand mark — clock icon + wordmark with subtle accent */
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .brand-logo {
    width: 22px; height: 22px;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
  }
  .brand-logo svg { width: 100%; height: 100%; display: block; }
  .brand-logo .hand { stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; transform-origin: 12px 12px; transition: transform 300ms linear; }
  .loading .brand-logo .hand.minute { transform: rotate(35deg); animation: rotateMinute 1.6s linear infinite; }
  .loading .brand-logo .hand.hour { transform: rotate(10deg); animation: rotateHour 3.2s linear infinite; }
  @keyframes rotateMinute { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rotateHour { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .brand-logo svg { width: 100%; height: 100%; display: block; }
  .brand-text { display: inline-flex; align-items: baseline; }
  .brand-dot {
    display: none; /* removed tiny circular blinker per UX request */
  }
  /* apply the .AI styling to the main wordmark */
  .brand-wordmark { background: linear-gradient(120deg, var(--accent), #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 700; letter-spacing: -0.005em; cursor: pointer; display: inline-flex; align-items: baseline; }
  .brand-wordmark:hover { transform: translateY(-1px); transition: transform 160ms ease; }
  /* small shark-tooth accent next to the wordmark (refined) */
  .brand-tooth {
    width: 14px;
    height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 0.4rem;
    transform: translateY(-1px);
    flex-shrink: 0;
    color: var(--accent);
    transition: transform 160ms var(--ease), color 160ms var(--ease);
  }
  .brand-tooth svg { width: 100%; height: 100%; display: block; fill: currentColor; }
  .brand-tooth svg path { stroke: rgba(255,255,255,0.88); stroke-width: 0.8; stroke-linejoin: round; stroke-linecap: round; }
  .brand-wordmark:hover .brand-tooth { transform: translateY(-0.5px) scale(1.12) rotate(-8deg); color: var(--accent-hover); }
  @keyframes brandDotPulse {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 1; }
  }

  /* subtle scale on click for the wordmark */
  .brand-wordmark:active { transform: scale(0.98); }

  /* sync indicator — tiny status dot near the auth button */
  .sync-indicator {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: transparent;
    opacity: 0;
    margin-right: 0.15rem;
    align-self: center;
    transition: background var(--t-base) var(--ease), opacity 600ms var(--ease);
  }
  .sync-indicator.syncing {
    opacity: 1;
    background: var(--muted);
    animation: brandDotPulse 1.4s ease-in-out infinite;
  }
  .sync-indicator.synced {
    opacity: 1;
    background: var(--ok);
    animation: none;
  }
  .sync-indicator.error {
    opacity: 1;
    background: var(--danger);
    animation: none;
  }

  /* AI message refine controls (▲ more, ▼ alternate) */
  .msg-refine {
    display: flex;
    gap: 0.1rem;
    margin-top: 0.4rem;
    margin-left: -0.2rem;
  }
  .refine-btn {
    background: none;
    border: none;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
    font: inherit;
    line-height: 1;
    transition: color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  .refine-btn:hover { color: var(--accent); background: var(--accent-soft); }
  .refine-btn:active { transform: scale(0.9); }

  /* notes preview under activity name */
  .activity-center { flex: 1; min-width: 0; }
  .activity-center .activity-notes {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.05rem;
    padding: 0 0.3rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* theme toggle button */
  .theme-toggle {
    padding: 0.18rem 0.5rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .theme-toggle svg { display: block; width: 14px; height: 14px; }

  /* dark theme variables + overrides for surfaces with hardcoded white */
  :root[data-theme="dark"] {
    --bg: #0b0b0e;
    --card: #18181c;
    --card-hover: #1f1f24;
    --border: #2a2a31;
    --border-strong: #3a3a43;
    --text: #f1f1f3;
    --muted: #9ca3af;
    --subtle: #232329;
    --accent: #60a5fa;
    --accent-soft: rgba(96, 165, 250, 0.13);
    --accent-hover: #93c5fd;
    --danger: #f87171;
    --danger-soft: rgba(248, 113, 113, 0.12);
    --warn: #fbbf24;
    --ok: #4ade80;
    --planning: #9ca3af;
    --active: #4ade80;
    --hold: #fbbf24;
    --done: #9ca3af;
  }
  [data-theme="dark"] input[type="text"],
  [data-theme="dark"] input[type="time"],
  [data-theme="dark"] input[type="date"],
  [data-theme="dark"] input[type="number"],
  [data-theme="dark"] textarea,
  [data-theme="dark"] select,
  [data-theme="dark"] button,
  [data-theme="dark"] .header-link,
  [data-theme="dark"] .chip-btn,
  [data-theme="dark"] .file-btn,
  [data-theme="dark"] .ai-link,
  [data-theme="dark"] .running-bar .stop-btn,
  [data-theme="dark"] .chat-msg .bubble,
  [data-theme="dark"] .badge {
    background: var(--card);
    color: var(--text);
  }
  [data-theme="dark"] .badge { color: var(--muted); }
  [data-theme="dark"] .badge.s-active { background: rgba(74, 222, 128, 0.12); border-color: rgba(74, 222, 128, 0.25); color: var(--ok); }
  [data-theme="dark"] .badge.s-hold   { background: rgba(251, 191, 36, 0.12); border-color: rgba(251, 191, 36, 0.25); color: var(--warn); }
  [data-theme="dark"] .badge.s-done   { background: var(--subtle); border-color: var(--border); color: var(--muted); }
  [data-theme="dark"] button.primary       { background: var(--accent); color: #0b0b0e; border-color: var(--accent); }
  [data-theme="dark"] button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  [data-theme="dark"] .chat-msg.user .bubble { background: var(--accent); color: #0b0b0e; border-color: var(--accent); }
  [data-theme="dark"] .header-link.active,
  [data-theme="dark"] .chip-btn.active,
  [data-theme="dark"] .ai-link.open {
    color: var(--accent);
    background: var(--accent-soft);
    border-color: rgba(96, 165, 250, 0.32);
  }
  [data-theme="dark"] .running-bar { border-color: rgba(96, 165, 250, 0.3); }
  [data-theme="dark"] .brand-ai {
    background: linear-gradient(120deg, var(--accent), #c084fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  [data-theme="dark"] .toast { background: #2a2a31; }

  /* -------- user preference overrides (set via Settings → applySettings) -- */
  /* density */
  :root[data-density="compact"] { --radius: 6px; --radius-lg: 9px; }
  :root[data-density="compact"] .wrap { padding-top: 1.5rem; padding-bottom: 2.5rem; }
  :root[data-density="compact"] .card { padding: 0.6rem 0.75rem; }
  :root[data-density="compact"] .hero { margin-bottom: 1rem; }
  :root[data-density="compact"] .section { margin-bottom: 1.1rem; }
  /* font family */
  :root[data-font="serif"] body { font-family: Georgia, Cambria, "Times New Roman", serif; }
  :root[data-font="mono"] body  { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  /* ui scale — rem-based sizes scale with the root font-size */
  :root[data-scale="small"] { font-size: 15px; }
  :root[data-scale="large"] { font-size: 18px; }
  /* reduce motion — kill animations + transitions globally */
  :root[data-motion="reduced"] *,
  :root[data-motion="reduced"] *::before,
  :root[data-motion="reduced"] *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }

  /* -------- user menu dropdown -------- */
  .user-menu {
    position: absolute;
    z-index: 250;
    min-width: 168px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 12px 34px rgba(0,0,0,0.16);
    padding: 0.3rem;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    animation: menuIn 140ms var(--ease);
    transform-origin: top right;
  }
  .user-menu.closing { animation: menuOut 120ms var(--ease) forwards; }
  @keyframes menuIn  { from { opacity: 0; transform: translateY(-4px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes menuOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-4px) scale(0.98); } }
  .user-menu .menu-item {
    background: none;
    border: none;
    text-align: left;
    font: inherit;
    font-size: 0.9rem;
    color: var(--text);
    padding: 0.5rem 0.65rem;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.55rem;
    transition: background var(--t-fast) var(--ease);
  }
  .user-menu .menu-item:hover { background: var(--subtle); }
  .user-menu .menu-item.danger:hover { color: var(--danger); background: var(--danger-soft); }
  .user-menu .menu-email {
    font-size: 0.74rem;
    color: var(--muted);
    padding: 0.3rem 0.65rem 0.4rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  /* -------- settings modal -------- */
  .settings-overlay {
    position: fixed;
    inset: 0;
    z-index: 400;
    background: rgba(0,0,0,0.42);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 4vh 1rem;
    overflow-y: auto;
    animation: overlayIn 180ms var(--ease);
  }
  .settings-overlay.closing { animation: overlayOut 160ms var(--ease) forwards; }
  @keyframes overlayIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes overlayOut { from { opacity: 1; } to { opacity: 0; } }
  .settings-modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 24px 60px rgba(0,0,0,0.28);
    width: 100%;
    max-width: 520px;
    padding: 1.3rem 1.4rem 1.5rem;
    animation: modalIn 220ms var(--ease);
  }
  .settings-overlay.closing .settings-modal { animation: modalOut 160ms var(--ease) forwards; }
  @keyframes modalIn  { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes modalOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(8px) scale(0.98); } }
  .settings-modal .settings-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .settings-modal h2 { margin: 0; font-size: 1.15rem; }
  .settings-close {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.3rem; line-height: 1;
    padding: 0.2rem 0.4rem; border-radius: 6px;
  }
  .settings-close:hover { background: var(--subtle); color: var(--text); }
  .settings-group { margin-top: 1.15rem; }
  .settings-group > .group-title {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 600; margin-bottom: 0.6rem;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; padding: 0.4rem 0;
  }
  .settings-row .row-label { font-size: 0.92rem; }
  .settings-row .row-label small { display: block; color: var(--muted); font-size: 0.76rem; }
  /* segmented control */
  .seg {
    display: inline-flex; background: var(--subtle);
    border: 1px solid var(--border); border-radius: 8px; padding: 2px; gap: 2px;
    flex-wrap: wrap; justify-content: flex-end;
  }
  .seg button {
    background: none; border: none; cursor: pointer; font: inherit;
    font-size: 0.82rem; color: var(--muted);
    padding: 0.3rem 0.6rem; border-radius: 6px;
    transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease);
  }
  .seg button.active { background: var(--card); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  /* accent swatches */
  .accent-swatches { display: inline-flex; gap: 0.45rem; }
  .accent-swatch {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid transparent; cursor: pointer; padding: 0;
    outline: 1px solid var(--border); outline-offset: 1px;
    transition: transform var(--t-fast) var(--ease);
  }
  .accent-swatch:hover { transform: scale(1.12); }
  .accent-swatch.active { border-color: var(--text); outline-color: var(--text); }
  /* toggle switch */
  .switch { position: relative; width: 40px; height: 22px; flex: none; cursor: pointer; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .track {
    position: absolute; inset: 0; background: var(--border-strong);
    border-radius: 999px; transition: background var(--t-fast) var(--ease);
  }
  .switch .track::before {
    content: ""; position: absolute; left: 3px; top: 3px;
    width: 16px; height: 16px; background: #fff; border-radius: 50%;
    transition: transform var(--t-fast) var(--ease);
  }
  .switch input:checked + .track { background: var(--accent); }
  .switch input:checked + .track::before { transform: translateX(18px); }

  /* sync-conflict comparison modal (reuses .settings-overlay) */
  .sync-modal { max-width: 720px; }
  .sync-lead { color: var(--muted); font-size: 0.88rem; margin: 0.1rem 0 0.2rem; line-height: 1.45; }
  .sync-cols {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1.1rem;
  }
  @media (max-width: 560px) { .sync-cols { grid-template-columns: 1fr; } }
  .sync-card {
    border: 1px solid var(--border); border-radius: var(--radius-lg);
    background: var(--subtle); padding: 0.85rem 0.95rem;
    display: flex; flex-direction: column; gap: 0.55rem;
  }
  .sync-card.is-cloud { border-color: var(--accent); }
  .sync-card .sync-card-top {
    display: flex; align-items: center; gap: 0.5rem; justify-content: space-between;
  }
  .sync-card h3 {
    margin: 0; font-size: 0.95rem; display: flex; align-items: center; gap: 0.45rem;
  }
  .sync-card .sync-when { font-size: 0.74rem; color: var(--muted); }
  .sync-tag {
    font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 700; padding: 0.12rem 0.4rem; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
  }
  .sync-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem 0.8rem; }
  .sync-stat { display: flex; align-items: baseline; gap: 0.35rem; font-size: 0.84rem; }
  .sync-stat b { font-size: 1.02rem; font-variant-numeric: tabular-nums; }
  .sync-stat .delta { font-size: 0.74rem; font-weight: 700; }
  .delta.up { color: var(--success, #16a34a); }
  .delta.down { color: var(--danger, #dc2626); }
  .sync-diff { margin-top: 1.15rem; }
  .sync-diff > .group-title {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 600; margin-bottom: 0.55rem;
  }
  .sync-diff-row {
    padding: 0.5rem 0; border-top: 1px solid var(--border);
  }
  .sync-diff-row .sdr-head {
    display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
    font-size: 0.88rem; font-weight: 600;
  }
  .sync-diff-row .sdr-counts { display: inline-flex; gap: 0.5rem; font-size: 0.78rem; font-weight: 600; }
  .sdr-counts .c-add { color: var(--success, #16a34a); }
  .sdr-counts .c-rm  { color: var(--danger, #dc2626); }
  .sdr-counts .c-ch  { color: var(--accent); }
  .sdr-counts .c-none { color: var(--muted); font-weight: 500; }
  .sync-diff-names {
    margin: 0.4rem 0 0; padding: 0; list-style: none;
    display: flex; flex-direction: column; gap: 0.18rem;
  }
  .sync-diff-names li { font-size: 0.82rem; color: var(--text); display: flex; gap: 0.4rem; }
  .sync-diff-names li .mark { width: 1ch; flex: none; font-weight: 700; }
  .sync-diff-names li.add .mark { color: var(--success, #16a34a); }
  .sync-diff-names li.rm  .mark { color: var(--danger, #dc2626); }
  .sync-diff-names li.ch  .mark { color: var(--accent); }
  .sync-diff-names li.more { color: var(--muted); font-style: italic; }
  .sync-same { color: var(--muted); font-size: 0.86rem; margin-top: 0.9rem; }
  .sync-actions {
    display: flex; gap: 0.6rem; justify-content: flex-end; flex-wrap: wrap;
    margin-top: 1.4rem;
  }
  @media (max-width: 560px) { .sync-actions { flex-direction: column-reverse; } .sync-actions button { width: 100%; } }
  .sync-actions .btn-sub {
    font-size: 0.72rem; color: var(--muted); display: block; font-weight: 400; margin-top: 0.1rem;
  }

  /* dependency UI — chips for display, picker for editing */
  .dep-list { display: flex; flex-direction: column; gap: 0.3rem; }
  .dep-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--subtle);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.18rem 0.45rem;
    font-size: 0.82rem;
  }
  .dep-chip.dep-missing { opacity: 0.55; }
  .dep-kind {
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 500;
  }
  .dep-name { font-weight: 500; }
  .dep-rm {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 1rem; line-height: 1;
    padding: 0 0.2rem; border-radius: 4px;
    margin-left: 0.1rem;
  }
  .dep-rm:hover { color: var(--danger); background: var(--danger-soft); }
  .dep-empty {
    color: var(--muted);
    font-size: 0.82rem;
    font-style: italic;
  }
  .dep-adder {
    display: flex; gap: 0.4rem;
    margin-top: 0.4rem;
    align-items: center;
  }
  .dep-adder select { flex: 1; }
  .deps-display {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.55rem;
    align-items: center;
  }
  .deps-display .deps-label {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .deps-display .dep-chip {
    font-size: 0.78rem;
    cursor: default;
    transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }
  .deps-display .dep-chip.clickable { cursor: pointer; }
  .deps-display .dep-chip.clickable:hover { background: var(--card-hover); border-color: var(--border-strong); }
  .activity .deps-display {
    margin-top: 0.2rem;
    padding: 0 0.3rem;
  }
  .activity .deps-display .dep-chip { font-size: 0.7rem; padding: 0.05rem 0.35rem; }
  .activity .deps-display .deps-label { font-size: 0.72rem; }

  /* plan view */
  .plan-scope {
    display: flex; align-items: center;
    gap: 0.5rem;
    margin-top: 0.65rem;
    flex-wrap: wrap;
  }
  .plan-scope .lbl { font-size: 0.82rem; color: var(--muted); }
  .plan-row {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    gap: 0.65rem;
    align-items: start;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .plan-row:first-child { border-top: none; }
  .plan-row .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 0.4rem; }
  .plan-row.level-0 .plan-name { font-size: 1.02rem; font-weight: 600; }
  .plan-row.level-1 { padding-left: 1.25rem; }
  .plan-row.level-1 .plan-name { font-weight: 500; }
  .plan-row.level-2 { padding-left: 2.5rem; }
  .plan-row.level-2 .plan-name { font-weight: 400; color: var(--text); }
  .plan-center { min-width: 0; }
  .plan-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
    border-radius: 4px;
    padding: 0.05rem 0.3rem;
    margin-left: -0.3rem;
    display: inline-block;
    max-width: 100%;
    transition: background var(--t-fast) var(--ease);
  }
  .plan-name:hover { background: var(--subtle); }
  .plan-meta {
    margin-top: 0.2rem;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex; flex-wrap: wrap; gap: 0.3rem 0.7rem;
    align-items: center;
  }
  .plan-meta .meta-pill { font-variant-numeric: tabular-nums; }
  .plan-row .plan-hours {
    font-size: 0.85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    margin-top: 0.1rem;
  }
  .plan-notes {
    margin-top: 0.3rem;
    font-size: 0.84rem;
    color: var(--muted);
    white-space: pre-wrap;
    line-height: 1.45;
  }

  /* plan timeline (projects with deadlines) */
  .timeline-row {
    display: grid;
    grid-template-columns: 1fr 55%;
    gap: 0.75rem; align-items: center;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .timeline-row:first-child { border-top: none; }
  .timeline-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.9rem;
    cursor: pointer;
    border-radius: 4px;
    padding: 0.05rem 0.3rem;
    margin-left: -0.3rem;
    transition: background var(--t-fast) var(--ease);
  }
  .timeline-label:hover { background: var(--subtle); }
  .timeline-bar-wrap {
    position: relative;
    height: 18px;
    background: var(--subtle);
    border-radius: 4px;
    overflow: visible;
  }
  .timeline-now {
    position: absolute;
    top: -2px; bottom: -2px;
    width: 2px;
    background: var(--border-strong);
    z-index: 1;
  }
  .timeline-marker {
    position: absolute;
    top: -2px; bottom: -2px;
    width: 8px;
    border-radius: 2px;
    transform: translateX(-4px);
    z-index: 2;
  }
  .timeline-marker.overdue { background: var(--danger); }
  .timeline-marker.due-soon { background: var(--warn); }
  .timeline-marker.normal { background: var(--accent); }
  .timeline-axis {
    display: grid;
    grid-template-columns: 1fr 55%;
    gap: 0.75rem;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }
  .timeline-axis .axis-dates {
    display: flex; justify-content: space-between;
  }

  /* drag and drop — grip handles, panel controls, ghost/drag states */
  .drag-handle {
    cursor: grab;
    color: var(--muted);
    padding: 0.15rem 0.25rem;
    border-radius: 4px;
    user-select: none;
    display: inline-flex;
    align-items: center;
    line-height: 1;
    transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
    touch-action: none;
  }
  .drag-handle:hover { color: var(--text); background: var(--subtle); }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle svg { display: block; }

  .panel-header-controls {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 0.1rem;
  }
  .panel-min-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0.1rem 0.45rem;
    border-radius: 4px;
    transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
    font: inherit;
  }
  .panel-min-btn:hover { color: var(--text); background: var(--subtle); }

  /* minimized panels show only the header */
  .panel-minimized > *:not(.section-head):not(h2) {
    display: none !important;
  }
  .panel-minimized > .section-head { margin-bottom: 0; }
  .panel-minimized h2 { opacity: 0.65; }

  /* Sortable.js classes */
  .sortable-ghost {
    opacity: 0.35;
    background: var(--accent-soft) !important;
  }
  .sortable-chosen { cursor: grabbing; }
  .sortable-drag {
    opacity: 0.95;
    box-shadow: 0 14px 32px rgba(0, 0, 0, 0.18);
    cursor: grabbing;
  }

  /* drag handle placement inside cards & rows */
  .card .element-handle,
  .activity .element-handle {
    flex-shrink: 0;
  }
  .activity .element-handle { align-self: flex-start; margin-top: 0.2rem; }
  .card-top .element-handle { margin-right: 0.1rem; }

  /* task completion */
  .activity { position: relative; }
  .complete-btn {
    width: 30px; height: 30px;
    padding: 0;
    flex-shrink: 0;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--border-strong);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .complete-btn svg { width: 15px; height: 15px; opacity: 0.35; transition: opacity var(--t-fast) var(--ease); }
  .complete-btn:hover { border-color: var(--ok); color: var(--ok); }
  .complete-btn:hover svg { opacity: 0.95; }
  .complete-btn:active { transform: scale(0.88); }
  .complete-btn.is-done { background: var(--ok); border-color: var(--ok); color: #fff; }
  .complete-btn.is-done svg { opacity: 1; }
  .activity.done .activity-center,
  .activity.done .today { opacity: 0.5; }
  .activity.done .name {
    text-decoration: line-through;
    text-decoration-thickness: 1.5px;
    color: var(--muted);
  }
  .activity.done .dot { opacity: 0.4; }
  .activity.just-done { animation: doneFlash 700ms var(--ease); }
  @keyframes doneFlash {
    0%   { background-color: rgba(22,163,74,0); }
    30%  { background-color: rgba(22,163,74,0.14); }
    100% { background-color: rgba(22,163,74,0); }
  }
  .complete-burst {
    position: absolute;
    left: 50%; top: 50%;
    width: 46px; height: 46px;
    margin: -23px 0 0 -23px;
    color: var(--ok);
    pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
  }
  .complete-burst svg { width: 30px; height: 30px; animation: burstPop 700ms var(--ease) both; }
  .complete-burst::before {
    content: ""; position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid var(--ok);
    animation: burstRing 700ms var(--ease) both;
  }
  @keyframes burstPop {
    0%   { transform: scale(0.2); opacity: 0; }
    45%  { transform: scale(1.15); opacity: 1; }
    70%  { transform: scale(0.95); opacity: 1; }
    100% { transform: scale(1); opacity: 0; }
  }
  @keyframes burstRing {
    0%   { transform: scale(0.3); opacity: 0.8; }
    100% { transform: scale(1.9); opacity: 0; }
  }
  .celebrate-overlay {
    position: fixed; inset: 0;
    z-index: 1100;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .celebrate-check {
    position: relative;
    width: 104px; height: 104px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ok);
  }
  .celebrate-check svg { width: 66px; height: 66px; animation: burstPop 1000ms var(--ease) both; }
  .celebrate-check::before {
    content: ""; position: absolute; inset: 0;
    border-radius: 50%;
    border: 3px solid var(--ok);
    animation: burstRing 1000ms var(--ease) both;
  }

  /* task priority */
  .name-row { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
  .priority-badge {
    display: inline-flex; align-items: center; gap: 0.25rem;
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 0.08rem 0.4rem; border-radius: 999px;
  }
  .priority-badge .pri-flag { width: 6px; height: 6px; border-radius: 50%; }
  .p-low    { color: var(--muted);  background: rgba(100,116,139,0.16); }
  .p-low    .pri-flag { background: #64748b; }
  .p-medium { color: var(--warn);   background: rgba(202,138,4,0.16); }
  .p-medium .pri-flag { background: var(--warn); }
  .p-high   { color: var(--danger); background: rgba(185,28,28,0.15); }
  .p-high   .pri-flag { background: var(--danger); }

  /* expandable task rows */
  .is-toggle { cursor: pointer; }

<script>
  // Apply theme synchronously to avoid a flash of light theme on load
  (function () {
    try {
      var t = localStorage.getItem("timeplanner.theme");
      if (!t) {
        t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
  // Apply the rest of the visual preferences synchronously, so the static
  // header doesn't flash defaults before the main script runs applySettings().
  (function () {
    try {
      var p = JSON.parse(localStorage.getItem("timeplanner.prefs") || "{}");
      var root = document.documentElement;
      // accent swatches (default blue is left to CSS so dark mode keeps its lighter accent)
      var accents = {
        "#7c3aed": ["#7c3aed", "#6d28d9", "#f5f3ff"],
        "#0891b2": ["#0891b2", "#0e7490", "#ecfeff"],
        "#16a34a": ["#16a34a", "#15803d", "#f0fdf4"],
        "#ca8a04": ["#ca8a04", "#a16207", "#fefce8"],
        "#dc2626": ["#dc2626", "#b91c1c", "#fef2f2"]
      };
      var a = accents[p.accent];
      if (a) {
        root.style.setProperty("--accent", a[0]);
        root.style.setProperty("--accent-hover", a[1]);
        root.style.setProperty("--accent-soft", a[2]);
      }
      if (p.density === "compact") root.setAttribute("data-density", "compact");
      if (p.fontFamily && p.fontFamily !== "system") root.setAttribute("data-font", p.fontFamily);
      if (p.uiScale && p.uiScale !== "medium") root.setAttribute("data-scale", p.uiScale);
      if (p.reduceMotion) root.setAttribute("data-motion", "reduced");
      if (p.activePulse === false) root.setAttribute("data-pulse", "off");
    } catch (e) {}
  })();
</script>

  const STATUS_BY = Object.fromEntries(STATUSES.map(s => [s.value, s]));

  const PRIORITIES = [
    { value: "none",   label: "None",   cls: "p-none" },

    { value: "medium", label: "Medium", cls: "p-medium" },

  // -------------------------------------------------------------------------
  // user preferences (synced via state.settings; mirrored to localStorage for
  // flash-free startup — see the early IIFE in <head> and applySettings())
  // -------------------------------------------------------------------------
  const PREFS_KEY = "timeplanner.prefs";
  const DEFAULT_SETTINGS = {
    theme: "system",        // light | dark | system
    accent: "#2563eb",      // one of ACCENT_CHOICES
    density: "comfortable", // comfortable | compact
    fontFamily: "system",   // system | serif | mono
    uiScale: "medium",      // small | medium | large
    landingView: "home",    // home | plan | reports | schedule
    weekStart: "monday",    // monday | sunday
    timeFormat: "24h",      // 24h | 12h
    reduceMotion: false,
    activePulse: true,
  };
  // curated swatches so each accent ships with a matching hover/soft shade
  const ACCENT_CHOICES = [
    { name: "Blue",   accent: "#2563eb", hover: "#1d4ed8", soft: "#eff6ff" },
    { name: "Violet", accent: "#7c3aed", hover: "#6d28d9", soft: "#f5f3ff" },
    { name: "Cyan",   accent: "#0891b2", hover: "#0e7490", soft: "#ecfeff" },
    { name: "Green",  accent: "#16a34a", hover: "#15803d", soft: "#f0fdf4" },
    { name: "Amber",  accent: "#ca8a04", hover: "#a16207", soft: "#fefce8" },
    { name: "Red",    accent: "#dc2626", hover: "#b91c1c", soft: "#fef2f2" },
  ];

  const $ = (id) => document.getElementById(id);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  function freshState() {
    return { portfolios: [], projects: [], activities: [], entries: [], events: [], panelLayouts: {}, settings: { ...DEFAULT_SETTINGS }, appLogs: [] };
  }
  // Normalize a (possibly older) state blob so every entity has the fields the
  // current code expects. Mutates and returns `s`. Used by load() AND cloudPull()
  // so the two stay in lockstep — see CLAUDE.md "Persistence & migrations".
  function backfillState(s) {
    if (!s || typeof s !== "object") return freshState();
    for (const k of ["portfolios", "projects", "activities", "entries", "events"]) {
      if (!Array.isArray(s[k])) s[k] = [];
    }
    // schedule events (calendar module)
    for (const ev of s.events) {
      if (typeof ev.title !== "string") ev.title = "Event";
      if (typeof ev.start !== "string") ev.start = new Date().toISOString();
      if (typeof ev.end !== "string") ev.end = new Date(new Date(ev.start).getTime() + 3600000).toISOString();
      if (typeof ev.allDay !== "boolean") ev.allDay = false;
      if (typeof ev.notes !== "string") ev.notes = "";
      if (ev.color != null && typeof ev.color !== "string") ev.color = null;
      if (ev.ref != null) {
        if (!ev.ref || typeof ev.ref !== "object" || !ev.ref.kind || !ev.ref.id) ev.ref = null;
      } else {
        ev.ref = null;
      }
    }
    // backfill missing tags
    for (const e of s.entries) if (!Array.isArray(e.tags)) e.tags = [];
    // backfill missing notes on portfolios + activities
    for (const p of s.portfolios) if (typeof p.notes !== "string") p.notes = "";
    for (const a of s.activities) if (typeof a.notes !== "string") a.notes = "";
    // backfill dependencies arrays
    for (const p of s.portfolios) if (!Array.isArray(p.dependencies)) p.dependencies = [];
    for (const p of s.projects)   if (!Array.isArray(p.dependencies)) p.dependencies = [];
    for (const a of s.activities) if (!Array.isArray(a.dependencies)) a.dependencies = [];
    // backfill image galleries
    for (const p of s.portfolios) if (!Array.isArray(p.images)) p.images = [];
    for (const p of s.projects)   if (!Array.isArray(p.images)) p.images = [];
    for (const a of s.activities) if (!Array.isArray(a.images)) a.images = [];
    // backfill task completion flag
    for (const a of s.activities) if (typeof a.done !== "boolean") a.done = false;
    // backfill task priority
    for (const a of s.activities) if (!PRIORITY_BY[a.priority]) a.priority = "none";

    if (!s.panelLayouts || typeof s.panelLayouts !== "object") s.panelLayouts = {};

    if (!Array.isArray(s.appLogs)) s.appLogs = [];

  // Order-independent serialization (keys sorted recursively). Supabase stores

  // -------------------------------------------------------------------------
  // time helpers

  const MS_HOUR = 3600000, MS_MIN = 60000, MS_SEC = 1000, MS_DAY = 86400000;

  function fmtDuration(ms) {
    if (ms < 0) ms = 0;

    const m = Math.floor((ms % MS_HOUR) / MS_MIN);

  function fmtHours(ms) {

  function fmtClock(iso) {
    const d = new Date(iso);

      h = h % 12; if (h === 0) h = 12;

  }
  function isoToDateInput(iso) {

  }
  function fmtDateShort(iso) {

  }
  function daysUntil(iso) {

    const today = startOfDay(new Date()).getTime();
    return Math.round((target - today) / MS_DAY);
  }

  // -------------------------------------------------------------------------
  // domain queries
  // -------------------------------------------------------------------------
  function getRunning() { return state.entries.find(e => e.end === null) || null; }
  function activityById(id) { return state.activities.find(a => a.id === id); }
  function projectById(id)  { return state.projects.find(p => p.id === id); }
  function portfolioById(id){ return state.portfolios.find(p => p.id === id); }
  function projectsOfPortfolio(pid) { return state.projects.filter(p => p.portfolioId === pid); }
  function activitiesOfProject(pid) { return state.activities.filter(a => a.projectId === pid); }
  function projectOfActivity(aid) {
    const a = activityById(aid); return a ? projectById(a.projectId) : null;
  }
  // is this project/portfolio the one whose task is currently being timed?
  function isProjectRunning(pid) {
    const r = getRunning(); if (!r) return false;
    const a = activityById(r.activityId);
    return !!a && a.projectId === pid;
  }
  function isPortfolioRunning(pfid) {
    const r = getRunning(); if (!r) return false;
    const a = activityById(r.activityId); if (!a) return false;
    const p = projectById(a.projectId);
    return !!p && p.portfolioId === pfid;
  }

  function entriesInRange(filterFn, fromMs, toMs) {
    return state.entries.filter(e => {
      if (filterFn && !filterFn(e)) return false;
      const s = new Date(e.start).getTime();
      return s >= fromMs && s < toMs;
    }).sort((a, b) => new Date(a.start) - new Date(b.start));
  }
  function entriesOnDay(date, filterFn) {
    const dayStart = startOfDay(date).getTime();
    return entriesInRange(filterFn, dayStart, dayStart + MS_DAY);
  }
  function totalForFilterOnDay(filterFn, date) {
    const dayStart = startOfDay(date).getTime();
    const dayEnd = dayStart + MS_DAY;
    const now = Date.now();
    let total = 0;
    for (const e of state.entries) {
      if (filterFn && !filterFn(e)) continue;
      const s = new Date(e.start).getTime();
      const en = e.end ? new Date(e.end).getTime() : now;
      const cS = Math.max(s, dayStart);
      const cE = Math.min(en, dayEnd);
      if (cE > cS) total += cE - cS;
    }
    return total;
  }
  function totalForFilterInRange(filterFn, fromMs, toMs) {
    const now = Date.now();
    let total = 0;
    for (const e of state.entries) {
      if (filterFn && !filterFn(e)) continue;
      const s = new Date(e.start).getTime();
      const en = e.end ? new Date(e.end).getTime() : now;
      const cS = Math.max(s, fromMs);
      const cE = Math.min(en, toMs);
      if (cE > cS) total += cE - cS;
    }
    return total;
  }
  function isActivityInProject(activityId, projectId) {
    const a = activityById(activityId);
    return a && a.projectId === projectId;
  }
  function isActivityInPortfolio(activityId, portfolioId) {
    const a = activityById(activityId);
    if (!a) return false;
    const p = projectById(a.projectId);
    return p && p.portfolioId === portfolioId;
  }
  function overlapsWithRunning(entry, ignoreId) {
    const r = getRunning();
    if (!r || r.id === ignoreId) return false;
    const aS = new Date(entry.start).getTime();
    const aE = new Date(entry.end).getTime();
    const rS = new Date(r.start).getTime();
    return aE > rS && aS < Date.now();
  }

  // -------------------------------------------------------------------------
  // actions (CRUD)
  // -------------------------------------------------------------------------
  function pickColor(palette, used) {
    const u = new Set(used);
    return palette.find(c => !u.has(c)) || palette[used.length % palette.length];
  }
  function addPortfolio(name) {
    name = (name || "").trim();
    if (!name) return null;
    const color = pickColor(PORTFOLIO_PALETTE, state.portfolios.map(p => p.color));
    const id = uid();
    state.portfolios.push({ id, name, color, notes: "", dependencies: [], images: [] });
    highlight(id);
    logEvent('addPortfolio', { id, name, color });
    save();
    return id;
  }
  function renamePortfolio(id, name) {
    const p = portfolioById(id);
    if (!p) return;
    p.name = (name || "").trim() || p.name;
    save();
  }
  function updatePortfolio(id, patch) {
    const p = portfolioById(id);
    if (!p) return;
    Object.assign(p, patch);
    logEvent('updatePortfolio', { id, patch });
    save();
  }
  function deletePortfolio(id) {
    const p = portfolioById(id);
    if (!p) return;
    const ps = projectsOfPortfolio(id);
    const msg = ps.length
      ? `Delete portfolio "${p.name}" and its ${ps.length} project(s) and all their time? This can't be undone.`
      : `Delete portfolio "${p.name}"?`;
    if (!confirm(msg)) return;
    const projIds = new Set(ps.map(p => p.id));
    const actIds = new Set(state.activities.filter(a => projIds.has(a.projectId)).map(a => a.id));
    state.entries = state.entries.filter(e => !actIds.has(e.activityId));
    state.activities = state.activities.filter(a => !projIds.has(a.projectId));
    state.projects = state.projects.filter(p => p.portfolioId !== id);
    state.portfolios = state.portfolios.filter(p => p.id !== id);
    logEvent('deletePortfolio', { id, name: p.name });
    save();
    if (view.name !== "home") navigate({ name: "home" });
    else render();
  }
  function addProject(portfolioId, fields) {
    if (!portfolioById(portfolioId)) return null;
    const color = pickColor(PROJECT_PALETTE, state.projects.map(p => p.color));
    const id = uid();
    state.projects.push({
      id, portfolioId,
      name: (fields.name || "Untitled project").trim(),
      description: fields.description || "",
      status: fields.status || "active",
      deadline: fields.deadline || null,
      estimatedHours: fields.estimatedHours == null ? null : Number(fields.estimatedHours),
      color,
      dependencies: [],
      images: [],
    });
    highlight(id);
    logEvent('addProject', { id, portfolioId, name: (fields.name || "Untitled project").trim(), color });
    save();
    return id;
  }
  function updateProject(id, patch) {
    const p = projectById(id);
    if (!p) return;
    Object.assign(p, patch);
    if (patch.estimatedHours === "" || patch.estimatedHours == null) p.estimatedHours = null;
    logEvent('updateProject', { id, patch });
    save();
  }
  function deleteProject(id) {
    const p = projectById(id);
    if (!p) return;
    const acts = activitiesOfProject(id);
    const hasEntries = state.entries.some(e => acts.some(a => a.id === e.activityId));
    const msg = hasEntries
      ? `Delete project "${p.name}" and all its time entries?`
      : `Delete project "${p.name}"?`;
    if (!confirm(msg)) return;
    const actIds = new Set(acts.map(a => a.id));
    state.entries = state.entries.filter(e => !actIds.has(e.activityId));
    state.activities = state.activities.filter(a => a.projectId !== id);
    state.projects = state.projects.filter(p => p.id !== id);
    logEvent('deleteProject', { id, name: p.name });
    save();

    else render();
  }
  function addActivity(projectId, name) {
    name = (name || "").trim();
    if (!name) return null;
    if (!projectById(projectId)) return null;
    const used = activitiesOfProject(projectId).map(a => a.color);
    const color = pickColor(ACTIVITY_PALETTE, used);
    const id = uid();
    state.activities.push({ id, projectId, name, color, notes: "", dependencies: [], images: [], done: false, priority: "none" });
    highlight(id);
    logEvent('addActivity', { id, projectId, name, color });
    save();
    return id;
  }
  function renameActivity(id, name) {
    const a = activityById(id);
    if (!a) return;
    a.name = (name || "").trim() || a.name;
    save();
  }
  function updateActivity(id, patch) {
    const a = activityById(id);
    if (!a) return;
    Object.assign(a, patch);
    logEvent('updateActivity', { id, patch });
    save();
  }
  function deleteActivity(id) {
    const a = activityById(id);
    if (!a) return;
    const has = state.entries.some(e => e.activityId === id);
    const msg = has
      ? `Delete "${a.name}" and its time entries?`
      : `Delete "${a.name}"?`;
    if (!confirm(msg)) return;
    state.entries = state.entries.filter(e => e.activityId !== id);
    state.activities = state.activities.filter(a => a.id !== id);
    logEvent('deleteActivity', { id, name: a.name });
    save();
    render();

  function toggleActivityDone(id) {

    save();
    render();
  }
  function startActivity(id) {
    if (!activityById(id)) return;

      if (r.activityId === id) return;
      r.end = now;

    const eid = uid();
    state.entries.push({ id: eid, activityId: id, start: now, end: null, tags: [] });
    highlight(eid);
    logEvent('startActivity', { activityId: id, entryId: eid, start: now });
    save();
    render();
  }
  function stopRunning() {
    const r = getRunning();

    render();

  function deleteEntry(id) {

    render();

  function updateEntry(id, patch) {

    if (next.end !== null) {
      const s = new Date(next.start).getTime();
      const en = new Date(next.end).getTime();

      if (overlapsWithRunning(next, id)) return { ok: false, err: "Conflicts with the running timer." };

    const end = combineDateTime(dateStr, endTime);

      activityId,
      start, end,
