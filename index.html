<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WebShark Manager.AI</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --card-hover: #fcfcfd;
    --border: #ececec;
    --border-strong: #d4d4d4;
    --text: #1a1a1a;
    --muted: #6b7280;
    --subtle: #f3f4f6;
    --accent: #2563eb;
    --accent-soft: #eff6ff;
    --accent-hover: #1d4ed8;
    --danger: #b91c1c;
    --danger-soft: #fef2f2;
    --warn: #ca8a04;
    --ok: #16a34a;
    --planning: #9ca3af;
    --active: #16a34a;
    --hold: #ca8a04;
    --done: #6b7280;
    --radius: 8px;
    --radius-lg: 12px;
    --t-fast: 140ms;
    --t-base: 220ms;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.25rem 1.25rem 4rem;
  }

  /* header */
  header.app { margin-bottom: 1.25rem; }
  .brand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.4rem;
  }
  .brand {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    text-decoration: none;
    cursor: pointer;
    transition: opacity var(--t-fast) var(--ease);
  }
  .brand:hover { opacity: 0.65; }
  .header-right {
    display: flex; align-items: baseline; gap: 0.85rem;
  }
  .header-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.18rem 0.6rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    transition: color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  .header-link:hover { color: var(--text); background: var(--subtle); border-color: var(--border-strong); }
  .header-link:active { transform: scale(0.96); }
  .header-link.active {
    color: var(--accent);
    border-color: #dbeafe;
    background: var(--accent-soft);
  }
  .date {
    color: var(--muted);
    font-size: 0.85rem;
  }
  .crumbs {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.35rem;
    color: var(--muted);
    font-size: 0.88rem;
    min-height: 1.5rem;
  }
  .crumbs a {
    color: var(--muted);
    text-decoration: none;
    border-radius: 4px;
    padding: 0.1rem 0.35rem;
    margin: 0 -0.35rem;
    transition: color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
  }
  .crumbs a:hover { color: var(--text); background: var(--subtle); }
  .crumbs .sep { color: var(--border-strong); }
  .crumbs .current { color: var(--text); font-weight: 500; }

  /* running bar */
  .running-bar {
    margin-top: 0.75rem;
    background: var(--accent-soft);
    border: 1px solid #dbeafe;
    border-radius: var(--radius);
    padding: 0.55rem 0.75rem 0.55rem 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
    font-size: 0.9rem;
    animation: fadeUp var(--t-base) var(--ease);
  }
  .running-bar .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: pulseRing 1.6s ease-out infinite;
  }
  .running-bar .label { flex: 1; color: var(--text); }
  .running-bar .label .sub { color: var(--muted); }
  .running-bar .live {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: var(--accent);
  }
  .running-bar .stop-btn {
    background: #fff;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.85rem;
    transition: background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .running-bar .stop-btn:hover { background: #dbeafe; }
  .running-bar .stop-btn:active { transform: scale(0.97); }

  /* main view container */
  main { position: relative; }
  .view {
    animation: fadeUp var(--t-base) var(--ease);
  }
  .view.view-forward { animation: viewSlideR var(--t-base) var(--ease); }
  .view.view-back    { animation: viewSlideL var(--t-base) var(--ease); }
  .view.leaving { animation: fadeDown var(--t-fast) var(--ease) forwards; }
  .view > * { animation: sectionRise 400ms var(--ease) both; }
  .view > *:nth-child(1) { animation-delay: 30ms; }
  .view > *:nth-child(2) { animation-delay: 80ms; }
  .view > *:nth-child(3) { animation-delay: 130ms; }
  .view > *:nth-child(4) { animation-delay: 180ms; }
  .view > *:nth-child(5) { animation-delay: 230ms; }
  .view > *:nth-child(6) { animation-delay: 280ms; }
  .view > *:nth-child(n+7) { animation-delay: 320ms; }
  .view.view-refresh { animation: none; }
  .view.view-refresh > * { animation: none; }

  /* sections */
  section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.15rem 0.9rem;
    margin-bottom: 1.1rem;
    transition: border-color var(--t-fast) var(--ease);
  }
  section h2 {
    margin: 0 0 0.85rem;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
    margin: 0 0 0.85rem;
  }
  .section-head h2 { margin: 0; }
  .section-head .head-meta {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .empty {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 0.4rem 0 0.6rem;
  }

  /* hero (portfolio / project header) */
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.25rem 1.1rem;
    margin-bottom: 1.1rem;
    animation: fadeUp var(--t-base) var(--ease);
  }
  .hero-top {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    margin-bottom: 0.5rem;
  }
  .hero .dot-lg {
    width: 14px; height: 14px;
    border-radius: 50%;
    margin-top: 0.45rem;
    flex-shrink: 0;
  }
  .hero h1 {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    flex: 1;
    cursor: pointer;
    border-radius: 4px;
    padding: 0.05rem 0.3rem;
    margin-left: -0.3rem;
    transition: background var(--t-fast) var(--ease);
  }
  .hero h1:hover { background: var(--subtle); }
  .hero .hero-actions { display: flex; gap: 0.25rem; }
  .hero .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem 1rem;
    margin-top: 0.35rem;
    color: var(--muted);
    font-size: 0.88rem;
    align-items: center;
  }
  .hero .desc {
    margin-top: 0.7rem;
    color: var(--text);
    font-size: 0.92rem;
    white-space: pre-wrap;
    line-height: 1.55;
  }
  .hero .desc.empty-desc {
    color: var(--muted);
    font-style: italic;
    cursor: pointer;
  }
  .hero .progress-wrap {
    margin-top: 0.85rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
    font-variant-numeric: tabular-nums;
  }
  .progress {
    background: var(--subtle);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
    width: 0;
    transition: width 600ms var(--ease), background var(--t-base) var(--ease);
  }
  .progress.over > div { background: var(--warn); }

  /* status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-size: 0.74rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1.3;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
  }
  .badge .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge.s-planning { color: #6b7280; }
  .badge.s-active   { color: var(--ok); border-color: #dcfce7; background: #f0fdf4; }
  .badge.s-hold     { color: var(--warn); border-color: #fef3c7; background: #fffbeb; }
  .badge.s-done     { color: #6b7280; background: var(--subtle); border-color: var(--border); }
  .due-soon { color: var(--warn); }
  .due-overdue { color: var(--danger); }

  /* generic cards (portfolios, projects) */
  .card-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 0.95rem;
    cursor: pointer;
    transition: transform var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                background var(--t-fast) var(--ease);
    animation: fadeUp var(--t-base) var(--ease) both;
    text-align: left;
    display: block;
    width: 100%;
    font: inherit;
    color: inherit;
  }
  .card:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    background: var(--card-hover);
  }
  .card:active { transform: translateY(0); }
  .card.new-row { animation: flashIn 1200ms var(--ease); }
  .card-top {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .card .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card .title {
    flex: 1;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .right {
    color: var(--muted);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  .card .sub {
    margin-top: 0.4rem;
    color: var(--muted);
    font-size: 0.83rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.85rem;
    align-items: center;
  }
  .card .mini-progress {
    margin-top: 0.55rem;
    height: 4px;
    background: var(--subtle);
    border-radius: 999px;
    overflow: hidden;
  }
  .card .mini-progress > div {
    height: 100%; width: 0;
    background: var(--accent);
    border-radius: 999px;
    transition: width 600ms var(--ease);
  }

  /* activities (project view) */
  .activity {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .activity:first-child { border-top: none; }
  .activity.new-row { animation: flashIn 1200ms var(--ease); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .activity .name {
    flex: 1; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: pointer; border-radius: 4px;
    padding: 0.1rem 0.3rem; margin: 0 -0.3rem;
    transition: background var(--t-fast) var(--ease);
  }
  .activity .name:hover { background: var(--subtle); }
  .activity .today {
    font-variant-numeric: tabular-nums;
    color: var(--muted); font-size: 0.9rem;
    transition: color var(--t-fast) var(--ease);
  }
  .activity.running .today { color: var(--accent); font-weight: 500; }
  .activity.running .dot,
  .card.running .dot,
  .dot-lg.running {
    box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.5);
    animation: pulseRing 1.6s ease-out infinite;
  }
  :root[data-pulse="off"] .activity.running .dot,
  :root[data-pulse="off"] .card.running .dot,
  :root[data-pulse="off"] .dot-lg.running {
    animation: none;
    box-shadow: none;
  }
  .activity .actions { display: flex; gap: 0.35rem; align-items: center; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0.25rem 0.4rem;
    border-radius: 6px;
    font: inherit;
    font-size: 0.85rem;
    transition: background var(--t-fast) var(--ease), color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
  }
  .icon-btn:hover { color: var(--text); background: var(--subtle); }
  .icon-btn:active { transform: scale(0.94); }
  .icon-btn.danger:hover { color: var(--danger); background: var(--danger-soft); }

  .add-row {
    display: flex; gap: 0.5rem;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .add-row input { flex: 1; }

  input[type="text"], input[type="time"], input[type="date"], input[type="number"], textarea, select {
    font: inherit; color: var(--text); background: #fff;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.45rem 0.65rem; outline: none;
    transition: border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
  }
  textarea { width: 100%; resize: vertical; min-height: 70px; font-family: inherit; }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  button {
    font: inherit; cursor: pointer; border-radius: 6px;
    padding: 0.45rem 0.85rem;
    border: 1px solid var(--border); background: #fff; color: var(--text);
    transition: background var(--t-fast) var(--ease),
                border-color var(--t-fast) var(--ease),
                color var(--t-fast) var(--ease),
                transform var(--t-fast) var(--ease);
  }
  button:hover { background: var(--subtle); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.stop {
    background: #fff; color: var(--accent); border-color: var(--accent);
  }
  button.stop:hover { background: var(--accent-soft); }
  button.subtle {
    background: none; border: 1px dashed var(--border);
    color: var(--muted); width: 100%; margin-top: 0.5rem;
  }
  button.subtle:hover { color: var(--text); border-color: var(--muted); background: var(--subtle); }

  /* entries */
  .entry {
    display: grid;
    grid-template-columns: 12px 1fr auto auto;
    gap: 0.75rem; align-items: center;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    font-size: 0.92rem;
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .entry:first-child { border-top: none; }
  .entry.new-row { animation: flashIn 1200ms var(--ease); }
  .entry .meta { color: var(--muted); font-variant-numeric: tabular-nums; }
  .entry .dur { font-variant-numeric: tabular-nums; font-weight: 500; }
  .entry .name { font-weight: 500; }
  .entry .tags {
    margin-top: 0.15rem;
    display: flex; flex-wrap: wrap; gap: 0.3rem;
  }
  .tag-chip {
    font-size: 0.72rem;
    padding: 0.05rem 0.45rem;
    border-radius: 999px;
    background: var(--subtle);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .entry-edit {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 0.5rem; align-items: center;
    padding: 0.55rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-fast) var(--ease);
  }
  .entry-edit:first-child { border-top: none; }
  .entry-edit .row-actions { display: flex; gap: 0.35rem; }
  .entry-edit .tags-input {
    grid-column: 1 / -1;
  }
  .err {
    color: var(--danger);
    font-size: 0.82rem;
    padding: 0.35rem 0 0;
    animation: fadeUp var(--t-fast) var(--ease);
  }

  /* week chart */
  .week-row {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 0.75rem; align-items: center;
    padding: 0.7rem 0;
    border-top: 1px solid var(--border);
    animation: fadeUp var(--t-base) var(--ease) both;
  }
  .week-row:first-child { border-top: none; }
  .week-row .name { font-weight: 500; }
  .week-row .bars {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px; align-items: end;
    height: 44px;
    margin-top: 4px;
  }
  .week-row .bar-col {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    height: 100%;
  }
  .week-row .bar {
    width: 100%;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-height: 0;
    opacity: 0.85;
    transition: height 600ms var(--ease);
  }
  .week-row .bar.zero { background: var(--border); height: 2px !important; opacity: 1; }
  .week-row .total {
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    color: var(--text);
    align-self: start;
    padding-top: 2px;
  }
  .week-grid {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 0.75rem; align-items: end;
    padding: 0.25rem 0 0.5rem;
  }
  .week-grid .axis {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
  }
  .week-grid .axis .today-cell {
    color: var(--text); font-weight: 600;
  }
  .week-grid .week-label {
    color: var(--muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* project meta edit form */
  .meta-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.65rem 0.75rem;
    margin-top: 0.6rem;
    animation: fadeUp var(--t-fast) var(--ease);
  }
  .meta-form label {
    display: flex; flex-direction: column; gap: 0.2rem;
    font-size: 0.78rem; color: var(--muted);
  }
  .meta-form .full { grid-column: 1 / -1; }
  .meta-form .meta-field { display: flex; flex-direction: column; gap: 0.2rem; }
  .meta-form .meta-cap { font-size: 0.78rem; color: var(--muted); }
  .meta-form .row-actions {
    grid-column: 1 / -1;
    display: flex; gap: 0.4rem;
    margin-top: 0.2rem;
  }

  /* Schedule View Styles */
  .sched-toolbar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .sched-toolbar .nav-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-right: 1px solid var(--border);
    padding-right: 0.75rem;
  }
  .sched-toolbar .range-label {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    min-width: 100px;
  }
  .sched-toolbar .spacer { flex: 1; }
  .sched-icon-btn {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.65rem;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    font-size: 0.85rem;
    transition: all var(--t-fast) var(--ease);
  }
  .sched-icon-btn:hover {
    background: var(--subtle);
    color: var(--text);
  }
  .sched-icon-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .sched-grid-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1rem;
    overflow-x: auto;
  }
  .sched-time-grid {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    min-width: 100%;
  }
  .sched-time-grid.week {
    position: relative;
    grid-template-rows: repeat(24, 40px);
  }

  .sched-time-col {
    background: var(--card);
    border-right: 1px solid var(--border);
    position: relative;
  }
  .sched-time-col.time-header {
    padding: 0.5rem 0.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-weight: 600;
  }
  .sched-time-col.day-header {
    padding: 0.5rem 0.5rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.2rem;
  }
  .sched-time-col.day-header .day-num {
    font-size: 1.1rem;
  }
  .sched-time-col.day-header.today {
    background: var(--accent-soft);
    border-right: 2px solid var(--accent);
  }

  .sched-event {
    position: absolute;
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    padding: 0.5rem;
    cursor: grab;
    user-select: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: box-shadow var(--t-fast) var(--ease), opacity var(--t-fast) var(--ease);
    z-index: 10;
    min-width: 70%;
    font-size: 0.8rem;
  }
  .sched-event:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .sched-event:active {
    cursor: grabbing;
    opacity: 0.9;
  }
  .sched-event.dragging {
    opacity: 0.6;
    z-index: 100;
  }
  .ev-title {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-time {
    font-size: 0.7rem;
    opacity: 0.9;
    margin-top: 0.2rem;
  }
  .ev-duration {
    font-size: 0.7rem;
    opacity: 0.85;
  }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes fadeDown {
    from { opacity: 1; transform: none; }
    to   { opacity: 0; transform: translateY(-4px); }
  }
  @keyframes sectionRise {
    from { opacity: 0; transform: translateY(9px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes viewSlideR {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes viewSlideL {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.45); }
    70%  { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
  }
  @keyframes flashIn {
    0%   { background-color: rgba(37, 99, 235, 0.10); }
    100% { background-color: transparent; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* reports — stat cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.55rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem 0.85rem;
    animation: fadeUp var(--t-base) var(--ease) both;
    transition: transform var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }
  .stat-card:hover { transform: translateY(-1px); border-color: var(--border-strong); }
  .stat-card .label {
    font-size: 0.66rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .stat-card .value {
    font-size: 1.35rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    margin-top: 0.15rem;
    letter-spacing: -0.01em;
  }
  .stat-card .sub {
    font-size: 0.74rem;
    color: var(--muted);
    margin-top: 0.05rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* toasts */
  .toasts {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    display: flex;
    flex-direction: column-reverse;
    gap: 0.45rem;
    z-index: 300;
    pointer-events: none;
    max-width: calc(100% - 2rem);
  }
  .toast {
    pointer-events: auto;
    background: #1f2937;
    color: #fff;
    padding: 0.55rem 0.85rem;
    border-radius: 8px;
    font-size: 0.86rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    animation: toastIn 220ms var(--ease);
    max-width: 320px;
  }
  .toast.out { animation: toastOut 180ms var(--ease) forwards; }
  @keyframes toastIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes toastOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(6px); } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
(() => {
  "use strict";

  const SUPABASE_URL = "https://gknrtzblookomnxrjthr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrbnJ0emJsb29rb21ueHJqdGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzc5NTQsImV4cCI6MjA5NDgxMzk1NH0.8wYdRrWpgB2yVfyVKA-b1p0nUFb1oCIxtS6phaFm7zk";

  const STORAGE_KEY = "timetrack.v2";
  const LEGACY_KEYS = ["timetrack.v1"];

  const $ = (id) => document.getElementById(id);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  function freshState() {
    return {
      portfolios: [],
      projects: [],
      activities: [],
      entries: [],
      events: [],
      scheduleEvents: [],
      panelLayouts: {},
      settings: {}
    };
  }

  function backfillState(s) {
    if (!s || typeof s !== "object") return freshState();
    for (const k of ["portfolios", "projects", "activities", "entries", "events", "scheduleEvents"]) {
      if (!Array.isArray(s[k])) s[k] = [];
    }
    return s;
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        for (const k of LEGACY_KEYS) localStorage.removeItem(k);
        return freshState();
      }
      return backfillState(JSON.parse(raw));
    } catch {
      return freshState();
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = load();
  let view = parseHash();

  function parseHash() {
    const h = location.hash.replace(/^#\/?/, "");
    if (!h) return { name: "home" };
    if (h === "schedule") return { name: "schedule" };
    return { name: "home" };
  }

  function viewHref(v) {
    if (v.name === "home") return "#/";
    if (v.name === "schedule") return "#/schedule";
    return "#/";
  }

  function navigate(v) { location.hash = viewHref(v); }

  window.addEventListener("hashchange", () => {
    view = parseHash();
    render();
  });

  // ==================== SCHEDULE VIEW ====================
  function renderScheduleView(root) {
    const hero = document.createElement("div");
    hero.className = "hero";
    hero.innerHTML = `
      <div class="hero-top">
        <span class="dot-lg" style="background: var(--accent);"></span>
        <h1>Schedule</h1>
      </div>
      <div class="meta-row">
        <span>Drag &amp; drop events • Organize your week</span>
      </div>
    `;
    root.appendChild(hero);

    const toolbar = document.createElement("div");
    toolbar.className = "sched-toolbar";
    
    const weekOffset = parseInt(sessionStorage.getItem("scheduleWeekOffset") || "0");
    const today = new Date();
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay() + weekOffset * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    
    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    
    toolbar.innerHTML = `
      <div class="nav-group">
        <button class="sched-icon-btn" data-prev="week">←</button>
        <div class="range-label" data-week-range>${fmt(weekStart)} – ${fmt(weekEnd)}</div>
        <button class="sched-icon-btn" data-next="week">→</button>
      </div>
      <div class="spacer"></div>
      <button class="sched-icon-btn active" data-view="week">Week</button>
      <button class="sched-icon-btn" id="newEvent">+ New Event</button>
    `;
    root.appendChild(toolbar);

    toolbar.querySelector('[data-prev="week"]').addEventListener("click", () => {
      sessionStorage.setItem("scheduleWeekOffset", String(weekOffset - 1));
      render();
    });
    toolbar.querySelector('[data-next="week"]').addEventListener("click", () => {
      sessionStorage.setItem("scheduleWeekOffset", String(weekOffset + 1));
      render();
    });

    toolbar.querySelector("#newEvent").addEventListener("click", () => {
      const title = prompt("Event title:");
      if (title) {
        const evt = {
          id: uid(),
          title,
          day: 0,
          hour: 9,
          duration: 60,
          color: "#2563eb"
        };
        state.scheduleEvents.push(evt);
        save();
        render();
      }
    });

    const gridWrap = document.createElement("div");
    gridWrap.className = "sched-grid-wrap";
    const grid = document.createElement("div");
    grid.className = "sched-time-grid week";
    gridWrap.appendChild(grid);
    root.appendChild(gridWrap);

    // Header row: time column + 7 day columns
    const timeHeader = document.createElement("div");
    timeHeader.className = "sched-time-col time-header";
    timeHeader.textContent = "Time";
    grid.appendChild(timeHeader);

    const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    for (let d = 0; d < 7; d++) {
      const dayDate = new Date(weekStart);
      dayDate.setDate(weekStart.getDate() + d);
      const dayCol = document.createElement("div");
      dayCol.className = "sched-time-col day-header" + (dayDate.toDateString() === today.toDateString() ? " today" : "");
      dayCol.innerHTML = `<span>${dayNames[d]}</span><span class="day-num">${dayDate.getDate()}</span>`;
      grid.appendChild(dayCol);
    }

    // Time grid: 24 hours × 7 days
    for (let h = 0; h < 24; h++) {
      const timeLabel = document.createElement("div");
      timeLabel.className = "sched-time-col time-header";
      const hour12 = h === 0 ? "12am" : h < 12 ? h + "am" : h === 12 ? "12pm" : (h - 12) + "pm";
      timeLabel.textContent = hour12;
      grid.appendChild(timeLabel);

      for (let d = 0; d < 7; d++) {
        const cell = document.createElement("div");
        cell.className = "sched-time-col";
        cell.style.position = "relative";
        cell.dataset.day = d;
        cell.dataset.hour = h;
        grid.appendChild(cell);
      }
    }

    // Render events
    state.scheduleEvents.forEach(evt => {
      const cell = grid.querySelector(`[data-day="${evt.day}"][data-hour="${evt.hour}"]`);
      if (cell) {
        const evEl = document.createElement("div");
        evEl.className = "sched-event";
        evEl.style.backgroundColor = evt.color;
        evEl.style.top = "0";
        evEl.style.left = "5%";
        evEl.style.width = "90%";
        evEl.style.height = (evt.duration / 60 * 40 - 2) + "px";
        evEl.draggable = true;
        evEl.dataset.id = evt.id;
        evEl.innerHTML = `
          <div class="ev-title">${evt.title}</div>
          <div class="ev-time">${String(evt.hour).padStart(2, "0")}:00</div>
          <div class="ev-duration">${evt.duration}m</div>
        `;

        evEl.addEventListener("dragstart", e => {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("eventId", evt.id);
          evEl.classList.add("dragging");
        });
        evEl.addEventListener("dragend", () => evEl.classList.remove("dragging"));
        evEl.addEventListener("dblclick", () => {
          const newTitle = prompt("Edit event:", evt.title);
          if (newTitle) {
            evt.title = newTitle;
            save();
            render();
          }
        });
        evEl.addEventListener("contextmenu", e => {
          e.preventDefault();
          if (confirm("Delete event?")) {
            state.scheduleEvents = state.scheduleEvents.filter(v => v.id !== evt.id);
            save();
            render();
          }
        });

        cell.appendChild(evEl);
      }
    });

    // Drop support on cells
    grid.querySelectorAll(".sched-time-col").forEach(cell => {
      cell.addEventListener("dragover", e => e.preventDefault());
      cell.addEventListener("drop", e => {
        e.preventDefault();
        const id = e.dataTransfer.getData("eventId");
        const day = parseInt(cell.dataset.day);
        const hour = parseInt(cell.dataset.hour);
        if (day !== undefined && hour !== undefined) {
          const evt = state.scheduleEvents.find(v => v.id === id);
          if (evt) {
            evt.day = day;
            evt.hour = hour;
            save();
            render();
          }
        }
      });
    });
  }

  function renderHome(root) {
    const hero = document.createElement("div");
    hero.className = "hero";
    hero.innerHTML = `
      <div class="hero-top">
        <span class="dot-lg" style="background: var(--accent);"></span>
        <h1>Welcome</h1>
      </div>
      <div class="meta-row">
        <span>Project & Time Management</span>
      </div>
    `;
    root.appendChild(hero);

    const section = document.createElement("section");
    section.innerHTML = `
      <div class="section-head">
        <h2>Quick Links</h2>
      </div>
      <button class="card" onclick="location.hash='#/schedule'" style="text-align: center; padding: 1.5rem;">
        📅 Go to Schedule
      </button>
    `;
    root.appendChild(section);
  }

  // Render dispatcher
  function render() {
    const root = $("view");
    const next = document.createElement("div");
    next.className = "view";

    if (view.name === "schedule") renderScheduleView(next);
    else renderHome(next);

    root.innerHTML = "";
    root.appendChild(next);
  }

  // Initial paint
  render();
  document.addEventListener("DOMContentLoaded", () => {
    renderHeader();
  });

  function renderHeader() {
    const header = document.createElement("header");
    header.className = "app";
    header.innerHTML = `
      <div class="brand-row">
        <a class="brand" href="#/">WebShark Manager</a>
        <div class="header-right">
          <a class="header-link" href="#/">Home</a>
          <a class="header-link" href="#/schedule">Schedule</a>
        </div>
      </div>
    `;
    const wrap = $("wrap");
    if (wrap && !wrap.querySelector("header")) {
      wrap.insertBefore(header, wrap.firstChild);
    }
  }

  renderHeader();
})();
</script>
</head>
<body>
<div id="toasts" class="toasts"></div>
<div class="wrap">
  <main id="view"></main>
</div>
</body>
</html>
